<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조인 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --border: rgba(62,160,102,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 768px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }

    /* 로딩 */
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(62,160,102,0.3);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar {
      flex-shrink: 0; padding: 32px 18px 10px;
      display: flex; align-items: center; justify-content: space-between; z-index: 10;
    }
    .appbar-left { display: flex; align-items: center; gap: 8px; }
    #btn-back {
      background: none; border: none; cursor: pointer; padding: 4px 8px 4px 0;
      color: var(--green-light); font-size: 20px; line-height: 1;
    }
    .appbar-title { font-size: 16px; font-weight: 900; }
    #btn-new-join {
      display: none;
      background: rgba(62,160,102,0.2); border: 1px solid rgba(62,160,102,0.4);
      color: var(--green-light); font-size: 12px; font-weight: 700;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: inherit;
    }

    .hidden { display: none !important; }

    /* 스크롤 */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 탭바 */
    .tab-bar {
      flex-shrink: 0; display: flex; border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .tab-btn {
      flex: 1; padding: 12px 0; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.4); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: var(--green-light); }

    .list-content { padding: 16px 16px 80px; }

    /* 조인 카드 - 주간 */
    .join-card {
      background: linear-gradient(135deg, rgba(45,122,79,0.25) 0%, rgba(10,36,6,0.5) 100%);
      border: 1px solid rgba(62,160,102,0.35);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .join-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(62,160,102,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    /* 야간 카드 */
    .join-card.night {
      background: linear-gradient(135deg, rgba(40,50,130,0.35) 0%, rgba(5,8,35,0.65) 100%);
      border-color: rgba(110,130,255,0.35);
    }
    .join-card.night::before {
      background: radial-gradient(circle, rgba(110,130,255,0.15) 0%, transparent 70%);
    }
    .join-card.night .card-action-btn {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .join-card.night .card-meta-icon { color: #8899ff; }
    .join-card.night .participant-count-badge {
      color: #8899ff; background: rgba(100,120,255,0.15); border-color: rgba(100,120,255,0.3);
    }

    /* 주간/야간 뱃지 */
    .day-label {
      font-size: 11px; font-weight: 700;
      color: var(--green-light);
      background: rgba(62,160,102,0.1);
      border: 1px solid rgba(62,160,102,0.2);
      padding: 2px 8px; border-radius: 8px;
    }
    .night-label {
      font-size: 11px; font-weight: 700; color: #8899ff;
      background: rgba(100,120,255,0.12);
      border: 1px solid rgba(100,120,255,0.25);
      padding: 2px 8px; border-radius: 8px;
    }
    .field-label {
      font-size: 11px; font-weight: 700; color: #f0c040;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      padding: 2px 8px; border-radius: 8px;
    }
    .screen-label {
      font-size: 11px; font-weight: 700; color: #ff8c69;
      background: rgba(255,140,105,0.1);
      border: 1px solid rgba(255,140,105,0.25);
      padding: 2px 8px; border-radius: 8px;
    }

    /* 필터 칩 */
    .filter-wrap {
      flex-shrink: 0; display: flex; gap: 7px;
      padding: 10px 16px 8px;
    }
    .filter-chip {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid rgba(62,160,102,0.3); background: transparent;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45);
      cursor: pointer; font-family: inherit; transition: all 0.18s;
    }
    .filter-chip.active {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .badge-open {
      background: #e74c3c; color: #fff;
      font-size: 9px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .card-status-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .card-title {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 16px;
    }
    .card-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .card-meta-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.65);
    }
    .card-meta-icon {
      width: 14px; height: 14px; color: var(--green-light); flex-shrink: 0;
    }
    .card-meta-label { color: rgba(255,255,255,0.35); min-width: 52px; }

    /* 참석 인원 프로그레스 */
    .card-progress-area { margin-bottom: 16px; }
    .card-progress-top {
      display: flex; justify-content: space-between;
      font-size: 11px; margin-bottom: 5px;
    }
    .card-progress-label { color: rgba(255,255,255,0.45); }
    .card-progress-num { color: var(--green-light); font-weight: 700; }
    .card-progress-bar {
      height: 5px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .card-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light));
      border-radius: 3px; transition: width 0.5s ease;
    }
    .join-card.night .card-progress-fill {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }

    /* 참여하기 버튼 */
    .card-join-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      color: #fff; font-size: 15px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s; margin-bottom: 8px;
    }
    .card-join-btn:active { opacity: 0.8; }
    .card-join-btn.joined {
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.4);
      color: var(--green-light);
    }
    .card-join-btn.full {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3);
      cursor: default;
    }
    .join-card.night .card-join-btn {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .join-card.night .card-join-btn.joined {
      background: rgba(100,120,255,0.15);
      border: 1px solid rgba(100,120,255,0.4);
      color: #8899ff;
    }

    /* 참석자 명단 */
    .participant-list {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .participant-list-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .participant-list-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.4); letter-spacing: 0.5px;
    }
    .participant-chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .participant-name-chip {
      font-size: 11px; font-weight: 800;
      color: var(--gold);
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      border-radius: 20px; padding: 4px 6px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; text-align: center;
    }
    .participant-name-chip.me {
      background: rgba(240,192,64,0.2);
      border-color: rgba(240,192,64,0.45);
    }
    .participant-count-badge {
      font-size: 11px; font-weight: 800;
      color: var(--green-light);
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.3);
      padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .participant-empty {
      font-size: 11px; color: rgba(255,255,255,0.2);
      font-style: italic;
    }

    /* 스코어 버튼 */
    .card-score-btn {
      width: 100%; padding: 10px;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.3);
      color: var(--gold); font-size: 13px; font-weight: 800;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s;
    }
    .card-score-btn:active { background: rgba(240,192,64,0.2); }

    /* 하단 보조 버튼 행 */
    .card-bottom-row { display: flex; gap: 8px; }
    .card-share-btn {
      flex: 1; padding: 10px 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 700;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .card-share-btn:active { background: rgba(255,255,255,0.12); }
    .card-kakao-btn {
      flex: 1; padding: 10px 8px;
      background: rgba(254,229,0,0.12);
      border: 1px solid rgba(254,229,0,0.3);
      color: #ffe033; font-size: 12px; font-weight: 700;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      text-decoration: none;
    }
    .card-kakao-btn:active { background: rgba(254,229,0,0.2); }

    /* 관리자 버튼 */
    .card-admin-row { display: flex; gap: 8px; margin-top: 10px; }
    .card-edit-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(240,192,64,0.15); color: var(--gold);
      border: 1px solid rgba(240,192,64,0.3);
    }
    .card-close-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(231,76,60,0.15); color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
    }
    .card-delete-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(180,0,0,0.2); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.35);
    }

    /* 마감 카드 */
    .past-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 14px;
    }
    .past-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: rgba(62,160,102,0.1); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .past-info { flex: 1; min-width: 0; }
    .past-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .past-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
    .past-badge {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px; flex-shrink: 0;
    }
    .past-delete-btn {
      flex-shrink: 0;
      background: rgba(180,0,0,0.15); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.25);
      font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 8px;
      cursor: pointer; font-family: inherit; margin-left: 6px;
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 13px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── 관리자 모달 ── */
    .admin-overlay {
      position: absolute; inset: 0;
      background: var(--green-dark);
      z-index: 200; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .admin-overlay.open { transform: translateY(0); }
    .admin-appbar {
      flex-shrink: 0; padding: 28px 18px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .admin-appbar-title { font-size: 15px; font-weight: 900; }
    .admin-close-btn {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .admin-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px 18px 40px; scrollbar-width: none; }
    .admin-scroll::-webkit-scrollbar { display: none; }

    .admin-section-title {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35);
      letter-spacing: 1px; text-transform: uppercase; margin: 0 0 14px;
    }
    .admin-form-group { margin-bottom: 14px; }
    .admin-label { display: block; font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-weight: 600; }
    .admin-input, .admin-textarea {
      width: 100%; max-width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
      padding: 11px 14px; color: #fff; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
      box-sizing: border-box; -webkit-appearance: none;
      height: 46px; line-height: 1.4;
    }
    .admin-input:focus, .admin-textarea:focus { border-color: var(--green-light); }
    .admin-input::placeholder, .admin-textarea::placeholder { color: rgba(255,255,255,0.2); }
    .admin-textarea { height: auto; min-height: 70px; }
    .admin-textarea { resize: vertical; min-height: 70px; }

    /* 주간/야간 토글 */
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1; padding: 10px; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 700; font-family: inherit;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4); transition: all 0.2s;
    }
    .toggle-btn.active-day {
      background: rgba(62,160,102,0.2); border-color: rgba(62,160,102,0.5);
      color: var(--green-light);
    }
    .toggle-btn.active-night {
      background: rgba(100,120,255,0.2); border-color: rgba(100,120,255,0.5);
      color: #8899ff;
    }

    .admin-save-btn {
      width: 100%; padding: 14px; margin-top: 20px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      color: #fff; font-size: 15px; font-weight: 800;
      border: none; border-radius: 14px; cursor: pointer; font-family: inherit;
    }

    /* 토스트 */
    .toast {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,30,0.95); color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 하단 모달 공통 */
    .bottom-modal.show { display: flex !important; }

    /* 컨펌 */
    .confirm-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; z-index: 300; opacity: 0;
      pointer-events: none; transition: opacity 0.25s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-sheet {
      width: 100%; background: #1a2e1a; border-radius: 24px 24px 0 0;
      padding: 24px 20px 32px; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .confirm-overlay.open .confirm-sheet { transform: translateY(0); }
    .confirm-title { font-size: 16px; font-weight: 900; margin-bottom: 8px; }
    .confirm-msg { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 20px; line-height: 1.6; white-space: pre-line; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-cancel {
      flex: 1; padding: 12px; border-radius: 12px;
      background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .confirm-ok {
      flex: 1; padding: 12px; border-radius: 12px;
      background: #e74c3c; border: none;
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
  </style>
</head>
<body>
<div class="phone">

  <div id="loading-overlay"><div class="spinner"></div></div>

  <!-- 앱바 -->
  <div class="appbar">
    <div class="appbar-left">
      <button id="btn-back" onclick="goBack()">‹</button>
      <span class="appbar-title">조인</span>
    </div>
    <button id="btn-new-join" onclick="openAdminModal(null)">+ 조인 만들기</button>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">조인 진행중</button>
    <button class="tab-btn" id="tab-closed" onclick="switchTab('closed')">마감</button>
  </div>

  <!-- 필터 칩 -->
  <div class="filter-wrap" id="filter-wrap">
    <button class="filter-chip active" id="chip-all" onclick="setFilter('all')">전체</button>
    <button class="filter-chip" id="chip-field" onclick="setFilter('field')">⛳ 필드</button>
    <button class="filter-chip" id="chip-screen" onclick="setFilter('screen')">🖥️ 스크린</button>
  </div>

  <!-- 스크롤 -->
  <div class="scroll-area">
    <div id="tab-content-active" class="list-content">
      <div id="active-list"><div class="empty-state"><div class="spinner"></div></div></div>
    </div>
    <div id="tab-content-closed" class="list-content hidden">
      <div id="closed-list"></div>
    </div>
  </div>

  <!-- 관리자 모달 -->
  <div class="admin-overlay" id="admin-overlay">
    <div class="admin-appbar">
      <span class="admin-appbar-title" id="admin-modal-title">조인 만들기</span>
      <button class="admin-close-btn" onclick="closeAdminModal()">×</button>
    </div>
    <div class="admin-scroll">
      <input type="hidden" id="admin-editing-id" value="" />

      <div class="admin-section-title">기본 정보</div>

      <div class="admin-form-group">
        <label class="admin-label">필드 / 스크린</label>
        <div class="toggle-group">
          <button class="toggle-btn active-day" id="toggle-field" onclick="setJoinType('field')">⛳ 필드</button>
          <button class="toggle-btn" id="toggle-screen" onclick="setJoinType('screen')">🖥️ 스크린</button>

<script type="module">

const app = initializeApp({

  projectId: "ggzon-b33cb",

if (window.Kakao && !Kakao.isInitialized()) {

let isAdmin = false;

// ── 아이콘 SVG ──────────────────────
const icons = {
  calendar: `<svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  clock:    `<svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  location: `<svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,

  money:    `<svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
};

// ── Auth ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html?return=join.html'; return; }
  currentUser = user;
  isAdmin = user.email === 'wlfmzhs@naver.com';
  if (isAdmin) { isPaidUser = true; document.getElementById('btn-new-join').style.display = 'block'; }
  else {
    const userSnap = await getDoc(doc(db, 'users', user.uid));
    if (userSnap.exists()) isPaidUser = userSnap.data().isPaid === true;
  }
  document.getElementById('loading-overlay').classList.add('hidden');
  await loadJoins();
});

// ── 로드 ──────────────────────────────────────────────
async function loadJoins() {
  try {
    const snap = await getDocs(collection(db, 'joins'));
    joins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { joins = []; }
  renderActiveList();
  renderClosedList();
  scrollToHashCard();
}

function scrollToHashCard() {
  const hash = location.hash; // e.g. #card-abc123
  if (!hash.startsWith('#card-')) return;
  const cardId = hash.slice(1); // card-abc123
  setTimeout(() => {
    const el = document.getElementById(cardId);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'box-shadow 0.3s';
      el.style.boxShadow = '0 0 0 2px #3ea066, 0 0 20px rgba(62,160,102,0.4)';
      setTimeout(() => { el.style.boxShadow = ''; }, 2500);
    }
  }, 400);
}

// ── 진행중 렌더 ───────────────────────────────────────
function renderActiveList() {
  const el = document.getElementById('active-list');
  let active = joins.filter(j => j.status !== 'closed');
  if (currentFilter !== 'all') active = active.filter(j => j.joinType === currentFilter);
  if (!active.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⛳</div>${isAdmin && currentFilter === 'all' ? '<button onclick="window.openAdminModal(null)" style="background:rgba(62,160,102,0.2);color:var(--green-light);border:1px solid rgba(62,160,102,0.4);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ 첫 번째 조인 만들기</button>' : '현재 모집중인 조인이 없습니다'}</div>`;
    return;
  }
  el.innerHTML = active.map(j => buildCard(j)).join('');
}

// ── 마감 렌더 ─────────────────────────────────────────
function renderClosedList() {
  const el = document.getElementById('closed-list');
  const closed = joins.filter(j => j.status === 'closed');
  if (!closed.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏁</div>마감된 조인이 없습니다</div>`;
    return;
  }
  el.innerHTML = closed.map(j => `
    <div class="past-card">
      <div class="past-icon">${j.timeType === 'night' ? '🌙' : '☀️'}</div>
      <div class="past-info">
        <div class="past-name">${j.course}</div>
        <div class="past-sub">${j.date}${j.greenfee ? ' · ' + j.greenfee : ''}</div>
      </div>
      <span class="past-badge">마감</span>
      ${isAdmin ? `<button class="past-delete-btn" onclick="window.confirmDelete('${j.id}','${j.course}')">삭제</button>` : ''}
    </div>
  `).join('');
}

// ── 카드 빌드 ─────────────────────────────────────────
function buildCard(j) {
  const isNight = j.timeType === 'night';
  const timeBadge = j.joinType === 'screen' ? ''
    : isNight ? `<span class="night-label">🌙 야간</span>`
    : `<span class="day-label">☀️ 주간</span>`;
  const joinTypeBadge = j.joinType === 'screen'
    ? `<span class="screen-label">🖥️ 스크린</span>`
    : `<span class="field-label">⛳ 필드</span>`;

  const participants = j.participants || [];
  const currentCount = participants.length;
  const isFull = currentCount >= j.capacity;
  const alreadyJoined = currentUser && participants.some(p => p.uid === currentUser.uid);
  const fillPct = j.capacity > 0 ? Math.min(100, Math.round(currentCount / j.capacity * 100)) : 0;

  let joinBtnText = '참여하기';
  let joinBtnClass = 'card-join-btn';
  if (alreadyJoined) { joinBtnText = '✓ 참여중 (취소)'; joinBtnClass += ' joined'; }
  else if (isFull)   { joinBtnText = '마감'; joinBtnClass += ' full'; }

  const adminRow = isAdmin ? `
    <div class="card-admin-row">
      <button class="card-edit-btn" onclick="window.openAdminModal('${j.id}')">수정</button>
      <button class="card-close-btn" onclick="window.confirmClose('${j.id}','${j.course}')">마감</button>
      <button class="card-delete-btn" onclick="window.confirmDelete('${j.id}','${j.course}')">삭제</button>
    </div>` : '';
  const memo = j.memo ? `<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:14px;line-height:1.6;">${j.memo}</div>` : '';

  return `
    <div class="join-card ${isNight && j.joinType !== 'screen' ? 'night' : ''}" id="card-${j.id}">
      <div class="card-status-row">
        <span class="badge-open">모집중</span>
        ${joinTypeBadge}
        ${timeBadge}
      </div>
      <div class="card-title">${j.course}</div>
      <div class="card-meta">
        <div class="card-meta-row">${icons.calendar}<span class="card-meta-label">날짜</span>${j.date}</div>
        <div class="card-meta-row">${icons.clock}<span class="card-meta-label">시간</span>${j.time}</div>
        <div class="card-meta-row">${icons.users}<span class="card-meta-label">참석 인원</span>${currentCount} / ${j.capacity}명</div>
        ${j.joinType !== 'screen' && j.greenfee ? `<div class="card-meta-row">${icons.money}<span class="card-meta-label">그린피</span>${fmtFee(j.greenfee)}</div>` : ''}
      </div>
      <div class="card-progress-area">
        <div class="card-progress-top">
          <span class="card-progress-label">모집 현황</span>
          <span class="card-progress-num">${currentCount}/${j.capacity}명</span>
        </div>
        <div class="card-progress-bar"><div class="card-progress-fill" style="width:${fillPct}%"></div></div>
      </div>
      <div class="participant-list">
        <div class="participant-list-top">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="participant-list-label">참석자</span>
            <span style="font-size:10px;color:rgba(240,192,64,0.6);font-weight:700;">★ 주최자</span>
          </div>
          <span class="participant-count-badge">${currentCount}/${j.capacity}</span>
        </div>
        ${participants.length === 0
          ? `<span class="participant-empty">아직 없음</span>`
          : `<div class="participant-chips">${participants.map((p, i) => {
              const isMe = currentUser && p.uid === currentUser.uid;
              const canView = isAdmin;
              const click = canView ? `onclick="window.viewParticipant('${j.id}','${p.uid}')"` : '';
              const style = canView ? 'cursor:pointer;' : '';
              return `<span class="participant-name-chip${isMe ? ' me' : ''}" ${click} style="${style}">${p.name}${i===0?' ★':''}</span>`;
            }).join('')}</div>`
        }
      </div>
      ${memo}
      <button class="${joinBtnClass}" ${isFull && !alreadyJoined ? 'disabled' : ''} onclick="window.participateJoin('${j.id}')">
        ${joinBtnText}
      </button>
      ${j.joinType !== 'screen' ? `
      <button class="card-score-btn" onclick="location.href='score.html?id=${j.id}'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
        스코어 입력 / 보기
      </button>` : ''}
      <div class="card-bottom-row">
        <button class="card-share-btn" onclick="window.shareCard('${j.id}')">공유용 이미지 저장</button>
        <button class="card-kakao-btn" onclick="window.kakaoShare('${j.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.49 1.39 4.69 3.5 6.1L4.5 21l4.37-2.62A11.3 11.3 0 0 0 12 18c5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/></svg>
          카카오 공유
        </button>
      </div>
      ${adminRow}
    </div>`;
}

// ── 탭 전환 ───────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById('tab-content-active').classList.toggle('hidden', tab !== 'active');
  document.getElementById('tab-content-closed').classList.toggle('hidden', tab !== 'closed');
  document.getElementById('tab-active').classList.toggle('active', tab === 'active');
  document.getElementById('tab-closed').classList.toggle('active', tab === 'closed');
  document.getElementById('filter-wrap').style.display = tab === 'active' ? 'flex' : 'none';
};

// ── 뒤로가기 ──────────────────────────────────────────
window.goBack = function() { location.href = 'dashboard.html'; };

// ── 필터 칩 ───────────────────────────────────────────
window.setFilter = function(filter) {
  currentFilter = filter;
  ['all','field','screen'].forEach(f => {
    document.getElementById('chip-' + f).classList.toggle('active', f === filter);
  });
  renderActiveList();
};

// ── 필드/스크린 토글 ───────────────────────────────────
window.setJoinType = function(type) {
  currentJoinType = type;
  document.getElementById('toggle-field').className = 'toggle-btn' + (type === 'field' ? ' active-day' : '');
  document.getElementById('toggle-screen').className = 'toggle-btn' + (type === 'screen' ? ' active-night' : '');
  document.getElementById('timetype-group').style.display = type === 'field' ? 'block' : 'none';
  document.getElementById('greenfee-group').style.display = type === 'field' ? 'block' : 'none';
};

window.setTimeType = function(type) {
  currentTimeType = type;
  document.getElementById('toggle-day').className = 'toggle-btn' + (type === 'day' ? ' active-day' : '');
  document.getElementById('toggle-night').className = 'toggle-btn' + (type === 'night' ? ' active-night' : '');
};

// ── 관리자 모달 ───────────────────────────────────────
window.openAdminModal = function(id) {
  editingId = id;
  document.getElementById('admin-modal-title').textContent = id ? '조인 수정' : '조인 만들기';
  if (id) {
    const j = joins.find(x => x.id === id);
    if (j) {
      document.getElementById('admin-course').value = j.course || '';
      document.getElementById('admin-date').value = j.date || '';
      document.getElementById('admin-time').value = j.time || '';
      document.getElementById('admin-capacity').value = j.capacity || '';
      const gfRaw = String(j.greenfee || '').replace(/[^\d]/g, '');
      document.getElementById('admin-greenfee').value = gfRaw ? gfRaw.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
      document.getElementById('admin-kakao').value = j.kakaoUrl || 'https://open.kakao.com/o/gMGNFtah';
      document.getElementById('admin-memo').value = j.memo || '';
      window.setJoinType(j.joinType || 'field');
      window.setTimeType(j.timeType || 'day');
    }
  } else {
    document.getElementById('admin-course').value = '';
    document.getElementById('admin-date').value = '';
    document.getElementById('admin-time').value = '';
    document.getElementById('admin-capacity').value = '';
    document.getElementById('admin-greenfee').value = '';
    document.getElementById('admin-kakao').value = 'https://open.kakao.com/o/gMGNFtah';
    document.getElementById('admin-memo').value = '';
    window.setJoinType('field');
    window.setTimeType('day');
  }
  document.getElementById('admin-overlay').classList.add('open');
};

window.closeAdminModal = function() {
  document.getElementById('admin-overlay').classList.remove('open');
};

// ── 저장 ─────────────────────────────────────────────
window.saveJoin = async function() {
  const course   = document.getElementById('admin-course').value.trim();
  const date     = document.getElementById('admin-date').value;
  const time     = document.getElementById('admin-time').value;
  const capacity = document.getElementById('admin-capacity').value;
  const greenfee = document.getElementById('admin-greenfee').value.trim();
  const kakaoUrl = document.getElementById('admin-kakao').value.trim();
  const memo     = document.getElementById('admin-memo').value.trim();

  if (!course || !date || !time || !capacity || (currentJoinType === 'field' && !greenfee) || !kakaoUrl) {
    showToast('필수 항목을 모두 입력해주세요'); return;
  }

  const data = { course, date, time, capacity: Number(capacity), kakaoUrl, memo, timeType: currentTimeType, joinType: currentJoinType, status: 'recruiting', updatedAt: serverTimestamp() };
  if (currentJoinType === 'field') data.greenfee = greenfee;

  try {
    if (editingId) {
      await updateDoc(doc(db, 'joins', editingId), data);
      showToast('조인이 수정되었습니다');
    } else {
      data.createdAt = serverTimestamp();
      // 개설자 자동 참석 등록
      let creatorName = currentUser.displayName || '';
      try {
        const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
        if (userSnap.exists()) creatorName = userSnap.data().name || userSnap.data().nickname || creatorName;
      } catch (_) {}
      data.participants = [{ uid: currentUser.uid, name: creatorName || currentUser.email.split('@')[0], joinedAt: new Date().toISOString() }];
      await addDoc(collection(db, 'joins'), data);
      showToast('조인이 만들어졌습니다!');
    }
    closeAdminModal();
    await loadJoins();
  } catch (e) { showToast('저장 실패: ' + e.message); }
};

// ── 마감 ─────────────────────────────────────────────
window.confirmClose = function(id, name) {
  showConfirm('조인 마감', `"${name}" 조인을 마감합니다. 참여자에게 포인트가 자동 지급됩니다.`, async () => {
    // 1. 마감 처리
    await updateDoc(doc(db, 'joins', id), { status: 'closed' });

    // 2. 참여자 포인트 자동 적립
    const joinSnap = await getDoc(doc(db, 'joins', id));
    if (joinSnap.exists()) {
      const joinData = joinSnap.data();
      const participants = joinData.participants || [];
      const now = new Date().toISOString();
      await Promise.all(participants.map(async (p) => {
        if (!p.uid) return;
        // 유저 totalPoints 증가
        await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(10) });
        // 포인트 내역 기록
        await addDoc(collection(db, 'pointHistory'), {
          uid: p.uid,
          name: p.name || '골퍼',
          type: '조인참여',
          amount: 10,
          ref: name,
          date: now
        });
      }));
    }

    showToast(`마감 완료! 참여자 ${name} 포인트 +10 지급됨`);
    await loadJoins();
  });
};

// ── 삭제 ─────────────────────────────────────────────
window.confirmDelete = function(id, name) {
  showConfirm('조인 삭제', `"${name}" 조인을 삭제합니다. 복구할 수 없습니다.`, async () => {
    await deleteDoc(doc(db, 'joins', id));
    showToast('삭제되었습니다');
    await loadJoins();
  });
};

// ── 컨펌 ─────────────────────────────────────────────
let confirmCallback = null;
function showConfirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
window.closeConfirm = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
};
document.getElementById('confirm-ok-btn').onclick = async () => {
  if (confirmCallback) { await confirmCallback(); }
  window.closeConfirm();
};

// ── 참여하기 ──────────────────────────────────────────
window.participateJoin = async function(id) {
  if (!currentUser) return;
  if (!isPaidUser) { showToast('유료 회원 전용 기능입니다. 관리자에게 문의해 주세요.'); return; }
  const j = joins.find(x => x.id === id);
  if (!j) return;

  const participants = j.participants || [];
  const alreadyJoined = participants.some(p => p.uid === currentUser.uid);

  if (alreadyJoined) {
    showConfirm('참여 취소', `${j.course} 조인 참여를 취소하시겠습니까?`, async () => {
      try {
        const entry = participants.find(p => p.uid === currentUser.uid);
        await updateDoc(doc(db, 'joins', id), { participants: arrayRemove(entry) });
        showToast('참여가 취소되었습니다');
        await loadJoins();
      } catch (e) { showToast('오류: ' + e.message); }
    });
  } else {
    if (participants.length >= j.capacity) { showToast('정원이 마감되었습니다'); return; }

    // 1개월 4회 한도 체크
    const now = new Date();
    const thisYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const monthlyCount = joins.filter(x =>
      x.id !== id &&
      (x.participants || []).some(p => p.uid === currentUser.uid) &&
      (x.date || '').slice(0, 7) === thisYM
    ).length;
    if (monthlyCount >= 4) {
      showToast('이번 달 조인 참여 한도(4회)를 초과했습니다');
      return;
    }

    // 개인정보 동의 모달 - 기존 전화번호 미리 채우기
    pendingJoinId = id;
    try {
      const snap = await getDoc(doc(db, 'users', currentUser.uid));
      document.getElementById('consent-phone').value = snap.exists() ? (snap.data().phone || '') : '';
    } catch (_) { document.getElementById('consent-phone').value = ''; }
    document.getElementById('consent-modal').classList.add('show');
  }
};

// ── 개인정보 동의 후 참여 처리 ────────────────────────
let pendingJoinId = null;
window.confirmConsent = async function() {
  const id = pendingJoinId;
  const phone = document.getElementById('consent-phone').value.trim();
  if (!phone) { showToast('연락처를 입력해주세요'); return; }
  pendingJoinId = null;
  document.getElementById('consent-modal').classList.remove('show');
  if (!id) return;
  try {
    const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
    let realName = currentUser.displayName || currentUser.email.split('@')[0];
    if (userSnap.exists()) {
      const d = userSnap.data();
      realName = d.name || d.nickname || realName;
    }
    // 프로필에 전화번호 저장
    await updateDoc(doc(db, 'users', currentUser.uid), { phone });
    const entry = { uid: currentUser.uid, name: realName, phone, joinedAt: new Date().toISOString(), consentGiven: true };
    await updateDoc(doc(db, 'joins', id), { participants: arrayUnion(entry) });
    showToast('참여 신청이 완료되었습니다!');
    await loadJoins();
  } catch (e) { showToast('오류: ' + e.message); }
};

window.cancelConsent = function() {
  pendingJoinId = null;
  document.getElementById('consent-modal').classList.remove('show');
};

// ── 참여자 정보 조회 (어드민/주최자) ─────────────────

window.closeParticipantModal = function() {
  document.getElementById('participant-info-modal').classList.remove('show');

// ── 이미지 저장 (카드 직접 캡쳐) ──────────────────────
const APP_BASE = 'https://wlfmzhs.github.io/ggzon';

window.shareCard = async function(id) {
  if (typeof html2canvas === 'undefined') {
    showToast('이미지 저장 기능 로딩 중...');
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const cardEl = document.getElementById('card-' + id);
  if (!cardEl) return;

  // 캡쳐 전 버튼 영역 임시 숨김
  const hideEls = cardEl.querySelectorAll('.card-bottom-row, .card-admin-row');
  hideEls.forEach(el => el.style.visibility = 'hidden');

  // 카드를 패딩 있는 래퍼로 감싸서 캡쳐
  const wrapper = document.createElement('div');
  wrapper.style.cssText = `
    position: fixed; left: -9999px; top: 0;
    padding: 20px; background: #111;
    display: inline-block;
  `;
  // 카드 사이즈 맞춰 클론
  const clone = cardEl.cloneNode(true);
  // 클론에서도 버튼 숨김
  clone.querySelectorAll('.card-bottom-row, .card-admin-row').forEach(el => el.remove());
  // 클론 너비 고정
  clone.style.width = cardEl.offsetWidth + 'px';
  clone.style.margin = '0';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#111',
      scale: 3,
      useCORS: true,
      logging: false,
    });
    document.body.removeChild(wrapper);

    // 라운드 코너를 유지하는 클린 캔버스 생성
    const radius = 20 * 3; // border-radius 20px * scale 3
    const pad = 20 * 3;    // padding 20px * scale 3
    const out = document.createElement('canvas');
    out.width = canvas.width;
    out.height = canvas.height;
    const ctx = out.getContext('2d');

    // 배경
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, out.width, out.height);

    // 카드 영역에 라운드 클리핑
    const cx = pad, cy = pad;
    const cw = canvas.width - pad * 2;
    const ch = canvas.height - pad * 2;
    ctx.beginPath();
    ctx.moveTo(cx + radius, cy);
    ctx.lineTo(cx + cw - radius, cy);
    ctx.arcTo(cx + cw, cy, cx + cw, cy + radius, radius);
    ctx.lineTo(cx + cw, cy + ch - radius);
    ctx.arcTo(cx + cw, cy + ch, cx + cw - radius, cy + ch, radius);
    ctx.lineTo(cx + radius, cy + ch);
    ctx.arcTo(cx, cy + ch, cx, cy + ch - radius, radius);
    ctx.lineTo(cx, cy + radius);
    ctx.arcTo(cx, cy, cx + radius, cy, radius);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(canvas, 0, 0);

    // 저장 or 공유
    out.toBlob(async (blob) => {
      const j = joins.find(x => x.id === id);
      const file = new File([blob], 'golgab-join.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: (j?.course || '조인') + ' 모집' }); }
        catch (_) { triggerDownload(out); }
      } else {
        triggerDownload(out);
      }
    }, 'image/png');
  } catch (e) {
    if (document.body.contains(wrapper)) document.body.removeChild(wrapper);
    showToast('캡쳐 실패: ' + e.message);
  } finally {
    hideEls.forEach(el => el.style.visibility = '');
  }
};

function triggerDownload(canvas) {
  const a = document.createElement('a');
  a.download = 'golgab-join.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('이미지가 저장되었습니다');
}

// ── 카카오 공유 ───────────────────────────────────────
window.kakaoShare = function(id) {
  const j = joins.find(x => x.id === id);
  if (!j) return;

  if (!window.Kakao || !Kakao.isInitialized()) {
    showToast('카카오 SDK 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }

  const appLink = `${APP_BASE}/join.html#card-${id}`;
  const participants = j.participants || [];

  const contents = [
    {
      title: '날짜 / 시간',
      description: `${j.date} · ${j.time}`,
      imageUrl: 'https://wlfmzhs.github.io/ggzon/image/golgab-logo.png',
      link: { mobileWebUrl: appLink, webUrl: appLink },
    },
    {
      title: `참석 인원 ${participants.length} / ${j.capacity}명`,
      description: participants.map((p, i) => i === 0 ? `${p.name}(주최자)` : p.name).join(', '),
      link: { mobileWebUrl: appLink, webUrl: appLink },
    },
  ];
  if (j.greenfee) {
    contents.push({
      title: '그린피',
      description: fmtFee(j.greenfee),
      link: { mobileWebUrl: appLink, webUrl: appLink },
    });
  }

  Kakao.Share.sendDefault({
    objectType: 'list',
    headerTitle: `${j.course} ${j.joinType === 'screen' ? '스크린' : '필드'} 조인 모집`,
    headerLink: { mobileWebUrl: appLink, webUrl: appLink },
    contents,
    buttons: [
      {
        title: '앱에서 참여하기',
        link: {
          mobileWebUrl: appLink,
          webUrl: appLink,
        },
      },
    ],
  });
};

// ── 금액 포맷 ─────────────────────────────────────────
window.formatMoney = function(el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
};
function fmtFee(val) {
  if (!val) return '';
  const num = String(val).replace(/[^\d]/g, '');
  const formatted = num.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return formatted ? formatted + '원' : val;
}

// ── 토스트 ────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
