  <meta charset="UTF-8" />

  <title>조인 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --border: rgba(62,160,102,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
      overscroll-behavior: none;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      -webkit-transform: translateZ(0); transform: translateZ(0);
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 768px) {
      html, body { background: var(--green-dark); overflow: hidden; height: 100%; }
      body { align-items: flex-start; min-height: unset; }
      .phone { position: fixed; top: 0; left: 0; right: 0; height: 100svh; width: 100%; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }

    /* 로딩 */
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(62,160,102,0.3);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar {
      flex-shrink: 0; padding: 32px 18px 10px;
      display: flex; align-items: center; justify-content: space-between; z-index: 10;
      touch-action: none;
    }
    .appbar-left { display: flex; align-items: center; gap: 8px; }
    #btn-back {
      background: none; border: none; cursor: pointer; padding: 4px 8px 4px 0;
      color: var(--green-light); font-size: 20px; line-height: 1;
    }
    .appbar-title { font-size: 16px; font-weight: 900; }
    #btn-new-join {
      display: none;
      background: rgba(62,160,102,0.2); border: 1px solid rgba(62,160,102,0.4);
      color: var(--green-light); font-size: 12px; font-weight: 700;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: inherit;
    }

    .hidden { display: none !important; }

    /* 스크롤 */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; overscroll-behavior: none; -webkit-overflow-scrolling: auto; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 탭바 */
    .tab-bar {
      flex-shrink: 0; display: flex; border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .tab-btn {
      flex: 1; padding: 12px 0; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.4); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: var(--green-light); }

    .list-content { padding: 16px 16px 80px; }

    /* 조인 카드 - 주간 */
    .join-card {
      background: linear-gradient(135deg, rgba(45,122,79,0.25) 0%, rgba(10,36,6,0.5) 100%);
      border: 1px solid rgba(62,160,102,0.35);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .join-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(62,160,102,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    /* 야간 카드 */
    .join-card.night {
      background: linear-gradient(135deg, rgba(40,50,130,0.35) 0%, rgba(5,8,35,0.65) 100%);
      border-color: rgba(110,130,255,0.35);
    }
    .join-card.night::before {
      background: radial-gradient(circle, rgba(110,130,255,0.15) 0%, transparent 70%);
    }
    .join-card.night .card-action-btn {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .join-card.night .card-meta-icon { color: #8899ff; }
    .join-card.night .participant-count-badge {
      color: #8899ff; background: rgba(100,120,255,0.15); border-color: rgba(100,120,255,0.3);
    }

    /* 스크린 카드 */
    .join-card.screen {
      background: linear-gradient(135deg, rgba(180,85,20,0.28) 0%, rgba(45,12,4,0.62) 100%);
      border-color: rgba(255,140,80,0.38);
    }
    .join-card.screen::before {
      background: radial-gradient(circle, rgba(255,140,80,0.15) 0%, transparent 70%);
    }
    .join-card.screen .card-meta-icon { color: #ff9a60; }
    .join-card.screen .card-progress-fill {
      background: linear-gradient(90deg, #c05a18, #ff8c45);
    }
    .join-card.screen .card-join-btn {
      background: linear-gradient(90deg, #c05a18, #ff8c45);
    }
    .join-card.screen .card-join-btn.joined {
      background: rgba(255,140,80,0.15);
      border: 1px solid rgba(255,140,80,0.4);
      color: #ff9a60;
    }
    .join-card.screen .participant-count-badge {
      color: #ff9a60; background: rgba(255,140,80,0.15); border-color: rgba(255,140,80,0.3);
    }

    /* 주간/야간 뱃지 */
    .day-label {
      font-size: 11px; font-weight: 700;
      color: var(--green-light);
      background: rgba(62,160,102,0.1);
      border: 1px solid rgba(62,160,102,0.2);
      padding: 2px 8px; border-radius: 8px;
    }
    .night-label {
      font-size: 11px; font-weight: 700; color: #8899ff;
      background: rgba(100,120,255,0.12);
      border: 1px solid rgba(100,120,255,0.25);
      padding: 2px 8px; border-radius: 8px;
    }
    .field-label {
      font-size: 11px; font-weight: 700; color: #f0c040;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      padding: 2px 8px; border-radius: 8px;
    }
    .screen-label {
      font-size: 11px; font-weight: 700; color: #ff8c69;
      background: rgba(255,140,105,0.1);
      border: 1px solid rgba(255,140,105,0.25);
      padding: 2px 8px; border-radius: 8px;
    }

    /* 필터 칩 */
    .filter-wrap {
      flex-shrink: 0; display: flex; gap: 7px;
      padding: 10px 16px 8px;
    }
    .filter-chip {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid rgba(62,160,102,0.3); background: transparent;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45);
      cursor: pointer; font-family: inherit; transition: all 0.18s;
    }
    .filter-chip.active {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .badge-open {
      background: #e74c3c; color: #fff;
      font-size: 9px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .badge-closed {
      background: transparent; color: rgba(255,255,255,0.35);
      border: 1.5px solid rgba(255,255,255,0.2);
      font-size: 9px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 10px;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .card-status-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .card-title {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 16px;
    }
    .card-meta { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .card-meta-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.65);
    }
    .card-meta-icon {
      width: 14px; height: 14px; color: var(--green-light); flex-shrink: 0;
    }
    .card-meta-label { color: rgba(255,255,255,0.35); min-width: 52px; }
    .card-meta-val { color: #fff; font-weight: 800; }
    .card-meta-memo { color: rgba(255,255,255,0.75); font-weight: 600; font-size: 11px; line-height: 1.5; white-space: pre-line; flex: 1; }

    /* 참석 인원 프로그레스 */
    .card-progress-area { margin-bottom: 16px; }
    .card-progress-top {
      display: flex; justify-content: space-between;
      font-size: 11px; margin-bottom: 5px;
    }
    .card-progress-label { color: rgba(255,255,255,0.45); }
    .card-progress-num { color: var(--green-light); font-weight: 700; }
    .card-progress-bar {
      height: 5px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .card-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light));
      border-radius: 3px; transition: width 0.5s ease;
    }
    .join-card.night .card-progress-fill {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }

    /* 참여하기 버튼 */
    .card-join-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      color: #fff; font-size: 15px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s; margin-bottom: 8px;
    }
    .card-join-btn:active { opacity: 0.8; }
    .card-join-btn.joined {
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.4);
      color: var(--green-light);
    }
    .card-join-btn.full {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.3);
      cursor: default;
    }
    .join-card.night .card-join-btn {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .join-card.night .card-join-btn.joined {
      background: rgba(100,120,255,0.15);
      border: 1px solid rgba(100,120,255,0.4);
      color: #8899ff;
    }

    /* 참석자 명단 */
    .participant-list {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .participant-list-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .participant-list-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.4); letter-spacing: 0.5px;
    }
    .participant-chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .participant-name-chip {
      font-size: 11px; font-weight: 800;
      color: var(--gold);
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      border-radius: 20px; padding: 4px 6px;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; text-align: center;
    }
    .participant-name-chip.me {
      background: rgba(240,192,64,0.2);
      border-color: rgba(240,192,64,0.45);
    }
    .participant-count-badge {
      font-size: 11px; font-weight: 800;
      color: var(--green-light);
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.3);
      padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .participant-empty {
      font-size: 11px; color: rgba(255,255,255,0.2);
      font-style: italic;
    }

    /* 스코어 버튼 */
    .card-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-score-btn {
      flex-shrink: 0;
      padding: 5px 11px;
      background: #e74c3c;
      border: none;
      color: #fff; font-size: 11px; font-weight: 900;
      border-radius: 20px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 4px;
      letter-spacing: 0.3px; line-height: 1;
      animation: pulse-red 1.8s ease-in-out infinite;
    }
    .card-score-btn:active { opacity: 0.8; }
    @keyframes pulse-red { 0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); } 50% { box-shadow: 0 0 0 5px rgba(231,76,60,0); } }

    /* 하단 보조 버튼 행 */
    .card-bottom-row { display: flex; gap: 8px; }
    .card-share-btn {
      flex: 1; padding: 10px 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 700;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .card-share-btn:active { background: rgba(255,255,255,0.12); }
    .card-kakao-btn {
      flex: 1; padding: 10px 8px;
      background: rgba(254,229,0,0.12);
      border: 1px solid rgba(254,229,0,0.3);
      color: #ffe033; font-size: 12px; font-weight: 700;
      border-radius: 10px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      text-decoration: none;
    }
    .card-kakao-btn:active { background: rgba(254,229,0,0.2); }

    /* 관리자 버튼 */
    .card-admin-row { display: flex; gap: 8px; margin-top: 10px; }
    .card-edit-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(240,192,64,0.15); color: var(--gold);
      border: 1px solid rgba(240,192,64,0.3);
    }
    .card-close-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(231,76,60,0.15); color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
    }
    .card-delete-btn {
      flex: 1; padding: 8px; font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(180,0,0,0.2); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.35);
    }

    /* 마감 카드 */
    .past-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; margin-bottom: 8px;
      overflow: hidden;
    }
    .past-card-header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; cursor: pointer;
    }
    .past-card-header:active { background: rgba(255,255,255,0.04); }
    .past-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .past-chevron {
      color: rgba(255,255,255,0.25); flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .past-card.open .past-chevron { transform: rotate(90deg); }

    /* 스코어 드롭다운 패널 */
    .past-score-panel {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .past-score-panel.open {
      max-height: 1200px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .ps-inner { padding: 14px 12px 16px; }
    .ps-summary {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      overflow: hidden; margin-bottom: 12px;
    }
    .ps-summary-row {
      display: grid; grid-template-columns: 34px 1fr auto auto;
      align-items: center; padding: 9px 12px; gap: 0 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ps-summary-row:last-child { border-bottom: none; }
    .ps-rank { font-size: 9px; font-weight: 900; letter-spacing: 0.04em; }
    .ps-rank.r1 { color: #f0c040; }
    .ps-rank.r2 { color: rgba(255,255,255,0.55); }
    .ps-rank.r3 { color: #cd8c5a; }
    .ps-rank.rn { color: rgba(255,255,255,0.25); }
    .ps-pname { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); }
    .ps-holes { font-size: 10px; color: rgba(255,255,255,0.25); text-align: right; }
    .ps-score { font-size: 15px; font-weight: 900; color: #fff; text-align: right; min-width: 30px; }
    .ps-score.under { color: #e74c3c; }
    .ps-score.even  { color: rgba(255,255,255,0.8); }
    .ps-table-wrap { overflow-x: auto; }
    .ps-table-wrap + .ps-table-wrap { margin-top: 10px; }
    .ps-table { width: 100%; border-collapse: collapse; }
    .ps-table .ps-hdr { background: rgba(255,255,255,0.88); }
    .ps-table .ps-hdr th { font-size: 9px; font-weight: 900; color: #111; text-align: center; padding: 6px 1px; }
    .ps-table .ps-hdr th.ps-th-nm { text-align: left; padding-left: 4px; font-size: 8px; letter-spacing: 0.3px; }
    .ps-table .ps-hdr th.ps-th-t  { color: #7a5c00; min-width: 26px; }
    .ps-table .ps-row { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ps-table .ps-row:last-child { border-bottom: none; }
    .ps-table .ps-row td { text-align: center; padding: 4px 1px; vertical-align: middle; }
    .ps-table .ps-row td.ps-nm { text-align: left; padding-left: 4px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); white-space: nowrap; }
    .ps-table .ps-row td.ps-tt { font-size: 10px; font-weight: 900; color: #f0c040; background: rgba(10,36,6,0.7); min-width: 26px; }
    .ps-chip { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; border-radius: 3px; }
    .ps-chip.ps-under { background: #e74c3c; border-radius: 50%; color: #fff; }
    .ps-chip.ps-zero  { color: rgba(255,255,255,0.9); }
    .ps-chip.ps-over  { color: rgba(255,255,255,0.9); }
    .ps-chip.ps-empty { border: 1px solid rgba(255,255,255,0.1); }
    .ps-no-score { padding: 20px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); }
    .ps-loading { padding: 20px; display: flex; align-items: center; justify-content: center; }

    .past-info { flex: 1; min-width: 0; }
    .past-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .past-type { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; vertical-align: middle; margin-left: 5px; }
    .type-field  { background: rgba(62,160,102,0.15); color: var(--green-light); }
    .type-screen { background: rgba(90,140,255,0.15); color: #7aaeff; }
    .past-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
    .past-badge {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px; flex-shrink: 0;
    }
    .past-delete-btn {
      flex-shrink: 0;
      background: rgba(180,0,0,0.15); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.25);
      font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 13px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    .load-more-btn {
      display: block; width: calc(100% - 28px); margin: 4px 14px 24px;
      padding: 13px; border-radius: 12px;

let allCoursesDocs = [...LOCAL_COURSES];

async function loadCourseDocs() {
  // 로컬 목록 기본값으로 시작 후 Firestore에서 nineHoles 등 추가 데이터 병합
  try {
    const snap = await getDocs(collection(db, 'courses'));
    snap.docs.forEach(d => {
      const remote = { id: d.id, ...d.data() };
      const idx = allCoursesDocs.findIndex(c => c.id === d.id);
      if (idx >= 0) {
        allCoursesDocs[idx] = { ...allCoursesDocs[idx], ...remote };
      } else {
        allCoursesDocs.push(remote);
      }
    });
  } catch(_) {}
}

function setupCourseAC() {
  const inp  = document.getElementById('admin-course');
  const list = document.getElementById('ac-course');
  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    if (!q) { list.style.display = 'none'; return; }
    const hits = allCoursesDocs.filter(c => (c.name || c.id).includes(q)).slice(0, 7);
    if (!hits.length) { list.style.display = 'none'; return; }
    list.innerHTML = hits.map(c => {
      const sub = [c.region, c.city].filter(Boolean).join(' ');
      return `<div class="ac-item" onmousedown="window._selectCourse('${c.id}')">
        <span style="font-weight:800;">${c.name || c.id}</span>
        ${sub ? `<span style="font-size:11px;color:rgba(255,255,255,0.35);margin-left:6px;">${sub}</span>` : ''}
      </div>`;
    }).join('');
    list.style.display = 'block';
  });
  inp.addEventListener('blur', () => {
    setTimeout(() => list.style.display = 'none', 200);
    updateSubCourseChips(inp.value.trim());
  });
}

window._selectCourse = function(courseId) {
  const cd = allCoursesDocs.find(c => c.id === courseId);
  if (!cd) return;
  document.getElementById('admin-course').value = cd.name || cd.id;
  document.getElementById('ac-course').style.display = 'none';
  updateSubCourseChips(cd.name || cd.id);
};

function updateSubCourseChips(courseName) {
  const cd = allCoursesDocs.find(c => (c.name || c.id) === courseName);
  const names = cd ? Object.keys(cd.nineHoles || {}) : [];
  ['front', 'back'].forEach(side => {
    const chips = document.getElementById(`${side}-chips`);
    chips.innerHTML = names.map(n =>
      `<span class="ac-chip" onmousedown="window._selectSubCourse('${side}','${n}')">${n}</span>`
    ).join('');
    const list  = document.getElementById(`ac-${side}`);
    const input = document.getElementById(`admin-${side}-course`);
    const showSubList = (q) => {
      if (!names.length) { list.style.display = 'none'; return; }
      const hits = q ? names.filter(n => n.includes(q)) : names;
      if (!hits.length) { list.style.display = 'none'; return; }
      list.innerHTML = hits.map(n =>
        `<div class="ac-item" onmousedown="window._selectSubCourse('${side}','${n}')">${n}</div>`
      ).join('');
      list.style.display = 'block';
    };
    input.oninput = () => showSubList(input.value.trim());
    input.onfocus = () => showSubList(input.value.trim());
    input.onblur  = () => setTimeout(() => list.style.display = 'none', 200);
  });
}

window._selectSubCourse = function(side, name) {
  document.getElementById(`admin-${side}-course`).value = name;
  document.getElementById(`ac-${side}`).style.display = 'none';
};

// ── 로드 ──────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tz).toISOString().slice(0, 10);
}

function sortByDateDesc(list) {
  return list.sort((a, b) => {
    const ta = a.date && a.time ? a.date + 'T' + a.time : '0000-00-00T00:00';
    const tb = b.date && b.time ? b.date + 'T' + b.time : '0000-00-00T00:00';
    return tb.localeCompare(ta);
  });
}

async function loadJoins() {
  closedLastDoc = null;
  closedHasMore = false;
  try {
    const today = todayStr();

    // 오늘 이후(진행중) 조인 — 전체
    const upcomingSnap = await getDocs(query(
      collection(db, 'joins'),
      where('date', '>=', today),
      orderBy('date', 'asc')
    ));
    const upcoming = upcomingSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    joins = upcoming.filter(j => j.status !== 'closed');
    const closedToday = upcoming.filter(j => j.status === 'closed');

    // 마감(오늘 이전) 조인 — 최근 N개만
    const closedSnap = await getDocs(query(
      collection(db, 'joins'),
      where('date', '<', today),
      orderBy('date', 'desc'),
      limit(CLOSED_PAGE_SIZE)
    ));
    const pastClosed = closedSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    closedLastDoc = closedSnap.docs[closedSnap.docs.length - 1] || null;
    closedHasMore = closedSnap.docs.length === CLOSED_PAGE_SIZE;

    closedJoins = sortByDateDesc([...closedToday, ...pastClosed]);

    // 전체 마감 조인 개수 (오늘 이전 전체 + 오늘 이후 마감) — 데이터를 모두 불러오지 않고 count만 조회
    try {
      const pastCountSnap = await getCountFromServer(query(
        collection(db, 'joins'),
        where('date', '<', today)
      ));
      closedTotal = pastCountSnap.data().count + closedToday.length;
    } catch (e) {
      closedTotal = null;
    }
  } catch (e) {
    joins = []; closedJoins = []; closedHasMore = false; closedTotal = null;
  }
  renderActiveList();
  renderClosedList();
  updateTabCounts();
}

// ── 마감 더보기 ───────────────────────────────────────
window.loadMoreClosed = async function() {
  if (!closedLastDoc || !closedHasMore) return;
  const btn = document.getElementById('btn-load-more-closed');
  if (btn) { btn.disabled = true; btn.textContent = '불러오는 중... (데이터가 많으면 시간이 걸릴 수 있어요)'; }
  try {
    const today = todayStr();
    const snap = await getDocs(query(
      collection(db, 'joins'),
      where('date', '<', today),
      orderBy('date', 'desc'),
      startAfter(closedLastDoc),
      limit(CLOSED_PAGE_SIZE)
    ));
    const more = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    closedJoins = sortByDateDesc([...closedJoins, ...more]);
    closedLastDoc = snap.docs[snap.docs.length - 1] || closedLastDoc;
    closedHasMore = snap.docs.length === CLOSED_PAGE_SIZE;
  } catch (e) {
    showToast('불러오기 실패');
  }
  renderClosedList();
};

function updateTabCounts() {
  const activeCount = joins.filter(j => j.status !== 'closed').length;
  // 전체 마감 개수를 우선 사용, 조회 실패 시 로드된 개수(+)로 폴백
  const closedCount = closedTotal !== null ? closedTotal : (closedJoins.length + (closedHasMore ? '+' : ''));
  document.getElementById('tab-active').textContent = `조인 진행중 (${activeCount})`;
  document.getElementById('tab-closed').textContent = `마감 (${closedCount})`;
}

function renderActiveList() {
  const el = document.getElementById('active-list');
  let active = joins.filter(j => j.status !== 'closed');
  if (currentFilter !== 'all') active = active.filter(j => j.joinType === currentFilter);
  if (!active.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⛳</div>${isAdmin && currentFilter === 'all' ? '<button onclick="window.openAdminModal(null)" style="background:rgba(62,160,102,0.2);color:var(--green-light);border:1px solid rgba(62,160,102,0.4);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ 첫 번째 조인 만들기</button>' : '현재 모집중인 조인이 없습니다'}</div>`;
    return;
  }
  el.innerHTML = active.map(j => buildCard(j)).join('');
}

// ── 마감 렌더 ─────────────────────────────────────────
function renderClosedList() {
  const el = document.getElementById('closed-list');
  const repairBar = document.getElementById('admin-repair-bar');
  if (repairBar) repairBar.style.display = isAdmin ? 'block' : 'none';
  const closed = closedJoins;
  if (!closed.length) {
    el.innerHTML = `<div class="empty-state">마감된 조인이 없습니다</div>`;
    return;
  }
  const moreBtn = closedHasMore
    ? `<button class="load-more-btn" id="btn-load-more-closed" onclick="window.loadMoreClosed()">더보기</button>`
    : '';
  el.innerHTML = closed.map(j => {
    const typeLabel = j.joinType === 'screen' ? '스크린' : '필드';
    const typeCls   = j.joinType === 'screen' ? 'type-screen' : 'type-field';
    const hasScore  = j.joinType !== 'screen';
    const chevron   = hasScore ? `<svg class="past-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>` : '';
    return `
    <div class="past-card" id="past-${j.id}">
      <div class="past-card-header" ${hasScore ? `onclick="window.toggleScorePanel('${j.id}')"` : ''}>
        <div class="past-info">
          <div class="past-name">${j.course} <span class="past-type ${typeCls}">${typeLabel}</span></div>
          <div class="past-sub">${j.date} · ${j.time || ''}${j.greenfee ? ' · ' + j.greenfee : ''}</div>
        </div>
        <div class="past-card-right">
          ${chevron}
          <span class="past-badge">마감</span>
          ${isAdmin ? `<button class="past-delete-btn" onclick="event.stopPropagation();window.confirmDelete('${j.id}','${j.course}')">삭제</button>` : ''}
        </div>
      </div>
      ${hasScore ? `<div class="past-score-panel" id="score-panel-${j.id}"></div>` : ''}
    </div>`;
  }).join('') + moreBtn;
}

// ── 마감 카드 스코어 드롭다운 ─────────────────────────
const _scorePanelCache = {};

window.toggleScorePanel = async function(id) {
  const card  = document.getElementById(`past-${id}`);
  const panel = document.getElementById(`score-panel-${id}`);
  if (!panel || !card) return;

  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);

  if (isOpen) return;

  if (_scorePanelCache[id]) { panel.innerHTML = _scorePanelCache[id]; return; }

  panel.innerHTML = `<div class="ps-loading"><div class="spinner"></div></div>`;
  try {
    const snap = await getDoc(doc(db, 'joins', id));
    const html = snap.exists() ? buildScorePanel(snap.data()) : `<div class="ps-no-score">데이터 없음</div>`;
    _scorePanelCache[id] = html;
    panel.innerHTML = html;
  } catch(_) {
    panel.innerHTML = `<div class="ps-no-score">불러오기 실패</div>`;
  }
};

function buildScorePanel(jData) {
  const players = jData.participants || [];
  const scores  = jData.scores || {};
  const hasAnyScore = players.some(p => ((scores[p.uid] || {}).holes || []).some(v => v !== null));
  if (!players.length || !hasAnyScore) {
    return `<div class="ps-no-score">기록된 스코어가 없습니다</div>`;
  }

  const ranked = players.map(p => {
    const holes  = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const hasAny = holes.some(v => v !== null);
    const tot    = hasAny ? holes.reduce((a, v) => a + (v ?? 0), 0) : null;
    return { ...p, tot, hasAny, holes };
  }).sort((a, b) => {
    if (a.hasAny !== b.hasAny) return a.hasAny ? -1 : 1;
    if (a.tot === null && b.tot === null) return 0;
    return a.tot - b.tot;
  });

  const rLabels = ['1ST','2ND','3RD','4TH','5TH','6TH'];
  const rCls    = ['r1','r2','r3','rn','rn','rn'];

  const summaryHtml = ranked.map((p, i) => {
    const lbl = p.tot === null ? '-' : p.tot === 0 ? 'E' : p.tot > 0 ? `+${p.tot}` : String(p.tot);
    const cls = p.tot === null ? '' : p.tot < 0 ? 'under' : p.tot === 0 ? 'even' : '';
    const entered = p.holes.filter(v => v !== null).length;
    return `<div class="ps-summary-row">
      <span class="ps-rank ${rCls[i]||'rn'}">${rLabels[i]||`${i+1}TH`}</span>
      <span class="ps-pname">${p.name}</span>
      <span class="ps-holes">${p.hasAny ? `${entered}H` : '-'}</span>
      <span class="ps-score ${cls}">${lbl}</span>
    </div>`;
  }).join('');

  return `<div class="ps-inner">
    <div class="ps-summary">${summaryHtml}</div>
    <div class="ps-table-wrap">${buildPanelTable(players, scores, 0, 9)}</div>
    <div class="ps-table-wrap">${buildPanelTable(players, scores, 9, 18)}</div>
  </div>`;
}

function buildPanelTable(players, scores, from, to) {
  const nums = Array.from({length: to - from}, (_, i) => from + i + 1);
  const rows = players.map(p => {
    const holes  = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const slice  = holes.slice(from, to);
    const hasAny = slice.some(v => v !== null);
    const sub    = slice.reduce((a, v) => a + (v ?? 0), 0);
    const cells  = slice.map(v => {
      if (v === null) return `<td><div class="ps-chip ps-empty"></div></td>`;
      const cc  = v < 0 ? 'ps-under' : v === 0 ? 'ps-zero' : 'ps-over';
      const lbl = v === 0 ? '0' : v > 0 ? `+${v}` : String(v);
      return `<td><div class="ps-chip ${cc}">${lbl}</div></td>`;
    }).join('');
    const tot = !hasAny ? '-' : sub === 0 ? 'E' : sub > 0 ? `+${sub}` : String(sub);
    return `<tr class="ps-row"><td class="ps-nm">${p.name}</td>${cells}<td class="ps-tt">${tot}</td></tr>`;
  }).join('');

  return `<table class="ps-table">
    <thead><tr class="ps-hdr">
      <th class="ps-th-nm">HOLE</th>
      ${nums.map(n => `<th>${n}</th>`).join('')}
      <th class="ps-th-t">T</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function buildCard(j) {
  const isNight = j.timeType === 'night';
  const timeBadge = j.joinType === 'screen' ? ''
    : isNight ? `<span class="night-label">🌙 야간</span>`
    : `<span class="day-label">☀️ 주간</span>`;
  const joinTypeBadge = j.joinType === 'screen'
    ? `<span class="screen-label">🖥️ 스크린</span>`
    : `<span class="field-label">⛳ 필드</span>`;

  const createdDate = j.createdAt?.seconds ? new Date(j.createdAt.seconds * 1000) : null;
  const createdStr = createdDate
    ? `${createdDate.getFullYear()}.${String(createdDate.getMonth()+1).padStart(2,'0')}.${String(createdDate.getDate()).padStart(2,'0')}`
    : '';
  const daysPassed = createdDate ? Math.floor((Date.now() - createdDate.getTime()) / 86400000) : 0;
  const daysLabel = createdDate ? `${createdStr} (${daysPassed === 0 ? '오늘' : daysPassed + '일지남'})` : '';

  const teeTime = j.date && j.time ? new Date(j.date + 'T' + j.time) : null;
  const isTeeingSoon = teeTime && (teeTime.getTime() - Date.now()) <= 5 * 60 * 60 * 1000;

  const participants = j.participants || [];
  const currentCount = participants.length;
  const isFull = currentCount >= j.capacity;
  const alreadyJoined = currentUser && participants.some(p => p.uid === currentUser.uid);
  const fillPct = j.capacity > 0 ? Math.min(100, Math.round(currentCount / j.capacity * 100)) : 0;

  let joinBtnText = '참여하기';
  let joinBtnClass = 'card-join-btn';
  if (alreadyJoined) { joinBtnText = '✓ 참여중 (취소)'; joinBtnClass += ' joined'; }
  else if (isFull)   { joinBtnText = '마감'; joinBtnClass += ' full'; }

  const isAuthor = currentUser && (j.creatorUid === currentUser.uid || (j.participants?.[0]?.uid === currentUser.uid));
  const adminRow = (isAdmin || isAuthor) ? `
    <div class="card-admin-row">
      <button class="card-edit-btn" onclick="window.openAdminModal('${j.id}')">수정</button>
      ${isAdmin ? `<button class="card-close-btn" onclick="window.confirmClose('${j.id}','${j.course}')">마감</button>
      <button class="card-delete-btn" onclick="window.confirmDelete('${j.id}','${j.course}')">삭제</button>` : ''}
    </div>` : '';
  const memo = '';

  return `
    <div class="join-card ${j.joinType === 'screen' ? 'screen' : isNight ? 'night' : ''}" id="card-${j.id}">
      <div class="card-status-row">
        ${(isTeeingSoon || isFull)
          ? `<span class="badge-closed">모집 마감${daysLabel ? ` · ${daysLabel}` : ''}</span>`
          : `<span class="badge-open">모집중${daysLabel ? ` · ${daysLabel}` : ''}</span>`
        }
        ${joinTypeBadge}
        ${timeBadge}
      </div>
      <div class="card-title-row">
        <div class="card-title" style="margin-bottom:0">${j.course}</div>
        ${j.joinType !== 'screen' ? `
        <button class="card-score-btn" onclick="event.stopPropagation();location.href='score.html?id=${j.id}'">
          <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" style="flex-shrink:0;"><circle cx="4" cy="4" r="4"/></svg>
          LIVE 스코어
        </button>` : ''}
      </div>
      <div class="card-meta">
        <div class="card-meta-row">${icons.calendar}<span class="card-meta-label">날짜</span><span class="card-meta-val">${j.date}</span></div>
        <div class="card-meta-row">${icons.clock}<span class="card-meta-label">시간</span><span class="card-meta-val">${j.time}</span></div>
        <div class="card-meta-row">${icons.users}<span class="card-meta-label">참석 인원</span><span class="card-meta-val">${currentCount} / ${j.capacity}명</span></div>
        ${j.joinType !== 'screen' && j.greenfee ? `<div class="card-meta-row">${icons.money}<span class="card-meta-label">그린피</span><span class="card-meta-val">${fmtFee(j.greenfee)}</span></div>` : ''}
        ${j.memo ? `<div class="card-meta-row" style="align-items:flex-start;">${icons.note}<span class="card-meta-label">참고</span><span class="card-meta-memo">${j.memo}</span></div>` : ''}
      </div>
      <div class="card-progress-area">
        <div class="card-progress-top">
          <span class="card-progress-label">모집 현황</span>
          <span class="card-progress-num">${currentCount}/${j.capacity}명</span>
        </div>
        <div class="card-progress-bar"><div class="card-progress-fill" style="width:${fillPct}%"></div></div>
      </div>
      <div class="participant-list">
        <div class="participant-list-top">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="participant-list-label">참석자</span>
            <span style="font-size:10px;color:rgba(240,192,64,0.6);font-weight:700;">★ 주최자</span>
          </div>
          <span class="participant-count-badge">${currentCount}/${j.capacity}</span>
        </div>
        ${participants.length === 0
          ? `<span class="participant-empty">아직 없음</span>`
          : `<div class="participant-chips">${participants.map((p, i) => {
              const isMe = currentUser && p.uid === currentUser.uid;
              const isGuest = p.isGuest === true;
              const canView = isAdmin && !isGuest;
              const click = canView ? `onclick="window.viewParticipant('${j.id}','${p.uid}')"` : '';
              const style = canView ? 'cursor:pointer;' : '';
              const chipClass = isMe ? ' me' : isGuest ? ' guest' : '';
              const label = p.name + (i === 0 ? ' ★' : '') + (isGuest ? ' G' : '');
              return `<span class="participant-name-chip${chipClass}" ${click} style="${style}">${label}</span>`;
            }).join('')}</div>`
        }
      </div>
      ${memo}
      <button class="${joinBtnClass}" ${isFull && !alreadyJoined ? 'disabled' : ''} onclick="window.participateJoin('${j.id}')">
        ${joinBtnText}
      </button>
      <div class="card-bottom-row">
        <button class="card-share-btn" onclick="window.shareCard('${j.id}')">공유용 이미지 저장</button>
        <button class="card-kakao-btn" onclick="window.kakaoShare('${j.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.49 1.39 4.69 3.5 6.1L4.5 21l4.37-2.62A11.3 11.3 0 0 0 12 18c5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/></svg>
          카카오 공유
        </button>
      </div>
      ${adminRow}
    </div>`;
}

// ── 키보드 올라올 때 오버레이 높이 + 스크롤 동시 조정 ──────────────
(function() {
  const adminScroll = document.querySelector('.admin-scroll');
  const adminOverlay = document.getElementById('admin-overlay');

  function adjust() {
    if (!adminOverlay.classList.contains('open')) return;
    const vp = window.visualViewport;
    if (!vp) return;
    const kb = Math.max(0, window.innerHeight - (vp.offsetTop + vp.height));
    if (kb > 10) {
      adminOverlay.style.bottom = kb + 'px';
      adminScroll.style.paddingBottom = '20px';
      const el = document.activeElement;
      if (el && adminScroll.contains(el) && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
        setTimeout(() => {
          const rect = el.getBoundingClientRect();
          if (rect.bottom > vp.height - 20) {
            adminScroll.scrollTop += rect.bottom - vp.height + 60;
          }
        }, 50);
      }
    } else {
      adminOverlay.style.bottom = '';
      adminScroll.style.paddingBottom = '';
    }
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', adjust);
  }
  adminScroll.addEventListener('focusin', e => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') return;
    setTimeout(adjust, 100);
    setTimeout(adjust, 350);
    setTimeout(adjust, 600);
  });
  adminScroll.addEventListener('focusout', () => {
    setTimeout(() => {
      if (!adminScroll.contains(document.activeElement)) {
        adminOverlay.style.bottom = '';
        adminScroll.style.paddingBottom = '';
      }
    }, 200);
  });
})();

// ── 저장 ─────────────────────────────────────────────
window.saveJoin = async function() {
  const course      = document.getElementById('admin-course').value.trim();
  const date        = document.getElementById('admin-date').value;
  const time        = document.getElementById('admin-time').value;
  const capacity    = document.getElementById('admin-capacity').value;
  const greenfee    = document.getElementById('admin-greenfee').value.trim();
  const kakaoUrl    = document.getElementById('admin-kakao').value.trim();
  const memo        = document.getElementById('admin-memo').value.trim();
  const frontCourse = document.getElementById('admin-front-course').value.trim();
  const backCourse  = document.getElementById('admin-back-course').value.trim();

  if (!course || !date || !time || !capacity || !kakaoUrl) {
    showToast('필수 항목을 모두 입력해주세요'); return;
  }
  if (currentJoinType === 'field' && (!greenfee || !frontCourse || !backCourse)) {
    showToast('필드 조인은 그린피·전반·후반 코스를 모두 입력해주세요'); return;
  }

  const data = { course, date, time, capacity: Number(capacity), kakaoUrl, memo, timeType: currentTimeType, joinType: currentJoinType, status: 'recruiting', updatedAt: serverTimestamp(), creatorUid: currentUser.uid };
  if (currentJoinType === 'field') { data.greenfee = greenfee; data.frontCourse = frontCourse; data.backCourse = backCourse; }

  // 게스트 entries 생성
  const guestEntries = guestList.map((name, i) => ({
    uid: 'guest_' + Date.now() + '_' + i,
    name,
    isGuest: true,
    joinedAt: new Date().toISOString(),
  }));

  try {
    if (editingId) {
      // 수정 시: 기존 일반 참여자 유지, 게스트만 교체
      const joinSnap = await getDoc(doc(db, 'joins', editingId));
      const existing = joinSnap.exists() ? (joinSnap.data().participants || []) : [];
      const regularParticipants = existing.filter(p => !p.isGuest);
      data.participants = [...regularParticipants, ...guestEntries];
      await updateDoc(doc(db, 'joins', editingId), data);
      showToast('조인이 수정되었습니다');
    } else {
      data.createdAt = serverTimestamp();
      const isEmptyRoom = document.getElementById('admin-empty-room').value === '1';
      if (isEmptyRoom) {
        data.participants = [...guestEntries];
      } else {
        let creatorName = currentUser.displayName || '';
        try {
          const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
          if (userSnap.exists()) creatorName = userSnap.data().name || userSnap.data().nickname || creatorName;
        } catch (_) {}
        data.participants = [
          { uid: currentUser.uid, name: creatorName || (currentUser.email || '').split('@')[0] || '골퍼', joinedAt: new Date().toISOString() },
          ...guestEntries,
        ];
      }
      await addDoc(collection(db, 'joins'), data);
      showToast('조인이 만들어졌습니다!');
    }
    closeAdminModal();
    await loadJoins();
  } catch (e) { showToast('저장 실패: ' + e.message); }
};

window.confirmClose = function(id, name) {
  showConfirm('조인 마감', `"${name}" 조인을 마감합니다.\n연결된 팀이 있다면 함께 마감되며, 입력된 스코어·포인트·랭킹이 자동 처리됩니다.`, async () => {
    const joinSnap = await getDoc(doc(db, 'joins', id));
    if (!joinSnap.exists()) return;
    const joinNow = joinSnap.data();
    const pids = joinNow.partyIds || (joinNow.partyId ? [joinNow.partyId] : []);
    const allIds = [id, ...pids];

    const results = await Promise.all(allIds.map(x => closeJoinAndAward(x)));

    if (results.some(Boolean)) {
      showToast(allIds.length > 1
        ? `마감 완료! 연결된 ${allIds.length}개 조인 스코어·포인트·랭킹 자동 처리됨`
        : '마감 완료! 스코어·포인트·랭킹 자동 처리됨');
    } else {
      showToast('마감 완료! (이미 처리됨)');
    }

    await loadJoins();
  });
};

// 참가자 1명의 scoreHistory 문서를 없을 때만 생성하고 핸디캡/통계를 재계산한다. (멱등)
async function ensureScoreHistory(joinData, joinId, p, pHoles, pTotal) {
  const histRef = doc(db, 'users', p.uid, 'scoreHistory', joinId);
  const histSnap = await getDoc(histRef);
  if (histSnap.exists()) return false;
  await setDoc(histRef, {
    course:      joinData.course      || '',
    frontCourse: joinData.frontCourse || '',
    backCourse:  joinData.backCourse  || '',
    date:        joinData.date        || '',
    companions:  (joinData.participants || []).filter(x => x.uid !== p.uid).map(x => ({ name: x.name, uid: x.uid })),
    totalScore:  pTotal,
    holes:       pHoles,
    parHoles:    [],
    joinId,
    submittedAt: serverTimestamp(),
  });
  try {
    const allHistSnap = await getDocs(
      query(collection(db, 'users', p.uid, 'scoreHistory'), orderBy('submittedAt', 'desc'))
    );
    const allScores = allHistSnap.docs.map(d => d.data().totalScore ?? 0);
    const recent10  = allScores.slice(0, 10);
    const handicap  = recent10.length
      ? Math.round(recent10.reduce((a, b) => a + b, 0) / recent10.length * 10) / 10
      : null;
    const recent3 = allScores.slice(0, 3), prev3 = allScores.slice(3, 6);
    const handicapTrend = (recent3.length === 3 && prev3.length === 3)
      ? Math.round((recent3.reduce((a,b)=>a+b,0)/3 - prev3.reduce((a,b)=>a+b,0)/3) * 10) / 10
      : null;
    await updateDoc(doc(db, 'users', p.uid), {
      handicap, bestScore: allScores.length ? Math.min(...allScores) : null,
      roundCount: allScores.length, handicapTrend, statsUpdatedAt: serverTimestamp(),
    });
  } catch(_) {}
  return true;
}

const scoreBonusPts = t => t < 0 ? 40 : t <= 5 ? 30 : t <= 9 ? 20 : t <= 15 ? 15 : 10;
const scoreBonusLabel = t => t < 0 ? '언더파' : t <= 5 ? 'E~+5' : t <= 9 ? '+6~+9' : t <= 15 ? '+10~+15' : '+16이상';

// 조인 1개를 마감 처리하고 참가자 포인트/스코어 기록/핸디캡을 정리한다.
// 참가자별 지급 원장(pointAwardedUids/scoreAwardedUids)으로 멱등하게 처리하므로
// 스코어가 나중에 들어와도 재마감/복구 시 누락분만 안전하게 채워진다.
// 반환값: 새로 포인트 처리를 했으면 true, 없으면 false
async function closeJoinAndAward(id, monthlyPool = joins) {
  const joinSnap = await getDoc(doc(db, 'joins', id));
  if (!joinSnap.exists()) return false;
  const joinNow = joinSnap.data();
  const participants = joinNow.participants || [];
  const scores = joinNow.scores || {};
  const now = new Date().toISOString();

  if (joinNow.status !== 'closed') await updateDoc(doc(db, 'joins', id), { status: 'closed' });

  // 레거시 안전장치: 원장이 없는데 예전 방식으로 이미 지급(pointsAwarded)된 조인은
  // 전원 지급된 것으로 간주해 포인트 재지급을 막고(이중지급 방지), scoreHistory만 보강한다.
  const hasLedger = Array.isArray(joinNow.pointAwardedUids) || Array.isArray(joinNow.scoreAwardedUids);
  const legacyAwarded = !hasLedger && joinNow.pointsAwarded === true;
  const pointAwardedUids = new Set(joinNow.pointAwardedUids || (legacyAwarded ? participants.map(p => p.uid) : []));
  const scoreAwardedUids = new Set(joinNow.scoreAwardedUids || (legacyAwarded ? participants.map(p => p.uid) : []));

  let didAward = false;

  await Promise.all(participants.map(async (p) => {
    if (!p.uid || p.isGuest) return;
    const pHoles = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const pTotal = pHoles.reduce((a, v) => a + (v ?? 0), 0);
    const hasScore = pHoles.some(v => v !== null);

    // 1. scoreHistory 저장 + 핸디캡 갱신 (스코어 있으면 항상 멱등 보강)
    if (hasScore) await ensureScoreHistory(joinNow, id, p, pHoles, pTotal);

    // 2. 이번 달 참여 횟수 확인 (이 조인 제외하고 같은 달 마감된 필드 조인 수, 스크린 제외)
    const joinMonth = (joinNow.date || '').slice(0, 7);
    const priorMonthlyCount = monthlyPool.filter(x =>
      x.id !== id &&
      x.status === 'closed' &&
      x.joinType !== 'screen' &&
      (x.date || '').slice(0, 7) === joinMonth &&
      (x.participants || []).some(px => px.uid === p.uid)
    ).length;
    const eligibleForPoints = priorMonthlyCount < 4;

    // 3. 조인참여 포인트 +10 (월 4회 이하 + 미지급 참가자만)
    if (eligibleForPoints && !pointAwardedUids.has(p.uid)) {
      await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(10) });
      await addDoc(collection(db, 'pointHistory'), {
        uid: p.uid, name: p.name || '골퍼',
        type: '조인참여', amount: 10, ref: joinNow.course || '', date: now,
        roundDate: joinNow.date || '', joinId: id,
      });
      pointAwardedUids.add(p.uid);
      didAward = true;
    }

    // 4. 스코어 보너스 포인트 (미지급 참가자만)
    if (eligibleForPoints && hasScore && !scoreAwardedUids.has(p.uid)) {
      const pts = scoreBonusPts(pTotal);
      await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(pts) });
      await addDoc(collection(db, 'pointHistory'), {
        uid: p.uid, name: p.name || '골퍼',
        type: '스코어', amount: pts,
        ref: `${joinNow.course || '라운드'} (${scoreBonusLabel(pTotal)})`, date: now,
        roundDate: joinNow.date || '', joinId: id,
      });
      scoreAwardedUids.add(p.uid);
      didAward = true;
    }
  }));

  await updateDoc(doc(db, 'joins', id), {
    pointsAwarded: true, scoreBonusAwarded: true,
    pointAwardedUids: Array.from(pointAwardedUids),
    scoreAwardedUids: Array.from(scoreAwardedUids),
  });
  return didAward;
}

// ── 마감 조인 누락분 복구 (관리자) ─────────────────────
// 과거에 스코어가 늦게 입력됐거나 두 경로(마감/제출) 충돌로 누락된
// scoreHistory·참여포인트·스코어보너스를 점검해 채운다.
// 안전장치: 포인트는 pointHistory에 이미 기록이 있으면 '지급됨'으로 간주해 건너뛴다(이중지급 방지).
window.confirmRepairClosedJoins = function() {
  if (!isAdmin) return;
  showConfirm('누락분 복구',
    '마감된 모든 조인을 점검해 누락된 스코어기록·포인트·랭킹을 채웁니다.\n이미 지급된 항목은 건너뛰므로 이중지급되지 않습니다. 진행할까요?',
    () => window.repairClosedJoins());
};
window.repairClosedJoins = async function() {
  if (!isAdmin) return;
  const btn = document.getElementById('repair-btn');
  const logEl = document.getElementById('repair-log');
  const lines = [];
  const setLog = (extra) => {
    logEl.style.display = 'block';
    logEl.innerHTML = (lines.join('\n') + (extra ? '\n' + extra : '')).replace(/</g, '&lt;');
  };
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  lines.push('⏳ 데이터 불러오는 중...');
  setLog();

  let allJoins, ph;
  try {
    const [jSnap, phSnap] = await Promise.all([
      getDocs(collection(db, 'joins')),
      getDocs(collection(db, 'pointHistory')),
    ]);
    allJoins = jSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    ph = {};
    phSnap.docs.forEach(d => { const x = d.data(); (ph[x.uid] = ph[x.uid] || []).push(x); });
  } catch (e) {
    lines.push('❌ 불러오기 실패: ' + e.message); setLog();
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    return;
  }

  // 특정 참가자가 이 조인에 대해 해당 유형 포인트를 이미 받았는지 판정 (보수적: 매칭되면 지급됨으로 간주)
  const wasAwarded = (uid, type, j) => (ph[uid] || []).some(e => {
    if (e.type !== type) return false;
    if (e.joinId) return e.joinId === j.id;              // 신규 기록: joinId로 정확 매칭
    const ref = e.ref || '', course = j.course || '';    // 레거시 기록: 코스+날짜 휴리스틱
    const courseMatch = type === '조인참여' ? ref === course : (course && ref.includes(course));
    if (!courseMatch) return false;
    return !e.roundDate || e.roundDate === (j.date || '');
  });

  const closed = allJoins.filter(j => j.status === 'closed');
  lines[0] = `📋 마감 조인 ${closed.length}건 점검 시작`;
  setLog();

  let nHist = 0, nPart = 0, nScore = 0, nJoins = 0, nErr = 0;

  for (let i = 0; i < closed.length; i++) {
    const j = closed[i];
    const scores = j.scores || {};
    const parts  = (j.participants || []).filter(p => p.uid && !p.isGuest);
    const ledgerPoint = new Set(j.pointAwardedUids || []);
    const ledgerScore = new Set(j.scoreAwardedUids || []);
    let jHist = 0, jPart = 0, jScore = 0;
    setLog(`⏳ 점검 중... (${i + 1}/${closed.length}) ${j.date || ''} ${j.course || ''}`);

    for (const p of parts) {
      const holes = (scores[p.uid] || {}).holes || Array(18).fill(null);
      const total = holes.reduce((a, v) => a + (v ?? 0), 0);
      const has   = holes.some(v => v !== null);

      // 1. scoreHistory 보강 (존재하면 skip → 안전)
      if (has) {
        try { if (await ensureScoreHistory(j, j.id, p, holes, total)) jHist++; } catch(_) { nErr++; }
      }

      // 월 4회 캡 (스크린 제외, 이 조인 제외)
      const month = (j.date || '').slice(0, 7);
      const monthlyCount = allJoins.filter(x =>
        x.id !== j.id && x.status === 'closed' && x.joinType !== 'screen' &&
        (x.date || '').slice(0, 7) === month &&
        (x.participants || []).some(px => px.uid === p.uid)
      ).length;
      const eligible = monthlyCount < 4;

      const partDone = ledgerPoint.has(p.uid) || wasAwarded(p.uid, '조인참여', j);
      const scoreDone = ledgerScore.has(p.uid) || wasAwarded(p.uid, '스코어', j);

      // 2. 참여 포인트 +10 (미지급 + 캡 이내)
      if (eligible && !partDone) {
        try {
          await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(10) });
          await addDoc(collection(db, 'pointHistory'), {
            uid: p.uid, name: p.name || '골퍼', type: '조인참여', amount: 10,
            ref: j.course || '', date: new Date().toISOString(), roundDate: j.date || '', joinId: j.id,
          });
          ledgerPoint.add(p.uid); jPart++;
        } catch(_) { nErr++; }
      } else if (partDone) { ledgerPoint.add(p.uid); }

      // 3. 스코어 보너스 (스코어 있고 미지급 + 캡 이내)
      if (eligible && has && !scoreDone) {
        try {
          const pts = scoreBonusPts(total);
          await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(pts) });
          await addDoc(collection(db, 'pointHistory'), {
            uid: p.uid, name: p.name || '골퍼', type: '스코어', amount: pts,
            ref: `${j.course || '라운드'} (${scoreBonusLabel(total)})`,
            date: new Date().toISOString(), roundDate: j.date || '', joinId: j.id,
          });
          ledgerScore.add(p.uid); jScore++;
        } catch(_) { nErr++; }
      } else if (scoreDone && has) { ledgerScore.add(p.uid); }
    }

    // 원장 저장 (이후 마감/제출 경로가 이중지급하지 않도록 씨딩)
    try {
      await updateDoc(doc(db, 'joins', j.id), {
        pointsAwarded: true, scoreBonusAwarded: true,
        pointAwardedUids: Array.from(ledgerPoint),
        scoreAwardedUids: Array.from(ledgerScore),
      });
    } catch(_) { nErr++; }

    nHist += jHist; nPart += jPart; nScore += jScore;
    if (jHist || jPart || jScore) {
      nJoins++;
      lines.push(`✔ ${j.date || '?'} ${j.course || '라운드'} — 기록 ${jHist} · 참여 ${jPart} · 보너스 ${jScore}`);
      setLog();
    }
  }

  lines.push('─────────────');
  lines.push(nJoins
    ? `✅ 완료! 조인 ${nJoins}건에 반영 (스코어기록 ${nHist} · 참여 ${nPart} · 보너스 ${nScore})`
    : `✅ 완료! 누락분 없음 — 모든 마감 조인이 이미 정상 반영되어 있습니다`);
  if (nErr) lines.push(`⚠️ 실패 ${nErr}건 (권한/네트워크 확인 필요)`);
  setLog();

  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
  await loadJoins();
  alert(nJoins
    ? `누락분 복구 완료\n\n조인 ${nJoins}건에 반영\n· 스코어기록 ${nHist}건\n· 참여 포인트 ${nPart}건\n· 스코어 보너스 ${nScore}건${nErr ? `\n\n⚠️ 실패 ${nErr}건` : ''}`
    : `점검 완료\n\n누락된 항목이 없습니다.\n모든 마감 조인이 이미 정상 반영되어 있습니다.${nErr ? `\n\n⚠️ 실패 ${nErr}건` : ''}`);
};

window.participateJoin = async function(id) {
  if (!currentUser) return;
  if (!isPaidUser) { showToast('유료 회원 전용 기능입니다. 관리자에게 문의해 주세요.'); return; }
  const j = joins.find(x => x.id === id);
  if (!j) return;

  const participants = j.participants || [];
  const alreadyJoined = participants.some(p => p.uid === currentUser.uid);

  if (alreadyJoined) {
    showConfirm('참여 취소', `${j.course} 조인 참여를 취소하시겠습니까?`, async () => {
      try {
        const entry = participants.find(p => p.uid === currentUser.uid);
        await updateDoc(doc(db, 'joins', id), { participants: arrayRemove(entry) });
        showToast('참여가 취소되었습니다');
        await loadJoins();
      } catch (e) { showToast('오류: ' + e.message); }
    });
  } else {
    if (participants.length >= j.capacity) { showToast('정원이 마감되었습니다'); return; }

    // 이번 달 참여 횟수 체크
    const now = new Date();
    const thisYM = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const monthlyCount = joins.filter(x =>
      x.id !== id &&
      x.joinType !== 'screen' &&
      (x.participants || []).some(p => p.uid === currentUser.uid) &&
      (x.date || '').slice(0, 7) === thisYM
    ).length;

    const doConsent = async () => {
      pendingJoinId = id;
      try {
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        document.getElementById('consent-phone').value = snap.exists() ? (snap.data().phone || '') : '';
      } catch (_) { document.getElementById('consent-phone').value = ''; }
      document.getElementById('consent-modal').classList.add('show');
    };

    if (monthlyCount >= 4) {
      // 참여는 가능하지만 포인트 미적립 안내
      showConfirm(
        '포인트 미적립 안내',
        `이번 달 이미 ${monthlyCount}회 참여하셨습니다.\n월 4회 초과분은 포인트가 적립되지 않지만\n참여는 가능합니다. 참여하시겠습니까?`,
        doConsent
      );
      return;
    }

    // 개인정보 동의 모달
    await doConsent();
  }
};

// ── 동명이인 처리: 이미 있는 이름이면 홍길동2, 홍길동3 순으로 부여 ──
function getUniqueName(baseName, existingNames) {
  if (!existingNames.includes(baseName)) return baseName;
  let n = 2;
  while (existingNames.includes(baseName + n)) n++;
  return baseName + n;
}

// ── 개인정보 동의 후 참여 처리 ────────────────────────
let pendingJoinId = null;
window.confirmConsent = async function() {
  const id = pendingJoinId;
  const phone = document.getElementById('consent-phone').value.trim();
  if (!phone) { showToast('연락처를 입력해주세요'); return; }
  pendingJoinId = null;
  document.getElementById('consent-modal').classList.remove('show');
  if (!id) return;
  try {
    const [userSnap, joinSnap] = await Promise.all([
      getDoc(doc(db, 'users', currentUser.uid)),
      getDoc(doc(db, 'joins', id))
    ]);
    let realName = currentUser.displayName || (currentUser.email || '').split('@')[0] || '골퍼';
    if (userSnap.exists()) {
      const d = userSnap.data();
      realName = d.name || d.nickname || realName;
    }
    const existingNames = joinSnap.exists() ? (joinSnap.data().participants || []).map(p => p.name) : [];
    const uniqueName = getUniqueName(realName, existingNames);
    // 프로필에 전화번호 저장 (문서 없어도 생성)
    await setDoc(doc(db, 'users', currentUser.uid), { phone }, { merge: true });
    const entry = { uid: currentUser.uid, name: uniqueName, phone, joinedAt: new Date().toISOString(), consentGiven: true };
    await updateDoc(doc(db, 'joins', id), { participants: arrayUnion(entry) });
    showToast('참여 신청이 완료되었습니다!');
    await loadJoins();
  } catch (e) { showToast('오류: ' + e.message); }
};

  document.getElementById('consent-modal').classList.remove('show');

  document.getElementById('participant-info-modal').classList.add('show');
};

window.closeParticipantModal = function() {
  document.getElementById('participant-info-modal').classList.remove('show');
};

// ── 이미지 저장 (카드 직접 캡쳐) ──────────────────────
const APP_BASE = 'https://wlfmzhs.github.io/ggzon';

window.shareCard = async function(id) {
  if (typeof html2canvas === 'undefined') {
    showToast('이미지 저장 기능 로딩 중...');
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const cardEl = document.getElementById('card-' + id);
  if (!cardEl) return;

  // 캡쳐 전 버튼 영역 임시 숨김
  const hideEls = cardEl.querySelectorAll('.card-bottom-row, .card-admin-row');
  hideEls.forEach(el => el.style.visibility = 'hidden');

  // 카드를 패딩 있는 래퍼로 감싸서 캡쳐
  const wrapper = document.createElement('div');
  wrapper.style.cssText = `
    position: fixed; left: -9999px; top: 0;
    padding: 20px; background: #111;
    display: inline-block;
  `;
  // 카드 사이즈 맞춰 클론
  const clone = cardEl.cloneNode(true);
  // 클론에서도 버튼 숨김
  clone.querySelectorAll('.card-bottom-row, .card-admin-row').forEach(el => el.remove());
  // 클론 너비 고정
  clone.style.width = cardEl.offsetWidth + 'px';
  clone.style.margin = '0';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#111',
      scale: 3,
      useCORS: true,
      logging: false,
    });
    document.body.removeChild(wrapper);

    // 라운드 코너를 유지하는 클린 캔버스 생성
    const radius = 20 * 3; // border-radius 20px * scale 3
    const pad = 20 * 3;    // padding 20px * scale 3
    const out = document.createElement('canvas');
    out.width = canvas.width;
    out.height = canvas.height;
    const ctx = out.getContext('2d');

    // 배경
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, out.width, out.height);

    // 카드 영역에 라운드 클리핑
    const cx = pad, cy = pad;
    const cw = canvas.width - pad * 2;
    const ch = canvas.height - pad * 2;
    ctx.beginPath();
    ctx.moveTo(cx + radius, cy);
    ctx.lineTo(cx + cw - radius, cy);
    ctx.arcTo(cx + cw, cy, cx + cw, cy + radius, radius);
    ctx.lineTo(cx + cw, cy + ch - radius);
    ctx.arcTo(cx + cw, cy + ch, cx + cw - radius, cy + ch, radius);
    ctx.lineTo(cx + radius, cy + ch);
    ctx.arcTo(cx, cy + ch, cx, cy + ch - radius, radius);
    ctx.lineTo(cx, cy + radius);
    ctx.arcTo(cx, cy, cx + radius, cy, radius);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(canvas, 0, 0);

    // 저장 or 공유
    out.toBlob(async (blob) => {
      const j = joins.find(x => x.id === id);
      const file = new File([blob], 'golgab-join.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: (j?.course || '조인') + ' 모집' }); }
        catch (_) { triggerDownload(out); }
      } else {
        triggerDownload(out);
      }
    }, 'image/png');
  } catch (e) {
    if (document.body.contains(wrapper)) document.body.removeChild(wrapper);
    showToast('캡쳐 실패: ' + e.message);
  } finally {
    hideEls.forEach(el => el.style.visibility = '');
  }
};

function triggerDownload(canvas) {
  const a = document.createElement('a');
  a.download = 'golgab-join.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  showToast('이미지가 저장되었습니다');
}

// ── 카카오 공유 ───────────────────────────────────────
window.kakaoShare = function(id) {
  const j = joins.find(x => x.id === id);
  if (!j) return;

  if (!window.Kakao || !Kakao.isInitialized()) {
    showToast('카카오 SDK 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }

  const appLink = `${APP_BASE}/join.html?joinId=${id}`;
  const participants = j.participants || [];

  const typeLabel = j.joinType === 'screen' ? '스크린' : (j.timeType === 'night' ? '야간 필드' : '필드');
  const descParts = [`${j.date} ${j.time}`, `${participants.length}/${j.capacity}명`];
  if (j.greenfee) descParts.push(fmtFee(j.greenfee));

  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: `[골갑존] ${j.course} ${typeLabel} 조인 모집`,
      description: descParts.join(' · '),
      imageUrl: 'https://wlfmzhs.github.io/ggzon/image/kakao-share-thumb.png',
      link: { mobileWebUrl: appLink, webUrl: appLink },
    },
    buttons: [
      {
        title: '조인 참여하기',
        link: { mobileWebUrl: appLink, webUrl: appLink },
      },
    ],
  });
};

// ── 금액 포맷 ─────────────────────────────────────────
window.formatMoney = function(el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
};
function fmtFee(val) {
  if (!val) return '';
  const num = String(val).replace(/[^\d]/g, '');
  const formatted = num.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return formatted ? formatted + '원' : val;
}

// ── 토스트 ────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

      앱이 설치되어 있으면 아래 버튼으로<br>바로 입장할 수 있어요.
    </div>
    <button id="btn-open-external" style="
      width:100%;max-width:320px;padding:16px;border-radius:14px;
      background:#2d7a4f;color:#fff;font-size:16px;font-weight:900;
      border:none;cursor:pointer;font-family:inherit;margin-bottom:10px;
    ">앱으로 열기 (로그인 유지)</button>
    <button id="btn-login-here" style="
      width:100%;max-width:320px;padding:14px;border-radius:14px;
      background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);font-size:14px;font-weight:700;
      border:1px solid rgba(255,255,255,0.15);cursor:pointer;font-family:inherit;margin-bottom:20px;
    ">여기서 로그인하고 참여</button>

      앱이 없으면 아래 버튼으로 로그인 후 참여하세요

    } else {
      location.href = currentUrl;
    }

  document.getElementById('btn-login-here').addEventListener('click', () => {
    location.href = loginUrl;
  });
})();

// 전화번호 입력 시 키보드가 입력창 가리는 문제 방지
// consent-modal이 position:fixed(phone 밖)이라 visualViewport 기준으로 정확히 계산됨
(function() {
  const sheet = document.getElementById('consent-sheet');
  const phoneInput = document.getElementById('consent-phone');
  if (!sheet || !phoneInput) return;

  function onVPResize() {
    if (window.visualViewport) {
      const vp = window.visualViewport;
      const kb = Math.max(0, window.innerHeight - (vp.offsetTop + vp.height));
      sheet.style.transform = kb > 10 ? `translateY(-${kb}px)` : '';
    } else {
      sheet.style.transform = '';
    }
  }

  phoneInput.addEventListener('focus', () => {
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', onVPResize);
    } else {
      window.addEventListener('resize', onVPResize);
    }
    setTimeout(onVPResize, 100);
    setTimeout(onVPResize, 300);
    setTimeout(onVPResize, 600);
  });

  phoneInput.addEventListener('blur', () => {
    if (window.visualViewport) {
      window.visualViewport.removeEventListener('resize', onVPResize);
    } else {
      window.removeEventListener('resize', onVPResize);
    }
    sheet.style.transform = '';
  });
})();
