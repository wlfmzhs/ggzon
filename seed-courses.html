<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프장 DB 임포트</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; max-width: 520px; margin: 0 auto; }
    h2 { color: #3ea066; margin-bottom: 6px; }
    .sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .count-badge { display: inline-block; background: rgba(62,160,102,0.2); color: #3ea066; border: 1px solid rgba(62,160,102,0.4); border-radius: 20px; font-size: 12px; font-weight: 700; padding: 3px 12px; margin-bottom: 16px; }
    .course-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .course-chip { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: rgba(255,255,255,0.7); }
    .course-chip.has-nine { border-color: rgba(62,160,102,0.4); color: #3ea066; }
    button { width: 100%; padding: 14px; border-radius: 12px; background: #3ea066; color: #fff; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:disabled { background: #555; cursor: default; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; color: #aaa; }
    .ok  { color: #3ea066; }
    .err { color: #e74c3c; }
    .progress { margin-top: 10px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-bar { height: 100%; background: #3ea066; border-radius: 3px; transition: width 0.3s; width: 0%; }
  </style>
</head>
<body>
  <h2>골프장 DB 임포트</h2>
  <div class="sub">라운드 지도의 모든 골프장을 Firestore courses 컬렉션에 등록합니다.<br>이미 등록된 골프장은 덮어쓰지 않습니다 (merge).</div>

  <div class="count-badge" id="count-badge">총 0개 골프장</div>
  <div class="course-list" id="course-list"></div>

  <button id="btn-import" onclick="runImport()">Firestore에 임포트</button>
  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div id="log"></div>

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",

const auth = getAuth(app);
const db   = getFirestore(app);

  // 경남 - 기타
  { name: '골프존카운티 경남',   region: '경남', city: '함안' },

  // 전북
  { name: '군산CC',              region: '전북', city: '군산' },
  // 제주
  { name: '테디밸리CC',          region: '제주', city: '제주' },
  // 전남
  { name: '골프존카운티 순천',   region: '전남', city: '순천' },
  { name: '파인비치CC',          region: '전남', city: '전남' },
  { name: '솔라시도CC',          region: '전남', city: '해남' },
  { name: '파인힐스CC',          region: '전남', city: '전남' },
  { name: '포라이즌CC',          region: '전남', city: '전남' },
  { name: 'JNJ CC',              region: '전남', city: '전남' },
  // 해외 - 일본
  { name: '후쿠오카 클래식GC',   region: '일본', city: '후쿠오카' },
  { name: '더 레이크스GC',       region: '일본', city: '후쿠오카' },
  { name: '벳부CC',              region: '일본', city: '오이타' },
  // 해외 - 베트남
  { name: 'BRG Da Nang GC',      region: '베트남', city: '다낭' },
  { name: 'Ba Na Hills GC',      region: '베트남', city: '다낭' },
  { name: '몽고메리 링크스',     region: '베트남', city: '다낭' },
];

// 미리보기 렌더링
document.getElementById('count-badge').textContent = `총 ${ALL_COURSES.length}개 골프장`;
const listEl = document.getElementById('course-list');
ALL_COURSES.forEach(c => {
  const chip = document.createElement('span');
  chip.className = 'course-chip' + (NINE_HOLES[c.name] ? ' has-nine' : '');
  chip.textContent = c.name;
  chip.title = `${c.region} ${c.city}`;
  listEl.appendChild(chip);
});

function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls || ''}">${msg}</div>`;
}

onAuthStateChanged(auth, user => {
  if (!user) {
    log('로그인이 필요합니다. GGZON에 먼저 로그인 후 이 페이지를 열어주세요.', 'err');
    document.getElementById('btn-import').disabled = true;
  } else {
    log(`로그인 확인: ${user.email}`);
  }
});

window.runImport = async function() {
  const btn = document.getElementById('btn-import');
  const bar = document.getElementById('progress-bar');
  btn.disabled = true;
  btn.textContent = '임포트 중...';

  let done = 0;
  for (const course of ALL_COURSES) {
    try {
      const data = {
        name: course.name,
        region: course.region,
        city: course.city,
      };
      if (NINE_HOLES[course.name]) {
        data.nineHoles = NINE_HOLES[course.name];
      }
      await setDoc(doc(db, 'courses', course.name), data, { merge: true });
      done++;
      bar.style.width = `${Math.round(done / ALL_COURSES.length * 100)}%`;
      log(`${done}. ${course.name} (${course.region} ${course.city})`, 'ok');
    } catch(e) {
      log(`실패: ${course.name} — ${e.message}`, 'err');
    }
  }

  btn.textContent = `임포트 완료 (${done}/${ALL_COURSES.length}개)`;
  log('--- 완료 ---', 'ok');
};
</script>
</body>
</html>
