  <title>단체라운드 대회 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --border: rgba(62,160,102,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    /* ── Phone frame ── */
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }

    /* ── Loading ── */
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(62,160,102,0.3);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App bar ── */
    .appbar {
      flex-shrink: 0;
      padding: 32px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .appbar-left { display: flex; align-items: center; gap: 8px; }
    #btn-back {
      background: none; border: none; cursor: pointer; padding: 4px 8px 4px 0;
      color: var(--green-light); font-size: 20px; line-height: 1;
    }
    #btn-back.hidden { display: none; }
    .appbar-title { font-size: 16px; font-weight: 900; }
    #btn-new-tournament {
      display: none;
      background: rgba(62,160,102,0.2); border: 1px solid rgba(62,160,102,0.4);
      color: var(--green-light); font-size: 12px; font-weight: 700;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: inherit;
    }

    /* ── Hidden util ── */
    .hidden { display: none !important; }

    /* ── Scrollable content ── */
    .scroll-area {
      flex: 1; overflow-y: auto; scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ═══════════════════════════
       VIEW: LIST
    ═══════════════════════════ */
    #view-list { display: flex; flex-direction: column; height: 100%; }

    .tab-bar {
      flex-shrink: 0;
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 10px 0; font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #fff;
      background: var(--green);
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(45,122,79,0.35);
    }
    /* 대회 상세 탭 */
    /* 대회 공지 박스 */
    .detail-notice-box {
      margin-top: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .detail-notice-label {
      font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 800;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .detail-notice-text {
      font-size: 14px; color: rgba(255,255,255,0.9);
      line-height: 1.75; white-space: pre-line; font-weight: 500;
    }

    .list-content { padding: 16px 16px 80px; }

    /* Active tournament card */
    .active-card {
      background: linear-gradient(135deg, rgba(45,122,79,0.25) 0%, rgba(10,36,6,0.5) 100%);
      border: 1px solid rgba(62,160,102,0.35);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .active-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(62,160,102,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .active-card:active { transform: scale(0.98); }

    .card-status-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .badge-live {
      background: #e74c3c; color: #fff;
      font-size: 9px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .badge-upcoming {
      background: rgba(240,192,64,0.2); color: var(--gold);
      border: 1px solid rgba(240,192,64,0.4);
      font-size: 9px; font-weight: 900; letter-spacing: 1px;
      padding: 3px 7px; border-radius: 10px;
    }

    /* 주간 카드 (기본) */
    .active-card.day {
      background: linear-gradient(135deg, rgba(45,122,79,0.25) 0%, rgba(10,36,6,0.5) 100%);
      border-color: rgba(62,160,102,0.35);
    }
    .active-card.day::before {
      background: radial-gradient(circle, rgba(62,160,102,0.15) 0%, transparent 70%);
    }
    /* 야간 카드 */
    .active-card.night {
      background: linear-gradient(135deg, rgba(40,50,130,0.35) 0%, rgba(5,8,35,0.65) 100%);
      border-color: rgba(110,130,255,0.35);
    }
    .active-card.night::before {
      background: radial-gradient(circle, rgba(110,130,255,0.15) 0%, transparent 70%);
    }
    .active-card.night .card-action-btn {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .active-card.night .card-progress-fill {
      background: linear-gradient(90deg, #2a3a9f, #5566ee);
    }
    .active-card.night .badge-live {
      background: #3a3fcc;
    }
    .active-card.night .card-meta-icon {
      color: #8899ff;
    }
    .night-label {
      font-size: 11px; font-weight: 700;
      color: #8899ff;
      background: rgba(100,120,255,0.12);
      border: 1px solid rgba(100,120,255,0.25);
      padding: 2px 8px; border-radius: 8px;
    }
    .day-label {
      font-size: 11px; font-weight: 700;
      color: var(--green-light);
      background: rgba(62,160,102,0.1);
      border: 1px solid rgba(62,160,102,0.2);
      padding: 2px 8px; border-radius: 8px;
    }

    .card-series { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
    .card-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 2px; }
    .card-slogan { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 16px; }

    .card-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .card-meta-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.65);
    }
    .card-meta-icon { width: 14px; height: 14px; color: var(--green-light); flex-shrink: 0; }
    .card-meta-label { color: rgba(255,255,255,0.35); min-width: 50px; }

    .card-progress-area { margin-bottom: 16px; }
    .card-progress-top {
      display: flex; justify-content: space-between;
      font-size: 11px; margin-bottom: 5px;
    }
    .card-progress-label { color: rgba(255,255,255,0.45); }
    .card-progress-num { color: var(--green-light); font-weight: 700; }
    .card-progress-bar {
      height: 5px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    .card-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--green), var(--green-light));
      border-radius: 3px; transition: width 0.5s ease;
    }

    .card-action-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      color: #fff; font-size: 14px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .card-action-btn:active { opacity: 0.8; }

    .card-admin-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .card-edit-btn, .card-close-btn {
      flex: 1; padding: 8px;
      font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      border: none;
    }
    .card-edit-btn {
      background: rgba(240,192,64,0.15); color: var(--gold);
      border: 1px solid rgba(240,192,64,0.3);
    }
    .card-close-btn {
      background: rgba(231,76,60,0.15); color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
    }
    .card-delete-btn {
      flex: 1; padding: 8px;
      font-size: 11px; font-weight: 700;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      background: rgba(180,0,0,0.2); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.35);
    }
    .past-delete-btn {
      flex-shrink: 0;
      background: rgba(180,0,0,0.15); color: #ff6b6b;
      border: 1px solid rgba(180,0,0,0.25);
      font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 8px;
      cursor: pointer; font-family: inherit; margin-left: 6px;
    }

    /* Timer */
    .card-timer {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 14px;
    }
    .timer-label {
      font-size: 10px; color: rgba(255,255,255,0.4); flex-shrink: 0;
    }
    .timer-blocks { display: flex; align-items: center; gap: 4px; }
    .timer-block {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; padding: 4px 8px; min-width: 38px;
    }
    .timer-block.urgent {
      background: rgba(231,76,60,0.12);
      border-color: rgba(231,76,60,0.3);
    }
    .timer-num {
      font-size: 16px; font-weight: 900; line-height: 1;
      color: #fff; font-variant-numeric: tabular-nums;
    }
    .timer-block.urgent .timer-num { color: #e74c3c; }
    .timer-unit { font-size: 8px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .timer-sep { font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.25); margin-bottom: 6px; }
    .timer-dday {
      font-size: 13px; font-weight: 900; color: var(--green-light);
      background: rgba(62,160,102,0.15); border: 1px solid rgba(62,160,102,0.3);
      border-radius: 7px; padding: 4px 10px;
    }

    /* Past tournament card */
    .past-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 14px;
    }
    .past-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: rgba(240,192,64,0.1); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .past-info { flex: 1; min-width: 0; }
    .past-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
    .past-year { font-size: 11px; color: rgba(255,255,255,0.4); }
    .past-badge {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 8px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: rgba(255,255,255,0.3); font-size: 13px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ═══════════════════════════
       VIEW: DETAIL
    ═══════════════════════════ */
    #view-detail { display: none; flex-direction: column; height: 100%; }

    .detail-scroll { padding: 0 16px 80px; }

    .detail-hero {
      padding: 8px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .detail-series { font-size: 11px; color: var(--green-light); margin-bottom: 4px; letter-spacing: 0.5px; }
    .detail-name { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .detail-slogan { font-size: 13px; color: rgba(255,255,255,0.5); }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 20px;
    }
    .info-cell {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
    }
    .info-cell.full { grid-column: 1 / -1; }
    .info-cell-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .info-cell-value { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); }
    .info-cell-value.highlight { color: var(--green-light); font-size: 15px; }

    /* prizes display */
    .prizes-box {
      background: rgba(240,192,64,0.06);
      border: 1px solid rgba(240,192,64,0.2);
      border-radius: 12px; padding: 14px;
      margin-bottom: 20px; cursor: pointer; user-select: none;
    }
    .prizes-box-header { display: flex; justify-content: space-between; align-items: center; }
    .prizes-title { font-size: 11px; color: var(--gold); font-weight: 700; letter-spacing: 0.5px; }
    .prizes-toggle-arrow { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: 4px; display: inline-block; transition: transform 0.2s; }
    .prizes-box.open .prizes-toggle-arrow { transform: rotate(180deg); }
    .prizes-total-chip { font-size: 11px; font-weight: 700; color: var(--gold); background: rgba(240,192,64,0.12); padding: 3px 9px; border-radius: 10px; white-space: nowrap; }
    .prizes-detail { margin-top: 12px; display: none; }
    .prizes-box.open .prizes-detail { display: block; }
    .prizes-table { width: 100%; border-collapse: collapse; }
    .prizes-table th { font-size: 9px; color: rgba(255,255,255,0.35); font-weight: 700; text-align: left; padding: 0 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .prizes-table td { font-size: 11px; color: rgba(255,255,255,0.7); padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    .prizes-table td.amt { text-align: right; color: #fff; font-weight: 700; white-space: nowrap; }
    .prizes-table tfoot td { font-size: 11px; font-weight: 900; color: var(--gold); border-top: 1px solid rgba(240,192,64,0.2); border-bottom: none; padding-top: 8px; }
    .prizes-table tfoot td.amt { text-align: right; }

    /* prizes editor (admin) */
    .prizes-editor { margin-top: 4px; }
    .prizes-header-row { display: grid; grid-template-columns: 42px 0.9fr 1.1fr 0.85fr 0.85fr 26px; gap: 4px; margin-bottom: 5px; }
    .prizes-header-row span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; padding-left: 2px; text-align: center; }
    .prizes-header-row span:nth-child(n+3) { text-align: left; }
    .prizes-row { display: grid; grid-template-columns: 42px 0.9fr 1.1fr 0.85fr 0.85fr 26px; gap: 4px; margin-bottom: 5px; align-items: center; }
    .prizes-row.faded .prizes-input { color: rgba(255,255,255,0.85); }
    .prizes-received-btn { width: 42px; height: 34px; border-radius: 8px; border: 1px solid rgba(62,160,102,0.4); background: rgba(62,160,102,0.15); color: var(--green-light); font-size: 12px; font-weight: 900; cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all 0.15s; }
    .prizes-received-btn.no { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.25); }
    .prizes-input { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 12px; font-family: inherit; padding: 8px 8px; outline: none; width: 100%; min-width: 0; transition: color 0.15s; }
    .prizes-input:focus { border-color: var(--green-light); }
    .prizes-input::placeholder { color: rgba(255,255,255,0.18); font-size: 11px; }
    .prizes-input.amt-input { text-align: right; }
    .prizes-row-del { background: rgba(255,255,255,0.06); border: none; border-radius: 6px; color: rgba(255,255,255,0.35); font-size: 14px; cursor: pointer; width: 26px; height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .prizes-total-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 2px 4px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 4px; }
    .prizes-total-label { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 700; }
    .prizes-total-val { font-size: 14px; font-weight: 900; color: var(--gold); }
    .prizes-add-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.13); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .prizes-table td.received-no { color: rgba(255,255,255,0.25) !important; }

    /* ── Seat map ── */
    .seat-map-section { margin-bottom: 20px; }
    .seat-map-title {
      font-size: 11px; color: rgba(255,255,255,0.4);
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .seat-map-title span { color: var(--green-light); }

    .course-tabs {
      display: flex; gap: 6px; margin-bottom: 14px;
    }
    .course-tab-btn {
      padding: 7px 18px;
      font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .course-tab-btn.active {
      background: rgba(62,160,102,0.2); color: var(--green-light);
      border-color: rgba(62,160,102,0.4);
    }

    .course-section-label {
      font-size: 12px; font-weight: 900; color: var(--green-light);
      letter-spacing: 0.5px; padding: 14px 0 6px;
      border-top: 1px solid rgba(62,160,102,0.2); margin-top: 6px;
    }
    .course-section-label:first-child { border-top: none; padding-top: 0; margin-top: 0; }

    .seat-legend {
      display: flex; gap: 12px; margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: rgba(255,255,255,0.4); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .legend-dot.available { background: rgba(45,122,79,0.6); border: 1px solid rgba(62,160,102,0.5); }
    .legend-dot.taken { background: rgba(255,255,255,0.1); }
    .legend-dot.mine { background: rgba(240,192,64,0.4); border: 1px solid var(--gold); }

    .seat-grid-header {
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 6px; padding-left: 44px;
    }
    .seat-col-label {
      flex: 1; text-align: center; font-size: 9px;
      color: rgba(255,255,255,0.3); font-weight: 700;
    }

    .seat-grid { display: flex; flex-direction: column; gap: 5px; }

    .pairing-dnd-slot.heuk { background: rgba(20,20,20,0.7) !important; border-color: rgba(200,200,200,0.3) !important; }
    .pairing-dnd-slot.baek { background: rgba(255,255,255,0.12) !important; border-color: rgba(255,255,255,0.45) !important; }

    .pairing-dnd-slot.baek .pairing-dnd-name { color: #fff; }
    .pairing-bw-header {

    /* 대회 유형 토글 */
    .tt-toggle-group { display: flex; gap: 6px; }

    .selected-info-bar {

    .detail-register-btn {

    /* ═══════════════════════════

    .sheet-overlay {

    .sheet {

    .form-input::placeholder { color: rgba(255,255,255,0.25); }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, var(--green), var(--green-light));

      margin-top: 8px; transition: opacity 0.2s;
    }
    .submit-btn:active { opacity: 0.8; }

    .sheet-seat-badge {
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.3);

      display: flex; align-items: center; gap: 10px;
    }
    .sheet-seat-icon {
      width: 32px; height: 32px; background: rgba(62,160,102,0.2);

    .sheet-seat-text { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    .sheet-seat-text strong { color: #fff; font-size: 14px; }

    /* ═══════════════════════════
       MODAL: Admin
    ═══════════════════════════ */
    .admin-overlay {
      position: absolute; inset: 0;
      background: #0A2406; z-index: 60;
      display: none; flex-direction: column;
      border-radius: 40px; overflow: hidden;
    }
    .admin-overlay.open { display: flex; }

    .admin-appbar {
      flex-shrink: 0; padding: 32px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .admin-appbar-title { font-size: 15px; font-weight: 900; }
    .admin-close-btn {
      background: none; border: none; cursor: pointer;

      padding: 20px 18px 40px;

    .admin-section-title {
      font-size: 10px; color: var(--green-light); font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 12px; margin-top: 20px;
    }
    .admin-section-title:first-child { margin-top: 0; }

    .admin-form-group { margin-bottom: 12px; }
    .admin-label {
      display: block; font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.45); margin-bottom: 5px;
    }
    .admin-input, .admin-textarea, .admin-select {

      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #fff;
      font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .admin-input:focus, .admin-textarea:focus, .admin-select:focus {
      border-color: rgba(62,160,102,0.5);
    }
    .admin-input::placeholder, .admin-textarea::placeholder { color: rgba(255,255,255,0.2); }
    .admin-textarea { min-height: 80px; resize: vertical; }
    .admin-select { cursor: pointer; }
    .admin-select option { background: #1a3a1a; }

    .admin-row { display: flex; gap: 10px; }
    .admin-row .admin-form-group { flex: 1; }

    .admin-save-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      color: #fff; font-size: 15px; font-weight: 800;
      border: none; border-radius: 14px; cursor: pointer; font-family: inherit;
      margin-top: 16px;
    }
    .admin-save-btn:active { opacity: 0.8; }

    .admin-hint {
      font-size: 10px; color: rgba(255,255,255,0.3);
      margin-top: 4px; line-height: 1.5;
    }

    /* ── Course name inputs ── */
    .course-name-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .course-name-badge {
      flex-shrink: 0; width: 28px; height: 28px;
      background: rgba(62,160,102,0.2);
      border: 1px solid rgba(62,160,102,0.35);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: var(--green-light);
    }

    /* ── Time picker ── */
    .time-picker {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 8px 10px;
    }
    .ampm-btn {
      padding: 5px 10px; border-radius: 7px; cursor: pointer;
      font-size: 12px; font-weight: 800; font-family: inherit;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent; color: rgba(255,255,255,0.35);
      transition: all 0.15s;
    }
    .ampm-btn.active {
      background: rgba(62,160,102,0.3);
      border-color: rgba(62,160,102,0.6);
      color: var(--green-light);
    }
    .time-sel {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; color: #fff;
      font-size: 14px; font-weight: 700;
      padding: 5px 4px; text-align: center;
      cursor: pointer; font-family: inherit; outline: none;
    }
    .time-sel option { background: #1a3a1a; }
    .time-colon {
      font-size: 16px; font-weight: 900;
      color: rgba(255,255,255,0.4);
    }

    .auto-calc-badge {
      display: inline-block;
      background: rgba(62,160,102,0.15); color: var(--green-light);
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 6px; margin-left: 6px;
    }

    /* ═══════════════════════════
       MODAL: Pairing Management
    ═══════════════════════════ */
    .pairing-overlay {
      position: absolute; inset: 0;
      background: #0A2406; z-index: 70;
      display: none; flex-direction: column;
      border-radius: 40px; overflow: hidden;
    }
    .pairing-overlay.open { display: flex; }
    .pairing-appbar {
      flex-shrink: 0; padding: 32px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .pairing-appbar-left { display: flex; flex-direction: column; gap: 2px; }
    .pairing-appbar-title { font-size: 15px; font-weight: 900; }
    .pairing-appbar-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
    .pairing-close-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.5); font-size: 22px; line-height: 1; padding: 4px;
    }
    .pairing-scroll {
      flex: 1; overflow-y: auto; scrollbar-width: none;
      padding: 16px 16px 0;
    }
    .pairing-scroll::-webkit-scrollbar { display: none; }
    .pairing-course-section { margin-bottom: 20px; }
    .pairing-course-title {
      font-size: 12px; font-weight: 900; color: var(--green-light);
      letter-spacing: 0.5px; padding: 0 0 8px;

      margin-bottom: 4px;
    }
    .pairing-cart-block { margin-bottom: 12px; }
    .pairing-cart-label {
      font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.35);
      padding: 8px 0 4px; letter-spacing: 0.5px;
    }
    .pairing-row {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .pairing-seat-badge {
      flex-shrink: 0; width: 20px; height: 20px;
      background: rgba(240,192,64,0.15); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: var(--gold);
    }
    .pairing-name {
      flex: 1; font-size: 13px; font-weight: 700; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pairing-selects { display: flex; gap: 3px; flex-shrink: 0; }
    .pairing-select {
      background: rgba(62,160,102,0.1); border: 1px solid rgba(62,160,102,0.25);
      color: #fff; border-radius: 6px; padding: 4px 4px; font-size: 10px;
      font-family: inherit; cursor: pointer; outline: none; max-width: 54px;
    }
    .pairing-select option { background: #1a3a1a; }
    .pairing-save-row-btn {
      flex-shrink: 0;
      background: rgba(62,160,102,0.2); border: 1px solid rgba(62,160,102,0.35);
      color: var(--green-light); font-size: 10px; font-weight: 700;
      padding: 4px 8px; border-radius: 6px; cursor: pointer; font-family: inherit;
    }
    .pairing-save-row-btn:active { opacity: 0.7; }
    .pairing-empty-seat {
      padding: 7px 0; font-size: 11px; color: rgba(255,255,255,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; gap: 6px;
    }
    .pairing-empty-badge {
      flex-shrink: 0; width: 20px; height: 20px;
      background: rgba(255,255,255,0.05); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: rgba(255,255,255,0.2);
    }
    .pairing-footer {
      flex-shrink: 0; padding: 12px 16px 24px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .pairing-pdf-btn {
      flex: 1; padding: 12px;
      background: rgba(240,192,64,0.15); border: 1px solid rgba(240,192,64,0.3);
      color: var(--gold); font-size: 13px; font-weight: 700;
      border-radius: 12px; cursor: pointer; font-family: inherit;
    }
    .pairing-pdf-btn:active { opacity: 0.7; }
    .lottery-admin-row {
      display: none; width: 100%; gap: 8px;
    }
    .lottery-admin-row.visible { display: flex; }
    .lottery-btn {
      flex: 1; padding: 11px;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      font-size: 12px; font-weight: 700;
    }
    .lottery-assign-btn {
      background: rgba(240,192,64,0.15);
      border: 1px solid rgba(240,192,64,0.35);
      color: var(--gold);
    }
    .lottery-reset-btn {
      background: rgba(255,100,100,0.1);
      border: 1px solid rgba(255,100,100,0.3);
      color: rgba(255,130,130,0.9);
    }
    .lottery-btn:active { opacity: 0.7; }

    /* ── 조편성 드래그앤드롭 ── */
    .pairing-dnd-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 6px;
    }
    .pairing-dnd-slot {
      border: 1px dashed rgba(255,255,255,0.12); border-radius: 8px;
      min-height: 68px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      padding: 7px 3px; transition: background 0.15s, border-color 0.15s, transform 0.15s;
      user-select: none; -webkit-user-select: none;
    }
    .pairing-dnd-slot.has-person {
      background: rgba(62,160,102,0.1); border: 1px solid rgba(62,160,102,0.3);
      cursor: grab;
    }
    .pairing-dnd-slot.has-person:active { cursor: grabbing; }
    .pairing-dnd-slot.dragging { opacity: 0.3; }
    .pairing-dnd-slot.drag-over {
      background: rgba(62,160,102,0.28); border: 1.5px solid var(--green-light);
      transform: scale(1.05);
    }
    .pairing-dnd-seat-letter {
      font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px;
      width: 100%; text-align: center;
    }
    .pairing-dnd-name {
      font-size: 11px; font-weight: 800; color: #fff;
      text-align: center; word-break: keep-all; line-height: 1.2;
    }
    .pairing-dnd-empty { font-size: 9px; color: rgba(255,255,255,0.18); }
    .pairing-dnd-hint {
      font-size: 10px; color: rgba(255,255,255,0.3); text-align: center;
      padding: 8px 0 4px; letter-spacing: 0.3px;
    }
    .pairing-dnd-slot.manual {
      background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.3);
      cursor: grab;
    }
    .pairing-dnd-slot.manual .pairing-dnd-name { color: var(--gold); }
    .pairing-dnd-slot.empty-clickable { cursor: pointer; }
    .pairing-dnd-slot.empty-clickable:active { background: rgba(62,160,102,0.1); }
    .pairing-dnd-slot.long-press-hold {
      border-color: rgba(62,160,102,0.6) !important;
      transform: scale(0.96);
      transition: transform 0.3s, border-color 0.3s;
    }

    /* ── Toast ── */
    .toast {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.95); color: #fff;
      font-size: 13px; font-weight: 600;
      padding: 10px 20px; border-radius: 20px;
      white-space: nowrap; z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      border: 1px solid rgba(255,255,255,0.1);

    .toast.show { opacity: 1; }

    /* ── Confirmation modal ── */
    .confirm-overlay {
      position: absolute; inset: 0;

      display: none; align-items: center; justify-content: center;
      z-index: 80; border-radius: 40px; padding: 30px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: #0f2a14; border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; width: 100%;
    }
    .confirm-title { font-size: 16px; font-weight: 900; margin-bottom: 8px; }
    .confirm-msg { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 20px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-cancel {
      flex: 1; padding: 12px;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .confirm-ok {
      flex: 1; padding: 12px;
      background: #e74c3c; color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
  </style>

<div class="phone">

  <!-- Loading -->

    <div class="spinner"></div>
  </div>

function getCourseNamesFor(t) {
  if (t && t.courseNames && t.courseNames.length) return t.courseNames;
  const count = (t && t.courseCount) || 2;
  return Array.from({length: count}, (_, i) => `${String.fromCharCode(65+i)}코스`);
}

// 코스별 카트 수 배분 (나머지는 앞 코스에 1개씩 추가)
function getCourseCarts(totalCarts, courseCount) {
  const base = Math.floor(totalCarts / courseCount);
  const extra = totalCarts % courseCount;
  return Array.from({length: courseCount}, (_, i) => i < extra ? base + 1 : base);
}

  const active = activeTournaments.filter(t => t.status === 'recruiting' || t.status === 'upcoming');
  for (const t of active) {
    try {
      const snap = await getDocs(collection(db, 'tournaments', t.id, 'registrations'));
      updateCardProgress(t.id, snap.size, t.totalParticipants || 0);

  }
}

// ── Countdown timers ──────────────────────────────────
let timerInterval = null;

function startTimers(tournaments) {
  if (timerInterval) clearInterval(timerInterval);
  function tick() {
    const now = Date.now();
    tournaments.forEach(t => {
      if (!t.date) return;
      const el = document.getElementById(`timer-${t.id}`);
      if (!el) return;
      // 티업 시간이 있으면 그 시간까지, 없으면 당일 자정까지
      let target;
      if (t.teeUpTime) {
        const [h, m] = t.teeUpTime.split(':').map(Number);
        const d = new Date(t.date);
        d.setHours(h, m, 0, 0);
        target = d.getTime();
      } else {
        target = new Date(t.date).getTime();
      }
      const diff = target - now;
      const blocks = el.querySelectorAll('.timer-block');
      if (diff <= 0) {
        el.innerHTML = `<div class="timer-dday">D-DAY</div>`;
        return;
      }
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000) / 60000);
      const secs  = Math.floor((diff % 60000) / 1000);
      const urgent = days < 3;
      const vals = [
        { n: String(days).padStart(2,'0'), u: '일' },
        { n: String(hours).padStart(2,'0'), u: '시간' },
        { n: String(mins).padStart(2,'0'), u: '분' },
        { n: String(secs).padStart(2,'0'), u: '초' },
      ];
      blocks.forEach((b, i) => {
        b.querySelector('.timer-num').textContent = vals[i].n;
        if (urgent) b.classList.add('urgent');
        else b.classList.remove('urgent');
      });
    });
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

// Update progress bar for a tournament card
function updateCardProgress(tournamentId, count, total) {
  const numEl = document.getElementById(`progress-num-${tournamentId}`);
  const fillEl = document.getElementById(`progress-fill-${tournamentId}`);
  if (numEl) numEl.textContent = `${count} / ${total}명`;
  if (fillEl) fillEl.style.width = `${total > 0 ? Math.min(100, Math.round(count/total*100)) : 0}%`;
}

function renderSeatGrid(t, registrations, _courseIdx) {
  const el = document.getElementById('seat-map-content');
  if (!el) return;

  const courseCount = t.courseCount || 2;
  const totalCarts = Math.ceil((t.totalParticipants || 0) / 4);
  const courseCarts = getCourseCarts(totalCarts, courseCount);
  const seatLetters = ['A', 'B', 'C', 'D'];
  const courseNames = getCourseNamesFor(t);

  const regMap = {};
  registrations.forEach(r => {
    const key = `${r.courseIndex}-${r.cartIndex}-${r.seatIndex}`;
    regMap[key] = r;
  });

  let allHtml = '';

  for (let ci = 0; ci < courseCount; ci++) {
    const isBW = t.tournamentType === 'black-white';
    allHtml += `<div class="course-section-label">${courseNames[ci]}</div>`;
    if (isBW) allHtml += `<div class="bw-team-header">
      <div class="bw-team-label heuk" style="flex:2">흑팀</div>
      <div class="bw-team-label baek" style="flex:2">백팀</div>
    </div>`;
    allHtml += `<div class="seat-grid-header">
      <span class="seat-col-label"${isBW?' style="color:rgba(255,255,255,0.5)"':''}>A</span>
      <span class="seat-col-label"${isBW?' style="color:rgba(255,255,255,0.5)"':''}>B</span>
      <span class="seat-col-label">C</span>
      <span class="seat-col-label">D</span>
    </div>
    <div class="seat-grid">`;

    for (let cartIdx = 0; cartIdx < courseCarts[ci]; cartIdx++) {
      let teeTimeHtml = '';
      if (t.teeUpTime && t.teeInterval) {
        const [hh, mm] = t.teeUpTime.split(':').map(Number);
        const totalMin = hh * 60 + mm + (t.courseOffsets?.[ci] || 0) + cartIdx * t.teeInterval;
        const th = Math.floor(totalMin / 60) % 24;
        const tm = totalMin % 60;
        const ampm = th < 12 ? 'AM' : 'PM';
        const th12 = th === 0 ? 12 : th > 12 ? th - 12 : th;
        teeTimeHtml = `<span class="cart-tee-time">${ampm} ${th12}:${String(tm).padStart(2,'0')}</span>`;
      }
      allHtml += `<div class="cart-row">
        <span class="cart-label">${cartIdx + 1}조${teeTimeHtml}</span>
        <div class="seats">`;

      for (let seatIdx = 0; seatIdx < 4; seatIdx++) {
        const key = `${ci}-${cartIdx}-${seatIdx}`;
        const reg = regMap[key];
        const isSelected = selectedSeat &&
          selectedSeat.courseIdx === ci &&
          selectedSeat.cartIdx === cartIdx &&
          selectedSeat.seatIdx === seatIdx;
        const isMine = myRegistration && myRegistration.courseIndex === ci &&
          myRegistration.cartIndex === cartIdx && myRegistration.seatIndex === seatIdx;

        let cls, content;
        if (isMine) {
          cls = 'mine';
          content = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f0c040" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span class="seat-name" style="color:#f0c040; font-weight:800;">${(t.lotteryAssigned && reg.lotteryNum) ? '나ㆍ' + reg.lotteryNum : '나'}</span>`;
        } else if (reg) {
          cls = 'taken';
          content = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span class="seat-name">${(t.lotteryAssigned && reg.lotteryNum) ? (reg.name || '?') + 'ㆍ' + reg.lotteryNum : (reg.name || '?')}</span>`;
        } else if (isSelected) {
          cls = 'selected';
          content = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        } else {
          cls = 'available';
          content = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(62,160,102,0.8)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
        }

        const clickable = !reg && !isMine && t.status === 'recruiting';
        const onclick = clickable ? `window.selectSeat(${ci},${cartIdx},${seatIdx})` : '';
        const teamCls = isBW ? (seatIdx < 2 ? 'heuk' : 'baek') : '';
        allHtml += `<div class="seat ${cls} ${teamCls}" ${onclick ? `onclick="${onclick}"` : ''}>${content}</div>`;
      }
      allHtml += `</div></div>`;
    }
    allHtml += `</div>`;
  }

  el.innerHTML = allHtml;
  updateRegisterButton();
}

function getUniqueName(baseName, existingNames) {
  if (!existingNames.includes(baseName)) return baseName;
  let n = 2;
  while (existingNames.includes(baseName + n)) n++;
  return baseName + n;
}

window.submitRegistration = async function() {
  if (!selectedSeat || !currentTournament) return;

  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const handicap = document.getElementById('reg-handicap').value.trim();
  const account = document.getElementById('reg-account').value.trim();

  if (!name || !phone || !handicap || !account) {
    showToast('모든 항목을 입력해주세요');
    return;
  }

  // Check seat still available (double-check)
  const key = `${selectedSeat.courseIdx}-${selectedSeat.cartIdx}-${selectedSeat.seatIdx}`;
  const taken = allRegistrations.find(r =>
    r.courseIndex === selectedSeat.courseIdx &&
    r.cartIndex === selectedSeat.cartIdx &&
    r.seatIndex === selectedSeat.seatIdx
  );
  if (taken) {
    showToast('이미 다른 분이 선택하셨습니다. 다른 자리를 선택해주세요');
    document.getElementById('sheet-register').classList.remove('open');
    selectedSeat = null;
    updateRegisterButton();
    return;
  }

  try {
    const existingNames = allRegistrations.map(r => r.name);
    const uniqueName = getUniqueName(name, existingNames);
    await addDoc(collection(db, 'tournaments', currentTournament.id, 'registrations'), {
      userId: currentUser.uid,
      name: uniqueName, phone,
      handicap: parseInt(handicap),
      refundAccount: account,
      courseIndex: selectedSeat.courseIdx,
      cartIndex: selectedSeat.cartIdx,
      seatIndex: selectedSeat.seatIdx,
      registeredAt: serverTimestamp()
    });

    document.getElementById('sheet-register').classList.remove('open');
    showToast('신청이 완료되었습니다!');

    // GG POINT 대회 참여 30pts 적립
    try {
      const now = new Date().toISOString();
      await updateDoc(doc(db, 'users', currentUser.uid), { totalPoints: increment(30) });
      await addDoc(collection(db, 'pointHistory'), {
        uid: currentUser.uid, name,
        type: '대회참여', amount: 30,
        ref: currentTournament.name || '대회',
        date: now
      });
    } catch(_) {}
  } catch (e) {
    console.error(e);
    showToast('오류가 발생했습니다. 다시 시도해주세요');
  }
};

window.addPrizesRow = function(data = {}) {
  const received = data.received !== false;
  const row = document.createElement('div');
  row.className = 'prizes-row' + (received ? '' : ' faded');
  row.innerHTML = `
    <button type="button" class="prizes-received-btn${received ? '' : ' no'}" onclick="toggleReceived(this)">${received ? '유' : '무'}</button>
    <input class="prizes-input" placeholder="업체 및 이름" value="${escAttr(data.company || '')}" />
    <input class="prizes-input" placeholder="상품명" value="${escAttr(data.product || '')}" />
    <input class="prizes-input amt-input" placeholder="금액" inputmode="numeric"
      value="${data.amount ? data.amount.toLocaleString() : ''}"
      oninput="formatPrizesAmt(this);calcPrizesTotal()" />
    <input class="prizes-input" placeholder="기타" value="${escAttr(data.note || '')}" />
    <button type="button" class="prizes-row-del" onclick="removePrizesRow(this)">×</button>
  `;
  document.getElementById('prizes-rows').appendChild(row);
  calcPrizesTotal();
};

window.toggleReceived = function(btn) {
  const isYes = btn.textContent === '유';
  btn.textContent = isYes ? '무' : '유';
  btn.classList.toggle('no', isYes);
  btn.closest('.prizes-row').classList.toggle('faded', isYes);
};

window.removePrizesRow = function(btn) {
  btn.closest('.prizes-row').remove();
  calcPrizesTotal();
};

window.formatPrizesAmt = function(input) {
  const raw = input.value.replace(/[^0-9]/g, '');
  input.value = raw ? parseInt(raw).toLocaleString() : '';
};

function calcPrizesTotal() {
  let total = 0;
  document.querySelectorAll('#prizes-rows .prizes-row').forEach(row => {
    const v = parseInt((row.querySelectorAll('.prizes-input')[2].value || '').replace(/[^0-9]/g, '')) || 0;
    total += v;
  });
  document.getElementById('prizes-total').textContent = total.toLocaleString() + '원';
}

function getPrizesData() {
  return Array.from(document.querySelectorAll('#prizes-rows .prizes-row')).map(row => {
    const inp = row.querySelectorAll('.prizes-input');
    const btn = row.querySelector('.prizes-received-btn');
    return {
      received: btn ? btn.textContent === '유' : true,
      company:  inp[0].value.trim(),
      product:  inp[1].value.trim(),
      amount:   parseInt((inp[2].value || '').replace(/[^0-9]/g, '')) || 0,
      note:     inp[3].value.trim(),
    };
  }).filter(r => r.company || r.product || r.amount);
}

function renderPrizesEditor(data = []) {
  document.getElementById('prizes-rows').innerHTML = '';
  const rows = data.length ? data : [{},{},{},{}];
  rows.forEach(r => addPrizesRow(r));
}

function escAttr(s) {
  return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

window.setAmPm = function(picker, val) {
  document.querySelectorAll(`[data-picker="${picker}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === val);
  });
  syncTimeInput(picker);
};

window.syncTimeInput = function(picker) {
  const ampm = document.querySelector(`[data-picker="${picker}"].active`)?.dataset.val || 'AM';
  const hour = document.getElementById(`${picker}-hour`).value;
  const min  = document.getElementById(`${picker}-min`).value;
  if (!hour || !min) return;
  const h24 = ampm === 'AM'
    ? (hour === '12' ? 0 : parseInt(hour))
    : (hour === '12' ? 12 : parseInt(hour) + 12);
  const result = `${String(h24).padStart(2,'0')}:${min}`;
  const hiddenId = picker === 'tee' ? 'admin-tee-time' : 'admin-gather-time';
  document.getElementById(hiddenId).value = result;
  if (picker === 'tee') updateIntervalPreview();
};

// 조 간격 미리보기 (입력 시 실시간 표시)
function updateIntervalPreview() {
  const teeTime = document.getElementById('admin-tee-time').value;
  const interval = parseInt(document.getElementById('admin-tee-interval').value);
  const preview = document.getElementById('tee-interval-preview');
  if (!preview) return;
  if (!teeTime || !interval) { preview.textContent = ''; return; }
  const [h, m] = teeTime.split(':').map(Number);
  const fmt = (totalMin) => {
    const hh = Math.floor(totalMin / 60) % 24;
    const mm = totalMin % 60;
    const ampm = hh < 12 ? 'AM' : 'PM';
    const h12 = hh === 0 ? 12 : hh > 12 ? hh - 12 : hh;
    return `${ampm} ${h12}:${String(mm).padStart(2,'0')}`;
  };
  const start = h * 60 + m;
  preview.textContent = `1조 ${fmt(start)} → 2조 ${fmt(start + interval)} → 3조 ${fmt(start + interval * 2)} …`;
}
window.updateIntervalPreview = updateIntervalPreview;

function setTimePicker(picker, timeStr) {
  // timeStr = "HH:MM" 24시간제
  if (!timeStr) return;
  const [hStr, mStr] = timeStr.split(':');
  let h = parseInt(hStr);
  const min = mStr;
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;

  document.querySelectorAll(`[data-picker="${picker}"]`).forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === ampm);
  });
  document.getElementById(`${picker}-hour`).value = String(h12);
  document.getElementById(`${picker}-min`).value = min;
  syncTimeInput(picker);
}

window.recalcCarts = function() {
  const total = parseInt(document.getElementById('admin-total').value) || 0;
  const courses = parseInt(document.getElementById('admin-courses').value) || 2;
  if (total > 0) {
    const totalCarts = Math.ceil(total / 4);
    const cc = getCourseCarts(totalCarts, courses);
    document.getElementById('admin-carts').value = `총 ${totalCarts}카트`;
    const courseNames = getCourseNames();
    document.getElementById('admin-cart-hint').textContent =
      courseNames.map((n, i) => `${n} ${cc[i]}카트`).join(' + ');
  } else {
    document.getElementById('admin-carts').value = '';
    document.getElementById('admin-cart-hint').textContent = '총인원 ÷ 4 = 카트 수, 코스별로 균등 배분됩니다';
  }
};

window.saveTournament = async function() {
  const name = document.getElementById('admin-name').value.trim();
  const total = parseInt(document.getElementById('admin-total').value) || 0;
  if (!name || !total) {
    showToast('대회명과 총 인원은 필수입니다');
    return;
  }

  const teeUpTime  = document.getElementById('admin-tee-time').value;
  const gatherTime = document.getElementById('admin-gather-time').value;
  const gatherPlace = document.getElementById('admin-gather').value.trim();
  // 표시용 문자열 생성
  const fmt = t => { if (!t) return ''; const [h,m] = t.split(':'); const hh=parseInt(h); return `${hh<12?'AM':'PM'} ${hh===0?12:hh>12?hh-12:hh}:${m}`; };
  const gatherInfo = [fmt(gatherTime), gatherPlace].filter(Boolean).join(' / ');

  const data = {
    name,
    tournamentType: currentTournamentType,
    slogan: document.getElementById('admin-slogan').value.trim(),
    notice: document.getElementById('admin-notice').value.trim(),
    status: document.getElementById('admin-status').value,
    golfCourseName: document.getElementById('admin-golf-course').value.trim(),
    teeUpTime,
    teeUpTimeDisplay: fmt(teeUpTime),
    date: document.getElementById('admin-date').value,
    gatherTime,
    gatherPlace,
    gatherInfo,
    totalParticipants: total,
    courseCount: parseInt(document.getElementById('admin-courses').value) || 2,
    courseNames: getCourseNames(),
    greenFee: document.getElementById('admin-green-fee').value.trim(),
    caddyFee: document.getElementById('admin-caddy-fee').value.trim(),
    prizesData: getPrizesData(),
    teeInterval: parseInt(document.getElementById('admin-tee-interval').value) || 7,
  };

  const editingId = document.getElementById('admin-editing-id').value;

  try {
    if (editingId) {
      await updateDoc(doc(db, 'tournaments', editingId), data);
      showToast('대회 정보가 수정되었습니다');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'tournaments'), data);
      showToast('대회가 만들어졌습니다!');
    }
    closeAdminModal();
    await loadActiveTournaments();
    renderPastList();

    // If currently viewing this tournament's detail, refresh header
    if (currentTournament && editingId && currentTournament.id === editingId) {
      currentTournament = activeTournaments.find(x => x.id === editingId) || currentTournament;
      renderDetailHeader(currentTournament);
      renderSeatMap(currentTournament, allRegistrations);
    }
  } catch (e) {
    console.error(e);
    showToast('저장 중 오류가 발생했습니다');
  }
};

function renderPairingContent(t, registrations) {
  const el = document.getElementById('pairing-content');
  if (!el) return;

  const courseCount = t.courseCount || 2;
  const totalCarts = Math.ceil((t.totalParticipants || 0) / 4);
  const courseCarts = getCourseCarts(totalCarts, courseCount);
  const seatLetters = ['A', 'B', 'C', 'D'];
  const courseNames = getCourseNamesFor(t);

  const regMap = {};
  registrations.forEach(r => {
    regMap[`${r.courseIndex}-${r.cartIndex}-${r.seatIndex}`] = r;
  });

  const isBW = t.tournamentType === 'black-white';
  let html = `<div class="pairing-dnd-hint">카드를 0.5초 길게 눌러서 드래그하면 자리가 바뀝니다</div>`;

  for (let ci = 0; ci < courseCount; ci++) {
    html += `<div class="pairing-course-section">
      <div class="pairing-course-title">${courseNames[ci]}</div>`;
    if (isBW) html += `<div class="pairing-bw-header">
      <div class="pairing-bw-label heuk">흑팀</div>
      <div class="pairing-bw-label baek">백팀</div>
    </div>`;

    for (let cartIdx = 0; cartIdx < courseCarts[ci]; cartIdx++) {
      let teeLabel = '';
      if (t.teeUpTime && t.teeInterval) {
        const [hh, mm] = t.teeUpTime.split(':').map(Number);
        const totalMin = hh * 60 + mm + (t.courseOffsets?.[ci] || 0) + cartIdx * t.teeInterval;
        const th = Math.floor(totalMin / 60) % 24;
        const tm = totalMin % 60;
        const ampm = th < 12 ? 'AM' : 'PM';
        const th12 = th === 0 ? 12 : th > 12 ? th - 12 : th;
        teeLabel = ` <span style="color:var(--gold);font-weight:700;">${ampm} ${th12}:${String(tm).padStart(2,'0')}</span>`;
      }
      html += `<div class="pairing-cart-block">
        <div class="pairing-cart-label">${cartIdx + 1}조${teeLabel}</div>
        <div class="pairing-dnd-row">`;

      for (let si = 0; si < 4; si++) {
        const reg = regMap[`${ci}-${cartIdx}-${si}`];
        const teamCls = isBW ? (si < 2 ? 'heuk' : 'baek') : '';
        if (reg) {
          const isManual = reg.isManual ? 'manual' : '';
          const delBtn = (isAdmin && reg.isManual)
            ? `<div onclick="event.stopPropagation();window._deleteManual('${reg.id}')" style="position:absolute;top:2px;right:3px;font-size:12px;color:rgba(255,100,100,0.8);line-height:1;cursor:pointer;">×</div>` : '';
          html += `<div class="pairing-dnd-slot has-person ${isManual} ${teamCls}"
            data-reg-id="${reg.id}" data-course="${ci}" data-cart="${cartIdx}" data-seat="${si}"
            draggable="true" style="position:relative;">
            ${delBtn}
            <div class="pairing-dnd-seat-letter">${seatLetters[si]}</div>
            <div class="pairing-dnd-name">${(t.lotteryAssigned && reg.lotteryNum) ? (reg.name || '?') + 'ㆍ' + reg.lotteryNum : (reg.name || '?')}</div>
          </div>`;
        } else {
          const addAttr = isAdmin
            ? `class="pairing-dnd-slot empty-clickable ${teamCls}" onclick="window._openManualSheet(${ci},${cartIdx},${si})"`
            : `class="pairing-dnd-slot ${teamCls}"`;
          html += `<div ${addAttr}
            data-course="${ci}" data-cart="${cartIdx}" data-seat="${si}">
            <div class="pairing-dnd-seat-letter">${seatLetters[si]}</div>
            <div class="pairing-dnd-empty">${isAdmin ? '+ 추가' : '빈자리'}</div>
          </div>`;
        }
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
  _initPairingDnD(t);
}

// ── DnD 상태 ─────────────────────────────────────────
let _pairDragSrc = null;
let _pairGhost   = null;
let _longPressTimer = null;
let _longPressDragActive = false;
let _longPressStartX = 0;
let _longPressStartY = 0;
const LONG_PRESS_DELAY = 500;
const DRAG_THRESHOLD = 8;

function _initPairingDnD(t) {
  const slots = document.querySelectorAll('#pairing-content .pairing-dnd-slot');

  slots.forEach(slot => {
    // 데스크탑 드래그 소스
    if (slot.dataset.regId) {
      slot.addEventListener('dragstart', e => {
        _pairDragSrc = slot;
        slot.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      slot.addEventListener('dragend', () => {
        slot.classList.remove('dragging');
        document.querySelectorAll('.pairing-dnd-slot.drag-over').forEach(s => s.classList.remove('drag-over'));
      });
    }

    // 데스크탑 드롭 타겟
    slot.addEventListener('dragover', e => {
      e.preventDefault();
      if (_pairDragSrc && _pairDragSrc !== slot) slot.classList.add('drag-over');
    });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      if (_pairDragSrc && _pairDragSrc !== slot) _doSeatSwap(t, _pairDragSrc, slot);
      _pairDragSrc = null;
    });

    // 모바일 터치 (롱프레스 후 드래그)
    if (slot.dataset.regId) {
      slot.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        _longPressStartX = touch.clientX;
        _longPressStartY = touch.clientY;
        _longPressDragActive = false;
        slot.classList.add('long-press-hold');

        _longPressTimer = setTimeout(() => {
          _longPressDragActive = true;
          _pairDragSrc = slot;
          slot.classList.remove('long-press-hold');
          slot.classList.add('dragging');
          _createPairGhost(slot, touch);
          if (navigator.vibrate) navigator.vibrate(30);
        }, LONG_PRESS_DELAY);
      }, { passive: true });

      slot.addEventListener('touchmove', e => {
        const touch = e.touches[0];
        if (!_longPressDragActive) {
          const dx = Math.abs(touch.clientX - _longPressStartX);
          const dy = Math.abs(touch.clientY - _longPressStartY);
          if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
            clearTimeout(_longPressTimer);
            _longPressTimer = null;
            slot.classList.remove('long-press-hold');
          }
          return;
        }
        e.preventDefault();
        _movePairGhost(touch);
        const target = _slotFromTouch(touch);
        document.querySelectorAll('.pairing-dnd-slot.drag-over').forEach(s => s.classList.remove('drag-over'));
        if (target && target !== slot) target.classList.add('drag-over');
      }, { passive: false });

      slot.addEventListener('touchend', e => {
        clearTimeout(_longPressTimer);
        _longPressTimer = null;
        slot.classList.remove('long-press-hold');
        if (!_longPressDragActive) return;
        e.preventDefault();
        const touch = e.changedTouches[0];
        _removePairGhost();
        slot.classList.remove('dragging');
        document.querySelectorAll('.pairing-dnd-slot.drag-over').forEach(s => s.classList.remove('drag-over'));
        const target = _slotFromTouch(touch);
        if (target && target !== slot) _doSeatSwap(t, slot, target);
        _pairDragSrc = null;
        _longPressDragActive = false;
      }, { passive: false });

      slot.addEventListener('touchcancel', () => {
        clearTimeout(_longPressTimer);
        _longPressTimer = null;
        slot.classList.remove('long-press-hold');
        if (_longPressDragActive) {
          _removePairGhost();
          slot.classList.remove('dragging');
          document.querySelectorAll('.pairing-dnd-slot.drag-over').forEach(s => s.classList.remove('drag-over'));
        }
        _longPressDragActive = false;
        _pairDragSrc = null;
      });
    }
  });
}

function _createPairGhost(slot, touch) {
  _pairGhost = slot.cloneNode(true);
  Object.assign(_pairGhost.style, {
    position: 'fixed', pointerEvents: 'none', zIndex: '9999',
    opacity: '0.85', transform: 'scale(1.1)',
    width: slot.offsetWidth + 'px', height: slot.offsetHeight + 'px',
    left: (touch.clientX - slot.offsetWidth / 2) + 'px',
    top: (touch.clientY - slot.offsetHeight / 2) + 'px',
    borderRadius: '8px', transition: 'none',
    background: 'rgba(62,160,102,0.35)', border: '1.5px solid var(--green-light)',
  });
  (document.querySelector('.phone') || document.body).appendChild(_pairGhost);
}
function _movePairGhost(touch) {
  if (!_pairGhost) return;
  _pairGhost.style.left = (touch.clientX - _pairGhost.offsetWidth / 2) + 'px';
  _pairGhost.style.top  = (touch.clientY - _pairGhost.offsetHeight / 2) + 'px';
}
function _removePairGhost() {
  if (_pairGhost) { _pairGhost.remove(); _pairGhost = null; }
}
function _slotFromTouch(touch) {
  if (_pairGhost) _pairGhost.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (_pairGhost) _pairGhost.style.display = '';
  return el ? el.closest('.pairing-dnd-slot') : null;
}

async function _doSeatSwap(t, fromSlot, toSlot) {
  const fromId = fromSlot.dataset.regId;
  const toId   = toSlot.dataset.regId;
  const toCi = parseInt(toSlot.dataset.course), toCa = parseInt(toSlot.dataset.cart), toSe = parseInt(toSlot.dataset.seat);
  const frCi = parseInt(fromSlot.dataset.course), frCa = parseInt(fromSlot.dataset.cart), frSe = parseInt(fromSlot.dataset.seat);
  try {
    if (toId) {
      await Promise.all([
        updateDoc(doc(db, 'tournaments', t.id, 'registrations', fromId), { courseIndex: toCi, cartIndex: toCa, seatIndex: toSe }),
        updateDoc(doc(db, 'tournaments', t.id, 'registrations', toId),   { courseIndex: frCi, cartIndex: frCa, seatIndex: frSe }),
      ]);
      showToast('자리가 교체되었습니다');
    } else {
      await updateDoc(doc(db, 'tournaments', t.id, 'registrations', fromId), { courseIndex: toCi, cartIndex: toCa, seatIndex: toSe });
      showToast('자리가 변경되었습니다');
    }
    setTimeout(() => renderPairingContent(t, allRegistrations), 300);
  } catch (e) { showToast('저장 오류: ' + e.message); }
}

// ═══════════════════════════════════════════════════════
// 추첨 번호 부여 / 리셋 (Admin only)
// ═══════════════════════════════════════════════════════

window.assignLotteryNumbers = async function() {
  if (!isAdmin || !currentTournament) return;
  const regs = allRegistrations;
  if (regs.length === 0) { showToast('참가자가 없습니다'); return; }

  // 1~N 배열을 Fisher-Yates로 셔플
  const nums = Array.from({ length: regs.length }, (_, i) => i + 1);
  for (let i = nums.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [nums[i], nums[j]] = [nums[j], nums[i]];
  }

  try {
    const batch = writeBatch(db);
    regs.forEach((r, idx) => {
      batch.update(doc(db, 'tournaments', currentTournament.id, 'registrations', r.id), { lotteryNum: nums[idx] });
    });
    batch.update(doc(db, 'tournaments', currentTournament.id), { lotteryAssigned: true });
    await batch.commit();
    currentTournament.lotteryAssigned = true;
    showToast(`${regs.length}명에게 번호가 부여되었습니다`);
  } catch (e) { showToast('오류: ' + e.message); }
};

window.resetLotteryNumbers = async function() {
  if (!isAdmin || !currentTournament) return;
  openConfirm('번호 리셋', '부여된 추첨 번호를 모두 삭제하시겠습니까?', async () => {
    try {
      const batch = writeBatch(db);
      allRegistrations.forEach(r => {
        batch.update(doc(db, 'tournaments', currentTournament.id, 'registrations', r.id), { lotteryNum: deleteField() });
      });
      batch.update(doc(db, 'tournaments', currentTournament.id), { lotteryAssigned: false });
      await batch.commit();
      currentTournament.lotteryAssigned = false;
      showToast('추첨 번호가 초기화되었습니다');
    } catch (e) { showToast('오류: ' + e.message); }
  });
};

// ── 대회 정보 이미지 저장 (JPEG) ──────────────────────
window.downloadDetailImage = async function() {
  const t = currentTournament;
  if (!t) return;
  const scroll = document.getElementById('detail-scroll');
  const panel  = document.getElementById('detail-panel-info');
  if (!scroll) return;

  // 캡처 시 숨길 요소 (관리자 버튼, 신청 버튼, 선택 바)
  const toHide = [
    scroll.querySelector('button[onclick*="openAdminModal"]')?.closest('div'),
    document.getElementById('detail-register-btn'),
    document.getElementById('selected-info-bar'),
  ].filter(Boolean);
  const origDisplay = toHide.map(el => el.style.display);
  toHide.forEach(el => el.style.display = 'none');

  const s = {
    panelOv: panel.style.overflow, panelH: panel.style.height,
    scrollOv: scroll.style.overflow, scrollH: scroll.style.height,
    scrollPad: scroll.style.padding,
  };
  panel.style.overflow  = 'visible';
  panel.style.height    = 'auto';
  scroll.style.overflow = 'visible';
  scroll.style.height   = 'auto';
  scroll.style.padding  = '48px 16px';

  showToast('이미지 생성 중...');
  await new Promise(r => setTimeout(r, 150));

  try {
    const canvas = await html2canvas(scroll, {
      backgroundColor: '#0A2406', scale: 2, useCORS: true, logging: false,
    });
    const link = document.createElement('a');
    link.download = `${t.name}_대회정보.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
  } catch(e) {
    showToast('이미지 생성에 실패했습니다');
  } finally {
    toHide.forEach((el, i) => el.style.display = origDisplay[i]);
    panel.style.overflow  = s.panelOv;
    panel.style.height    = s.panelH;
    scroll.style.overflow = s.scrollOv;
    scroll.style.height   = s.scrollH;
    scroll.style.padding  = s.scrollPad;
  }
};

// ── 화면 그대로 PDF (html2canvas 캡처) ────────────────
window.downloadScreenPDF = async function() {
  const t = currentTournament;
  if (!t) return;

  const overlay  = document.getElementById('pairing-overlay');
  const scroll   = document.getElementById('pairing-content');
  const footer   = overlay.querySelector('.pairing-footer');
  const closeBtn = overlay.querySelector('.pairing-close-btn');
  const phone    = overlay.closest('.phone');

  const pdfBtn = footer ? footer.querySelector('.pairing-pdf-btn') : null;
  if (pdfBtn) { pdfBtn.textContent = '캡처 중...'; pdfBtn.disabled = true; }

  const s = {
    phoneOv: phone.style.overflow,    phoneH: phone.style.height,
    ovPos:   overlay.style.position,  ovOv: overlay.style.overflow,
    ovH:     overlay.style.height,    ovBR: overlay.style.borderRadius,
    scOv:    scroll.style.overflow,   scH: scroll.style.height,
    scMH:    scroll.style.maxHeight,  scFl: scroll.style.flex,
  };

  phone.style.overflow       = 'visible';
  phone.style.height         = 'auto';
  overlay.style.position     = 'relative';
  overlay.style.overflow     = 'visible';
  overlay.style.height       = 'auto';
  overlay.style.borderRadius = '20px';
  scroll.style.overflow      = 'visible';
  scroll.style.height        = 'auto';
  scroll.style.maxHeight     = 'none';
  scroll.style.flex          = 'none';
  if (footer)   footer.style.display   = 'none';
  if (closeBtn) closeBtn.style.display = 'none';

  await new Promise(r => setTimeout(r, 120));

  try {
    const canvas = await html2canvas(overlay, {
      backgroundColor: '#0A2406', scale: 2, useCORS: true, logging: false,
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const win = window.open('', '_blank');
    if (!win) { showToast('팝업 차단을 해제해 주세요'); return; }
    win.document.write(`<!DOCTYPE html><html><head>
<meta charset="UTF-8"><title>${t.name} 조편성</title>
<style>*{margin:0;padding:0;}body{background:#000;}img{width:100%;display:block;}
@media print{@page{margin:0;size:auto;}body{background:#000;print-color-adjust:exact;-webkit-print-color-adjust:exact;}}</style>
</head><body><img src="${imgData}">
<script>window.onload=function(){window.print();}<\/script></body></html>`);
    win.document.close();
  } catch(e) {
    showToast('캡처에 실패했습니다');
  } finally {
    phone.style.overflow       = s.phoneOv;
    phone.style.height         = s.phoneH;
    overlay.style.position     = s.ovPos;
    overlay.style.overflow     = s.ovOv;
    overlay.style.height       = s.ovH;
    overlay.style.borderRadius = s.ovBR;
    scroll.style.overflow      = s.scOv;
    scroll.style.height        = s.scH;
    scroll.style.maxHeight     = s.scMH;
    scroll.style.flex          = s.scFl;
    if (footer)   footer.style.display   = '';
    if (closeBtn) closeBtn.style.display = '';
    if (pdfBtn) { pdfBtn.textContent = '화면 그대로 PDF 저장'; pdfBtn.disabled = false; }
  }
};

// ── Confirm modal ──────────────────────────────────────
let confirmCallback = null;
function openConfirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = onOk;
  document.getElementById('confirm-overlay').classList.add('open');
}
window.closeConfirm = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
};
document.getElementById('confirm-ok-btn').addEventListener('click', async () => {
  if (confirmCallback) await confirmCallback();
  closeConfirm();
});

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
window.showToast = showToast;

// ── Helpers ────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '-';
  try {
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  } catch { return dateStr; }
}
function commaNum(n) {
  const raw = String(n).replace(/[^\d]/g, '');
  return raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
window.formatMoney = function(el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
};
function fmtMoneyInput(val) {
  if (!val) return '';
  const raw = String(val).replace(/[^\d]/g, '');
  return raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',') : '';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
