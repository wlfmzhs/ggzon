<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스코어 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --header-bg: #0f2a1a;
    }
    html, body { width: 100%; height: 100%; background: #1a1a1a; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone { width: 390px; height: 844px; background: var(--green-dark); border-radius: 40px; box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .phone::before { content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100; }

    #loading-overlay { position: absolute; inset: 0; background: var(--green-dark); display: flex; align-items: center; justify-content: center; z-index: 999; border-radius: 40px; }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(62,160,102,0.3); border-top-color: var(--green-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar { flex-shrink: 0; padding: 32px 18px 10px; display: flex; align-items: center; gap: 10px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 0 8px 0 0; color: var(--green-light); font-size: 24px; line-height: 1; flex-shrink: 0; }
    .appbar-info { flex: 1; min-width: 0; }
    .appbar-title { font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appbar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 6px; height: 6px; background: #e74c3c; border-radius: 50%; display: inline-block; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* 스크롤 */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 비참석자 안내 */
    .notice-bar { display: none; align-items: center; gap: 8px; margin: 8px 14px; padding: 10px 14px; background: rgba(255,200,60,0.08); border: 1px solid rgba(255,200,60,0.25); border-radius: 10px; font-size: 12px; color: rgba(255,200,60,0.85); }

    /* 요약 바 */
    .summary-bar { display: flex; margin: 10px 14px 14px; background: rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; }
    .summary-player { flex: 1; text-align: center; padding: 12px 6px; border-right: 1px solid rgba(255,255,255,0.08); }
    .summary-player:last-child { border-right: none; }
    .summary-name { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 600; }
    .summary-score { font-size: 22px; font-weight: 900; color: #fff; }
    .summary-score.under { color: #e74c3c; }
    .summary-score.even  { color: rgba(255,255,255,0.8); }

    /* 스코어 테이블 공통 */
    .score-section { margin: 0 14px 16px; }
    table.sc-table { width: 100%; border-collapse: collapse; }

    /* HOLE 헤더 행 */
    .sc-table .tr-header { background: var(--header-bg); }
    .sc-table .tr-header th { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.85); text-align: center; padding: 8px 0; }
    .sc-table .tr-header th.th-name-col { text-align: left; padding-left: 6px; font-size: 10px; letter-spacing: 0.5px; }
    .sc-table .tr-header th.th-t { color: #5bc8f5; }

    /* 플레이어 행 */
    .sc-table .tr-player { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sc-table .tr-player:last-child { border-bottom: none; }
    .sc-table .tr-player td { text-align: center; padding: 5px 0; vertical-align: middle; }
    .sc-table .tr-player td.td-name { text-align: left; padding-left: 6px; font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.85); white-space: nowrap; }
    .me-tag { font-size: 9px; color: var(--green-light); margin-left: 3px; font-weight: 700; }
    .sc-table .tr-player td.td-t { font-size: 13px; font-weight: 900; color: #5bc8f5; }

    /* 점수 셀 */
    .score-chip {
      width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.2);
      background: none; border: none; border-radius: 4px;
      font-family: inherit;
    }
    button.score-chip { cursor: pointer; }
    button.score-chip:active { opacity: 0.6; }

    /* 입력 가능 빈 셀 */
    button.score-chip.mine { color: rgba(255,255,255,0.2); }

    /* 언더파: 빨간 원, 흰 숫자 */
    .chip-under { background: #e74c3c !important; border-radius: 50% !important; color: #fff !important; border: none !important; }
    /* 파 0: 숫자만 */
    .chip-zero  { color: #fff !important; background: none !important; border: none !important; }
    /* +1 이상: 숫자만 */
    .chip-p1    { color: #fff !important; background: none !important; border: none !important; }
    .chip-p2up  { color: #fff !important; background: none !important; border: none !important; }
    /* 빈 셀: 얇은 테두리 */
    .score-chip.empty { border: 1px solid rgba(255,255,255,0.12) !important; border-radius: 3px !important; }

    /* 픽커 */
    .picker-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .picker-overlay.open { opacity: 1; pointer-events: all; }
    .picker-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 22px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .picker-overlay.open .picker-sheet { transform: translateY(0); }
    .picker-title { font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 18px; color: rgba(255,255,255,0.85); }
    .picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
    .picker-opt { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 11px 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; font-family: inherit; transition: transform 0.1s; }
    .picker-opt:active { transform: scale(0.92); }
    .picker-opt .pv { font-size: 16px; font-weight: 900; color: #fff; }
    .picker-opt .pl { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 700; }
    .po-under { background: rgba(231,76,60,0.2) !important; border-color: rgba(231,76,60,0.5) !important; } .po-under .pv { color: #ff7b6b; }
    .po-zero  { background: rgba(255,255,255,0.07) !important; border-color: rgba(255,255,255,0.2) !important; }
    .po-p1    { background: none !important; border: 1.5px solid rgba(255,255,255,0.5) !important; border-radius: 0 !important; }
    .po-p2up  { background: none !important; border: 1.5px solid rgba(255,255,255,0.5) !important; border-radius: 0 !important; outline: 1.5px solid rgba(255,255,255,0.5); outline-offset: 3px; }
    .picker-cancel { width: 100%; padding: 13px; background: rgba(255,255,255,0.07); border: none; border-radius: 12px; color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    .toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(20,20,20,0.95); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="phone">

  <div id="loading-overlay"><div class="spinner"></div></div>

  <div class="appbar">
    <button class="back-btn" id="btn-back">‹</button>
    <div class="appbar-info">
      <div class="appbar-title" id="course-name">로딩중...</div>
      <div class="appbar-sub"><span class="live-dot"></span>실시간 스코어</div>
    </div>
  </div>

  <div class="scroll-area">
    <div class="notice-bar" id="notice-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      참석자만 스코어를 입력할 수 있습니다.
    </div>

    <!-- 요약 바 -->
    <div class="summary-bar" id="summary-bar"></div>

    <!-- 전반 -->
    <div class="score-section">
      <table class="sc-table" id="table-front"></table>
    </div>

    <!-- 후반 -->
    <div class="score-section">
      <table class="sc-table" id="table-back"></table>
    </div>
  </div>

  <div class="picker-overlay" id="picker-overlay">
    <div class="picker-sheet">
      <div class="picker-title" id="picker-title">1번 홀</div>
      <div class="picker-grid" id="picker-grid"></div>
      <button class="picker-cancel" id="picker-cancel">취소</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);

const joinId = new URLSearchParams(location.search).get('id');
if (!joinId) location.href = 'join.html';

let currentUser = null;
let joinData    = null;
let pickerHole  = null;
let pickerUid   = null;

const OPTS = [
  { v: -3, label: '알바', cls: 'po-under' },
  { v: -2, label: '이글', cls: 'po-under' },
  { v: -1, label: '버디', cls: 'po-under' },
  { v:  0, label: '파',   cls: 'po-zero'  },
  { v:  1, label: '보기', cls: 'po-p1'    },
  { v:  2, label: '더블', cls: 'po-p2up'  },
  { v:  3, label: '트리', cls: 'po-p2up'  },
  { v:  4, label: '+4',   cls: 'po-p2up'  },
  { v:  5, label: '+5',   cls: 'po-p2up'  },
];

function chipClass(v) {
  if (v === null) return '';
  if (v < 0)  return 'chip-under';
  if (v === 0) return 'chip-zero';
  if (v === 1) return 'chip-p1';
  return 'chip-p2up';
}
function chipLabel(v) {
  if (v === null) return '';
  if (v === 0) return '0';
  return v > 0 ? `+${v}` : String(v);
}
function totLabel(n, hasAny) {
  if (!hasAny) return '-';
  if (n === 0) return '0';
  return n > 0 ? `+${n}` : String(n);
}

document.getElementById('btn-back').onclick = () => history.back();
document.getElementById('picker-cancel').onclick = closePicker;
document.getElementById('picker-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('picker-overlay')) closePicker();
});

onAuthStateChanged(auth, user => {
  if (!user) { location.href = 'login.html'; return; }
  currentUser = user;
  document.getElementById('loading-overlay').classList.add('hidden');
  onSnapshot(doc(db, 'joins', joinId), snap => {
    if (!snap.exists()) return;
    joinData = { id: snap.id, ...snap.data() };
    document.getElementById('course-name').textContent = joinData.course || '스코어';
    if (joinData.joinType === 'screen') {
      showToast('스크린 조인은 스코어 기능이 없습니다');
      setTimeout(() => history.back(), 1500);
      return;
    }
    render();
  });
});

function render() {
  const players      = joinData.participants || [];
  const scores       = joinData.scores || {};
  const isParticipant = players.some(p => p.uid === currentUser.uid);

  if (!isParticipant) document.getElementById('notice-bar').style.display = 'flex';

  // 요약 바
  document.getElementById('summary-bar').innerHTML = players.map(p => {
    const holes  = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const hasAny = holes.some(v => v !== null);
    const tot    = hasAny ? holes.reduce((a, v) => a + (v ?? 0), 0) : null;
    const label  = tot === null ? '-' : tot === 0 ? 'E' : tot > 0 ? `+${tot}` : String(tot);
    const cls    = tot === null ? '' : tot < 0 ? 'under' : tot === 0 ? 'even' : '';
    const isMe   = currentUser && p.uid === currentUser.uid;
    return `<div class="summary-player">
      <div class="summary-name">${p.name}${isMe ? '<span class="me-tag">나</span>' : ''}</div>
      <div class="summary-score ${cls}">${label}</div>
    </div>`;
  }).join('');

  // 전반 테이블
  document.getElementById('table-front').innerHTML = buildTable(players, scores, isParticipant, 0, 9);
  // 후반 테이블
  document.getElementById('table-back').innerHTML  = buildTable(players, scores, isParticipant, 9, 18);
}

function buildTable(players, scores, canEdit, from, to) {
  const count = to - from;
  const holeNums = Array.from({length: count}, (_, i) => from + i + 1);

  let html = `<thead><tr class="tr-header">
    <th class="th-name-col">HOLE</th>
    ${holeNums.map(n => `<th>${n}</th>`).join('')}
    <th class="th-t">T</th>
  </tr></thead><tbody>`;

  players.forEach(p => {
    const isMyRow = currentUser && p.uid === currentUser.uid;
    const holes   = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const slice   = holes.slice(from, to);
    const hasAny  = slice.some(v => v !== null);
    const sub     = slice.reduce((a, v) => a + (v ?? 0), 0);

    const cells = slice.map((v, i) => {
      const idx = from + i;
      const cc  = chipClass(v);
      const cl  = chipLabel(v);
      const emptyCls = v === null ? 'empty' : '';
      if (canEdit) {
        return `<td><button class="score-chip mine ${cc} ${emptyCls}" onclick="window._openPicker('${p.uid}',${idx})">${cl}</button></td>`;
      }
      return `<td><div class="score-chip ${cc} ${emptyCls}">${cl}</div></td>`;
    }).join('');

    html += `<tr class="tr-player">
      <td class="td-name">${p.name}${isMyRow ? '<span class="me-tag">나</span>' : ''}</td>
      ${cells}
      <td class="td-t">${totLabel(sub, hasAny)}</td>
    </tr>`;
  });

  html += '</tbody>';
  return html;
}

window._openPicker = function(uid, holeIdx) {
  pickerHole = holeIdx;
  pickerUid  = uid;
  document.getElementById('picker-title').textContent = `${holeIdx + 1}번 홀`;
  document.getElementById('picker-grid').innerHTML = OPTS.map(o =>
    `<button class="picker-opt ${o.cls}" onclick="window._selectScore(${o.v})">
      <span class="pv">${o.v === 0 ? '0' : o.v > 0 ? '+'+o.v : o.v}</span>
      <span class="pl">${o.label}</span>
    </button>`
  ).join('');
  document.getElementById('picker-overlay').classList.add('open');
};

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  pickerHole = null;
  pickerUid  = null;
}

window._selectScore = async function(val) {
  if (pickerHole === null || !pickerUid || !joinData) return;
  const targetUid = pickerUid;
  const holeIdx   = pickerHole;
  closePicker();
  const scores = joinData.scores || {};
  const holes  = [...((scores[targetUid] || {}).holes || Array(18).fill(null))];
  holes[holeIdx] = val;
  try {
    await updateDoc(doc(db, 'joins', joinId), {
      [`scores.${targetUid}.holes`]: holes
    });
  } catch (e) { showToast('저장 오류: ' + e.message); }
};

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
