  <title>스코어 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --header-bg: #0f2a1a;
    }
    html, body { width: 100%; height: 100%; background: #1a1a1a; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone { width: 390px; height: 844px; background: var(--green-dark); border-radius: 40px; box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .phone::before { content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100; }

    #loading-overlay { position: absolute; inset: 0; background: var(--green-dark); display: flex; align-items: center; justify-content: center; z-index: 999; border-radius: 40px; }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(62,160,102,0.3); border-top-color: var(--green-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar { flex-shrink: 0; padding: 32px 18px 10px; display: flex; align-items: center; gap: 10px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 0 8px 0 0; color: var(--green-light); font-size: 24px; line-height: 1; flex-shrink: 0; }
    .appbar-info { flex: 1; min-width: 0; }
    .appbar-title { font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appbar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 6px; height: 6px; background: #e74c3c; border-radius: 50%; display: inline-block; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* 스크롤 */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 비참석자 안내 */
    .notice-bar { display: none; align-items: center; gap: 8px; margin: 8px 14px; padding: 10px 14px; background: rgba(255,200,60,0.08); border: 1px solid rgba(255,200,60,0.25); border-radius: 10px; font-size: 12px; color: rgba(255,200,60,0.85); }

    /* 코스 그룹 */
    .course-group + .course-group { margin-top: 6px; padding-top: 14px; border-top: 1px solid rgba(62,160,102,0.15); }
    .course-group-label { margin: 10px 14px 0; font-size: 12px; font-weight: 900; color: var(--green-light); letter-spacing: 0.02em; }

    /* 요약 바 */
    .summary-bar { display: flex; flex-direction: column; margin: 10px 14px 14px; background: rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; }
    .summary-player { display: grid; grid-template-columns: 42px 1fr auto auto; align-items: center; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); gap: 0 8px; }
    .summary-player:last-child { border-bottom: none; }
    .summary-player.rank-1st { background: rgba(240,192,64,0.07); }
    .rank-badge { font-size: 10px; font-weight: 900; letter-spacing: 0.04em; }
    .rank-badge.r1 { color: #f0c040; }
    .rank-badge.r2 { color: rgba(255,255,255,0.55); }
    .rank-badge.r3 { color: #cd8c5a; }
    .rank-badge.rn { color: rgba(255,255,255,0.25); }
    .summary-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); }
    .summary-holes { font-size: 10px; color: rgba(255,255,255,0.25); text-align: right; }
    .summary-score { font-size: 18px; font-weight: 900; color: #fff; text-align: right; min-width: 36px; }
    .summary-score.under { color: #e74c3c; }
    .summary-score.even  { color: rgba(255,255,255,0.8); }

    /* 스코어 테이블 공통 */
    .score-section { margin: 0 14px 16px; }
    table.sc-table { width: 100%; border-collapse: collapse; }

    /* HOLE 헤더 행 — 밝은 바 전체 (T 포함) */
    .sc-table .tr-header { background: rgba(255,255,255,0.88); }
    .sc-table .tr-header th { font-size: 11px; font-weight: 900; color: #111; text-align: center; padding: 8px 0; }
    .sc-table .tr-header th.th-name-col { text-align: left; padding-left: 6px; font-size: 10px; letter-spacing: 0.5px; }
    .sc-table .tr-header th.th-t { color: #f0c040; width: 36px; min-width: 36px; }

    /* 플레이어 행 */
    .sc-table .tr-player { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sc-table .tr-player:last-child { border-bottom: none; }
    .sc-table .tr-player td { text-align: center; padding: 5px 0; vertical-align: middle; }
    .sc-table .tr-player td.td-name { text-align: left; padding-left: 6px; font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.85); white-space: nowrap; }
    .me-tag { font-size: 9px; color: var(--green-light); margin-left: 3px; font-weight: 700; }
    .sc-table .tr-player td.td-t { font-size: 12px; font-weight: 900; color: #f0c040; background: var(--header-bg); width: 36px; min-width: 36px; }

    /* 점수 셀 */
    .score-chip {
      width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.2);
      background: none; border: none; border-radius: 4px;
      font-family: inherit;
    }
    button.score-chip { cursor: pointer; }
    button.score-chip:active { opacity: 0.6; }

    /* 입력 가능 빈 셀 */
    button.score-chip.mine { color: rgba(255,255,255,0.2); }

    /* 언더파: 빨간 원, 흰 숫자 */
    .chip-under { background: #e74c3c !important; border-radius: 50% !important; color: #fff !important; border: none !important; }
    /* 파 0: 숫자만 */
    .chip-zero  { color: #fff !important; background: none !important; border: none !important; }
    /* +1 이상: 숫자만 */
    .chip-p1    { color: #fff !important; background: none !important; border: none !important; }
    .chip-p2up  { color: #fff !important; background: none !important; border: none !important; }
    /* 빈 셀: 얇은 테두리 */
    .score-chip.empty { border: 1px solid rgba(255,255,255,0.12) !important; border-radius: 3px !important; }

    /* 픽커 */
    .picker-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .picker-overlay.open { opacity: 1; pointer-events: all; }
    .picker-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 22px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .picker-overlay.open .picker-sheet { transform: translateY(0); }
    .picker-title { font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 18px; color: rgba(255,255,255,0.85); }
    .picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
    .picker-opt { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 11px 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; font-family: inherit; transition: transform 0.1s; }
    .picker-opt:active { transform: scale(0.92); }
    .picker-opt .pv { font-size: 16px; font-weight: 900; color: #fff; }
    .picker-opt .pl { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 700; }
    .po-under { background: rgba(231,76,60,0.2) !important; border-color: rgba(231,76,60,0.5) !important; } .po-under .pv { color: #ff7b6b; }
    .po-zero  { background: rgba(255,255,255,0.07) !important; border-color: rgba(255,255,255,0.2) !important; }
    .po-p1    { background: none !important; border: 1.5px solid rgba(255,255,255,0.5) !important; border-radius: 0 !important; }
    .po-p2up  { background: none !important; border: 1.5px solid rgba(255,255,255,0.5) !important; border-radius: 0 !important; outline: 1.5px solid rgba(255,255,255,0.5); outline-offset: 3px; }
    .po-delete { background: rgba(231,76,60,0.08) !important; border-color: rgba(231,76,60,0.3) !important; } .po-delete .pv { color: rgba(231,76,60,0.75); font-size: 20px !important; } .po-delete .pl { color: rgba(231,76,60,0.5); }
    .picker-cancel { width: 100%; padding: 13px; background: rgba(255,255,255,0.07); border: none; border-radius: 12px; color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* 제출 버튼 영역 */
    .submit-bar { flex-shrink: 0; padding: 10px 14px 24px; display: none; }
    .submit-bar.show { display: block; }
    .btn-submit {
      width: 100%; padding: 15px; border-radius: 14px;
      background: var(--green-light); color: #fff;
      font-size: 15px; font-weight: 900; border: none;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-submit:active { opacity: 0.8; }

    /* 제출 확인 시트 */
    .submit-sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .submit-sheet-overlay.open { opacity: 1; pointer-events: all; }
    .submit-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 24px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .submit-sheet-overlay.open .submit-sheet { transform: translateY(0); }
    .submit-sheet-title { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
    .submit-sheet-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
    .submit-summary-box {
      background: rgba(255,255,255,0.05); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 20px;
    }
    .submit-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; }
    .submit-row-label { color: rgba(255,255,255,0.5); }
    .submit-row-val { font-weight: 700; color: #fff; }
    .submit-row-val.under { color: #e74c3c; }
    .submit-row-val.over  { color: rgba(255,255,255,0.8); }
    .submit-row + .submit-row { border-top: 1px solid rgba(255,255,255,0.07); }
    .btn-submit-confirm {
      width: 100%; padding: 14px; border-radius: 12px;
      background: var(--green-light); color: #fff;
      font-size: 15px; font-weight: 700; border: none;
      cursor: pointer; font-family: inherit; margin-bottom: 10px;
    }
    .btn-submit-cancel {
      width: 100%; padding: 13px; background: rgba(255,255,255,0.07); border: none;
      border-radius: 12px; color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    .toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(20,20,20,0.95); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 팀 연결 */
    .party-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; cursor: pointer; color: rgba(255,255,255,0.5); padding: 5px 10px 5px 8px; line-height: 0; flex-shrink: 0; }
    .party-btn.linked { background: rgba(62,160,102,0.15); border-color: rgba(62,160,102,0.4); color: var(--green-light); }
    .party-btn-inner { display: flex; align-items: center; gap: 4px; }
    .party-btn-label { font-size: 11px; font-weight: 700; line-height: 1; white-space: nowrap; }
    .party-indicator { font-size: 10px; color: var(--green-light); font-weight: 700; }
    .party-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .party-overlay.open { opacity: 1; pointer-events: all; }
    .party-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 24px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .party-overlay.open .party-sheet { transform: translateY(0); }
    .party-sheet-title { font-size: 16px; font-weight: 900; margin-bottom: 20px; }
    .party-section { margin-bottom: 16px; }
    .party-section-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.05em; margin-bottom: 8px; }
    .party-candidate { width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; font-family: inherit; text-align: left; }
    .party-candidate:active { opacity: 0.7; }
    .party-candidate-course { font-size: 13px; font-weight: 700; color: #fff; }
    .party-candidate-meta { font-size: 11px; color: rgba(255,255,255,0.45); }
    .party-candidate-empty { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; padding: 20px 0; }
    .party-linked-box { background: rgba(62,160,102,0.1); border: 1px solid rgba(62,160,102,0.3); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .party-linked-course { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .party-linked-members { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    .party-unlink-btn { width: 100%; padding: 10px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 10px; color: #e74c3c; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .party-max-msg { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 14px; }
    .party-close-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.07); border: none; border-radius: 12px; color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .party-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }

    /* 파 행 */
    .tr-par td { text-align: center; padding: 3px 0; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .tr-par td.par-label-cell { text-align: left; padding-left: 6px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); }
    .tr-par td.par-total-cell { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.4); }
    .par-chip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; font-size: 10px; font-weight: 900;
      color: rgba(255,255,255,0.45); background: none; border: none;
      border-radius: 4px; font-family: inherit;
    }
    button.par-chip { cursor: pointer; }
    button.par-chip:active { opacity: 0.6; }
    .par-chip.unset { color: rgba(255,255,255,0.18); border: 1px dashed rgba(255,255,255,0.15) !important; border-radius: 3px !important; }

    /* 파 픽커 */
    .par-picker-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .par-picker-overlay.open { opacity: 1; pointer-events: all; }
    .par-picker-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 22px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .par-picker-overlay.open .par-picker-sheet { transform: translateY(0); }
    .par-picker-title { font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 18px; color: rgba(255,255,255,0.85); }
    .par-opts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .par-opt { padding: 16px 8px; border-radius: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); font-size: 18px; font-weight: 900; color: #fff; cursor: pointer; font-family: inherit; text-align: center; }
    .par-opt:active { opacity: 0.7; }

    /* 공유 버튼 */
    .share-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; cursor: pointer; color: rgba(255,255,255,0.5); padding: 5px 10px; line-height: 0; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .share-btn:active { opacity: 0.6; }
    .share-btn-label { font-size: 11px; font-weight: 700; line-height: 1; color: rgba(255,255,255,0.5); }

    /* 캡처용 공유 카드 (화면 밖에 렌더링) */
    #share-card {
      position: fixed; left: -9999px; top: 0;
      width: 390px; background: var(--green-dark);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      padding-bottom: 24px;
    }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<body>
<div class="phone">

  <div id="loading-overlay"><div class="spinner"></div></div>

  <div class="appbar">
    <button class="back-btn" id="btn-back">‹</button>
    <div class="appbar-info">
      <div class="appbar-title" id="course-name">로딩중...</div>
      <div class="appbar-sub">
        <span class="live-dot"></span>실시간 스코어
        <span id="course-sub" style="color:rgba(255,255,255,0.5);"></span>
        <span class="party-indicator" id="party-indicator" style="display:none;">· 2팀 연결</span>
        <span id="viewer-count" style="display:none;align-items:center;align-self:center;gap:3px;margin-left:8px;line-height:1;">
          <svg width="11" height="11" viewBox="-1 -1 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;overflow:hidden;transform:translateY(-1px);"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="viewer-num">0</span>
        </span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;">
      <button class="share-btn" id="btn-share" title="스코어 공유" onclick="shareScore()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        <span class="share-btn-label">공유</span>
      </button>
      <button class="party-btn" id="btn-party" title="팀 연결">
        <div class="party-btn-inner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span class="party-btn-label">단체라운드</span>
        </div>
      </button>
    </div>
  </div>

  <div class="scroll-area">
    <div class="notice-bar" id="notice-bar">

// 팀 연결 함수들
function loadParty(partyId) {
  const unsub = onSnapshot(doc(db, 'joins', partyId), snap => {
    if (!snap.exists()) { partyJoinDataMap.delete(partyId); return; }
    partyJoinDataMap.set(partyId, { id: snap.id, ...snap.data() });
    updatePartyIndicator();
    render();
  });
  partyUnsubs.set(partyId, unsub);
}

function updatePartyIndicator() {
  const total = 1 + (joinData.partyIds || (joinData.partyId ? [joinData.partyId] : [])).length;
  const linked = total > 1;
  const indicator = document.getElementById('party-indicator');
  indicator.style.display = linked ? 'inline' : 'none';
  indicator.textContent = `· ${total}팀 연결`;
  document.getElementById('btn-party').classList.toggle('linked', linked);
}

async function openPartySheet() {
  const pids  = joinData.partyIds || (joinData.partyId ? [joinData.partyId] : []);
  const total = 1 + pids.length;
  const linked = pids.length > 0;
  document.getElementById('party-linked-view').style.display = linked ? 'block' : 'none';
  document.getElementById('party-linked-list').innerHTML = pids.map(id => {
    const pd = partyJoinDataMap.get(id);
    const courseName = pd?.course || '상대 팀';
    const members    = (pd?.participants || []).map(p => p.name).join(', ') || '-';
    return `<div class="party-linked-box">
      <div class="party-linked-course">${courseName}</div>
      <div class="party-linked-members" style="margin-bottom:0;">${members}</div>
    </div>`;
  }).join('');
  const atMax = total >= MAX_PARTY_TEAMS;
  document.getElementById('party-unlinked-view').style.display = atMax ? 'none' : 'block';
  document.getElementById('party-max-msg').style.display = atMax ? 'block' : 'none';
  document.getElementById('party-overlay').classList.add('open');
  if (!atMax) loadPartyCandidates(pids);
}

function closePartySheet() {
  document.getElementById('party-overlay').classList.remove('open');
}

function prefetchPartyCandidates() {
  partyCandidatesPromise = getDocs(query(collection(db, 'joins'), where('date', '==', joinData.date)))
    .then(snap => {
      partyCandidatesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      return partyCandidatesCache;
    })
    .catch(() => { partyCandidatesPromise = null; return null; });
  return partyCandidatesPromise;
}

function renderPartyCandidates(all, pids) {
  const listEl = document.getElementById('party-candidate-list');
  const excludeIds = new Set([joinId, ...pids]);
  const candidates = all.filter(j => !excludeIds.has(j.id) && j.status !== 'closed' && j.joinType !== 'screen');
  if (!candidates.length) {
    listEl.innerHTML = `<div class="party-candidate-empty">연결할 수 있는 조인이 없습니다</div>`;
    return;
  }
  listEl.innerHTML = candidates.map(j => {
    const members = (j.participants || []).map(p => p.name).join(', ') || '-';
    return `<button class="party-candidate" onclick="window._linkParty('${j.id}')">
      <div class="party-candidate-course">${j.course || '조인'} · ${j.time || ''}</div>
      <div class="party-candidate-meta">${members}</div>
    </button>`;
  }).join('');
}

async function loadPartyCandidates(pids) {
  const listEl = document.getElementById('party-candidate-list');
  if (partyCandidatesCache) {
    renderPartyCandidates(partyCandidatesCache, pids);
    return;
  }
  listEl.innerHTML = `<div class="party-candidate-empty">불러오는 중...</div>`;
  try {
    const all = await (partyCandidatesPromise || prefetchPartyCandidates());
    if (!all) throw new Error('load failed');
    renderPartyCandidates(all, pids);
  } catch(e) {
    listEl.innerHTML = `<div class="party-candidate-empty">목록을 불러오지 못했습니다</div>`;
  }
}

async function doLinkParty(code) {
  const myGroup = [joinId, ...(joinData.partyIds || (joinData.partyId ? [joinData.partyId] : []))];
  if (!code || myGroup.includes(code)) { showToast('올바른 팀이 아닙니다'); return; }
  try {
    const targetSnap = await getDoc(doc(db, 'joins', code));
    if (!targetSnap.exists()) { showToast('팀을 찾을 수 없습니다'); return; }
    const targetData  = targetSnap.data();
    const targetGroup = [code, ...(targetData.partyIds || (targetData.partyId ? [targetData.partyId] : []))];
    const combined = [...new Set([...myGroup, ...targetGroup])];
    if (combined.length > MAX_PARTY_TEAMS) { showToast(`최대 ${MAX_PARTY_TEAMS}팀까지 연결할 수 있습니다`); return; }
    const batch = writeBatch(db);
    for (const id of combined) {
      batch.update(doc(db, 'joins', id), { partyIds: combined.filter(x => x !== id), partyId: null });
    }
    await batch.commit();
    showToast('팀이 연결되었습니다!');
    closePartySheet();
  } catch(e) { showToast('연결 실패: ' + e.message); }
}
window._linkParty = doLinkParty;

async function doUnlinkParty() {
  try {
    const myGroup  = [joinId, ...(joinData.partyIds || (joinData.partyId ? [joinData.partyId] : []))];
    const remaining = myGroup.filter(id => id !== joinId);
    const batch = writeBatch(db);
    batch.update(doc(db, 'joins', joinId), { partyIds: [], partyId: null });
    for (const id of remaining) {
      batch.update(doc(db, 'joins', id), { partyIds: remaining.filter(x => x !== id), partyId: null });
    }
    await batch.commit();
    showToast('연결이 해제되었습니다');
    closePartySheet();
  } catch(e) { showToast('오류: ' + e.message); }
}

// ── 파 데이터 로드 / 저장 ─────────────────────────────
async function loadCoursePar() {
  if (!joinData?.course) return;
  try {
    const snap = await getDoc(doc(db, 'courses', joinData.course));
    if (!snap.exists()) { parFront = null; parBack = null; render(); return; }
    const nh = snap.data().nineHoles || {};
    parFront = joinData.frontCourse && nh[joinData.frontCourse] ? [...nh[joinData.frontCourse]] : null;
    parBack  = joinData.backCourse  && nh[joinData.backCourse]  ? [...nh[joinData.backCourse]]  : null;
  } catch(_) { parFront = null; parBack = null; }
  render();
}

async function savePar(side) {
  if (!joinData?.course) return;
  const courseName = side === 'front' ? joinData.frontCourse : joinData.backCourse;
  if (!courseName) return;
  const arr = side === 'front' ? parFront : parBack;
  try {
    await setDoc(doc(db, 'courses', joinData.course), {
      name: joinData.course,
      nineHoles: { [courseName]: arr }
    }, { merge: true });
  } catch(e) { showToast('파 저장 오류: ' + e.message); }
}

// ── 파 픽커 ───────────────────────────────────────────
window._openParPicker = function(side, idx) {
  parPickerSide = side;
  parPickerIdx  = idx;
  const holeNum = (side === 'front' ? idx : idx - 9) + 1;
  const halfLabel = side === 'front' ? '전반' : '후반';
  document.getElementById('par-picker-title').textContent = `${halfLabel} ${holeNum}번 홀 파 설정`;
  document.getElementById('par-picker-overlay').classList.add('open');
};

window._selectPar = async function(val) {
  if (parPickerSide === null || parPickerIdx === null) return;
  const side = parPickerSide;
  const idx  = side === 'front' ? parPickerIdx : parPickerIdx - 9;
  closeParPicker();
  if (side === 'front') {
    if (!parFront) parFront = Array(9).fill(null);
    parFront[idx] = val;
  } else {
    if (!parBack) parBack = Array(9).fill(null);
    parBack[idx] = val;
  }
  render();
  await savePar(side);
};

function closeParPicker() {
  document.getElementById('par-picker-overlay').classList.remove('open');
  parPickerSide = null;
  parPickerIdx  = null;
}

// 연결된 팀들을 코스(전반/후반 코스 포함) 기준으로 그룹핑
function groupTeams() {
  const pids      = joinData.partyIds || (joinData.partyId ? [joinData.partyId] : []);
  const partyDocs = pids.map(id => partyJoinDataMap.get(id)).filter(Boolean);
  const allDocs   = [{ ...joinData, _isMine: true }, ...partyDocs];
  const groups = [];
  const groupMap = new Map();
  for (const d of allDocs) {
    const key = `${d.course || ''}|${d.frontCourse || ''}|${d.backCourse || ''}`;
    let g = groupMap.get(key);
    if (!g) {
      g = { key, course: d.course, frontCourse: d.frontCourse, backCourse: d.backCourse, players: [], scores: {}, isMine: false };
      groupMap.set(key, g);
      groups.push(g);
    }
    if (d._isMine) g.isMine = true;
    for (const p of (d.participants || [])) {
      if (!g.players.find(x => x.uid === p.uid)) g.players.push(p);
    }
    Object.assign(g.scores, d.scores || {});
  }
  groups.sort((a, b) => (b.isMine ? 1 : 0) - (a.isMine ? 1 : 0));
  return groups;
}

// 내 코스가 아닌 그룹의 파 데이터 캐시 (코스명|전반|후반 → {parFront, parBack})
const groupParCache = new Map();
function getGroupPar(g) {
  if (groupParCache.has(g.key)) return groupParCache.get(g.key);
  const empty = { parFront: null, parBack: null };
  groupParCache.set(g.key, empty);
  if (!g.course) return empty;
  getDoc(doc(db, 'courses', g.course)).then(snap => {
    let result = { parFront: null, parBack: null };
    if (snap.exists()) {
      const nh = snap.data().nineHoles || {};
      result.parFront = g.frontCourse && nh[g.frontCourse] ? [...nh[g.frontCourse]] : null;
      result.parBack  = g.backCourse  && nh[g.backCourse]  ? [...nh[g.backCourse]]  : null;
    }
    groupParCache.set(g.key, result);
    render();
  }).catch(() => {});
  return empty;
}

function buildSummary(players, scores) {
  const playerStats = players.map(p => {
    const holes  = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const hasAny = holes.some(v => v !== null);
    const tot    = hasAny ? holes.reduce((a, v) => a + (v ?? 0), 0) : null;
    return { ...p, tot, hasAny };
  });
  const ranked = [...playerStats].sort((a, b) => {
    if (a.hasAny && !b.hasAny) return -1;
    if (!a.hasAny && b.hasAny) return 1;
    if (!a.hasAny && !b.hasAny) return 0;
    return a.tot - b.tot;
  });
  const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH', '6TH'];
  const rankCls    = ['r1', 'r2', 'r3', 'rn', 'rn', 'rn'];
  return ranked.map((p, i) => {
    const holes  = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const entered = holes.filter(v => v !== null).length;
    const label  = p.tot === null ? '-' : p.tot === 0 ? 'E' : p.tot > 0 ? `+${p.tot}` : String(p.tot);
    const cls    = p.tot === null ? '' : p.tot < 0 ? 'under' : p.tot === 0 ? 'even' : '';
    const isMe   = currentUser && p.uid === currentUser.uid;
    const topCls = i === 0 && p.hasAny ? 'rank-1st' : '';
    const holeStr = p.hasAny ? `${entered}H` : '-';
    return `<div class="summary-player ${topCls}">
      <div class="rank-badge ${rankCls[i] || 'rn'}">${rankLabels[i] || `${i+1}TH`}</div>
      <div class="summary-name">${p.name}${isMe ? '<span class="me-tag">나</span>' : ''}</div>
      <div class="summary-holes">${holeStr}</div>
      <div class="summary-score ${cls}">${label}</div>
    </div>`;
  }).join('');
}

function render() {
  const myPlayers = joinData.participants || [];
  const myUids    = new Set(myPlayers.map(p => p.uid));
  const isParticipant = myPlayers.some(p => p.uid === currentUser.uid);
  const canEdit = isParticipant || isAdmin;

  if (!canEdit) document.getElementById('notice-bar').style.display = 'flex';
  if (isParticipant) document.getElementById('submit-bar').classList.add('show');

  const groups = groupTeams();
  const showLabels = groups.length > 1;

  document.getElementById('groups-container').innerHTML = groups.map(g => {
    const par = g.isMine ? { parFront, parBack } : getGroupPar(g);
    const groupCanEdit = g.isMine && canEdit;
    const groupMyUids  = g.isMine ? myUids : new Set();

    const summaryHtml = buildSummary(g.players, g.scores);
    const frontHtml   = buildTable(g.players, g.scores, groupMyUids, 0, 9, par.parFront, 'front', groupCanEdit);
    const backHtml    = buildTable(g.players, g.scores, groupMyUids, 9, 18, par.parBack, 'back', groupCanEdit);

    return `<div class="course-group">
      ${showLabels ? `<div class="course-group-label">${g.course || '코스 미정'}</div>` : ''}
      <div class="summary-bar">${summaryHtml}</div>
      <div class="score-section"><table class="sc-table">${frontHtml}</table></div>
      <div class="score-section"><table class="sc-table">${backHtml}</table></div>
    </div>`;
  }).join('');
}

function buildTable(players, scores, myUids, from, to, parArray, side, canEditPar) {
  const count    = to - from;
  const holeNums = Array.from({length: count}, (_, i) => from + i + 1);

  // 파 행
  const parCells = Array.from({length: count}, (_, i) => {
    const par = parArray ? parArray[i] : null;
    const globalIdx = from + i;
    if (canEditPar) {
      return `<td><button class="par-chip${par === null ? ' unset' : ''}" onclick="window._openParPicker('${side}',${globalIdx})">${par !== null ? par : '?'}</button></td>`;
    }
    return `<td><div class="par-chip${par === null ? ' unset' : ''}">${par !== null ? par : '?'}</div></td>`;
  }).join('');
  const parSum = parArray ? parArray.reduce((a, v) => a + (v || 0), 0) : '';

  let html = `<thead><tr class="tr-header">
    <th class="th-name-col">HOLE</th>
    ${holeNums.map(n => `<th>${n}</th>`).join('')}
    <th class="th-t">T</th>
  </tr></thead><tbody>
  <tr class="tr-par">
    <td class="par-label-cell">Par</td>
    ${parCells}
    <td class="par-total-cell">${parSum || ''}</td>
  </tr>`;

  players.forEach(p => {
    const isMyRow    = currentUser && p.uid === currentUser.uid;
    const canEditRow = canEditPar && (myUids.has(p.uid) || isAdmin);
    const holes      = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const slice      = holes.slice(from, to);
    const hasAny     = slice.some(v => v !== null);
    const sub        = slice.reduce((a, v) => a + (v ?? 0), 0);

    const cells = slice.map((v, i) => {
      const idx = from + i;
      const cc  = chipClass(v);
      const cl  = chipLabel(v);
      const emptyCls = v === null ? 'empty' : '';
      if (canEditRow) {
        return `<td><button class="score-chip mine ${cc} ${emptyCls}" onclick="window._openPicker('${p.uid}',${idx})">${cl}</button></td>`;
      }
      return `<td><div class="score-chip ${cc} ${emptyCls}">${cl}</div></td>`;
    }).join('');

    html += `<tr class="tr-player">
      <td class="td-name">${p.name}${isMyRow ? '<span class="me-tag">나</span>' : ''}</td>
      ${cells}
      <td class="td-t">${totLabel(sub, hasAny)}</td>
    </tr>`;
  });

  html += '</tbody>';
  return html;
}

window._openPicker = function(uid, holeIdx) {
  pickerHole = holeIdx;
  pickerUid  = uid;
  document.getElementById('picker-title').textContent = `${holeIdx + 1}번 홀`;
  const optsHtml = OPTS.map(o =>
    `<button class="picker-opt ${o.cls}" onclick="window._selectScore(${o.v})">
      <span class="pv">${o.v === 0 ? '0' : o.v > 0 ? '+'+o.v : o.v}</span>
      <span class="pl">${o.label}</span>
    </button>`
  ).join('');
  const deleteHtml = `<button class="picker-opt po-delete" onclick="window._selectScore(null)">
    <span class="pv">×</span>
    <span class="pl">삭제</span>
  </button>`;
  document.getElementById('picker-grid').innerHTML = optsHtml + deleteHtml;
  document.getElementById('picker-overlay').classList.add('open');
};

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  pickerHole = null;
  pickerUid  = null;
}

window._selectScore = async function(val) {
  if (pickerHole === null || !pickerUid || !joinData) return;
  const targetUid = pickerUid;
  const holeIdx   = pickerHole;
  closePicker();
  const scores = joinData.scores || {};
  const holes  = [...((scores[targetUid] || {}).holes || Array(18).fill(null))];
  holes[holeIdx] = val;
  try {
    await updateDoc(doc(db, 'joins', joinId), {
      [`scores.${targetUid}.holes`]: holes
    });
  } catch (e) { showToast('저장 오류: ' + e.message); }
};

function openSubmitSheet() {
  if (!joinData || !currentUser) return;
  const players  = joinData.participants || [];
  const scores   = joinData.scores || {};
  const myHoles  = (scores[currentUser.uid] || {}).holes || Array(18).fill(null);
  const entered  = myHoles.filter(v => v !== null).length;

  // 18홀 미완성이면 차단
  if (entered < 18) {
    showToast(`아직 ${18 - entered}홀 미입력 — 18홀 모두 입력 후 제출하세요`);
    return;
  }

  const myTotal  = myHoles.reduce((a, v) => a + (v ?? 0), 0);
  const companions = players.filter(p => p.uid !== currentUser.uid).map(p => p.name);

  const scoreLabel = myTotal === 0 ? 'E (파)'
    : myTotal > 0 ? `+${myTotal} (${myTotal}오버파)` : `${myTotal} (${Math.abs(myTotal)}언더파)`;
  const scoreClass = myTotal < 0 ? 'under' : 'over';

  document.getElementById('submit-summary').innerHTML = `
    <div class="submit-row"><span class="submit-row-label">골프장</span><span class="submit-row-val">${joinData.course || '-'}</span></div>
    <div class="submit-row"><span class="submit-row-label">날짜</span><span class="submit-row-val">${joinData.date || '-'}</span></div>
    <div class="submit-row"><span class="submit-row-label">동반자</span><span class="submit-row-val">${companions.length ? companions.join(', ') : '없음'}</span></div>
    <div class="submit-row"><span class="submit-row-label">최종 스코어</span><span class="submit-row-val ${scoreClass}">${scoreLabel}</span></div>
    <div class="submit-row"><span class="submit-row-label">입력 홀 수</span><span class="submit-row-val">18 / 18홀</span></div>
  `;
  document.getElementById('submit-sheet-overlay').classList.add('open');
}

function closeSubmitSheet() {
  document.getElementById('submit-sheet-overlay').classList.remove('open');
}

async function submitScore() {
  if (!joinData || !currentUser) return;
  const btn = document.getElementById('btn-submit-confirm');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  const players    = joinData.participants || [];
  const scores     = joinData.scores || {};
  const myHoles    = (scores[currentUser.uid] || {}).holes || Array(18).fill(null);
  const myTotal    = myHoles.reduce((a, v) => a + (v ?? 0), 0);
  const companions = players.filter(p => p.uid !== currentUser.uid).map(p => ({ name: p.name, uid: p.uid }));

  try {
    const parHoles = [
      ...(parFront || Array(9).fill(null)),
      ...(parBack  || Array(9).fill(null)),
    ];

    // 중복 제출 여부 + 포인트 기지급 여부 먼저 확인
    const [myHistSnap, freshJoinSnap] = await Promise.all([
      getDoc(doc(db, 'users', currentUser.uid, 'scoreHistory', joinId)),
      getDoc(doc(db, 'joins', joinId)),
    ]);
    const alreadySubmitted     = myHistSnap.exists();
    const pointsAlreadyAwarded = freshJoinSnap.exists() && freshJoinSnap.data().pointsAwarded === true;

    // 1. 현재 사용자 scoreHistory 저장
    await setDoc(
      doc(db, 'users', currentUser.uid, 'scoreHistory', joinId),
      {
        course:      joinData.course      || '',
        frontCourse: joinData.frontCourse || '',
        backCourse:  joinData.backCourse  || '',
        date:        joinData.date        || '',
        companions,
        totalScore:  myTotal,
        holes:       myHoles,
        parHoles,
        joinId,
        submittedAt: serverTimestamp(),
      }
    );

    // 2. 현재 사용자 핸디캡 통계 업데이트
    try {
      const histSnap = await getDocs(
        query(collection(db, 'users', currentUser.uid, 'scoreHistory'), orderBy('submittedAt', 'desc'))
      );
      const allScores = histSnap.docs.map(d => d.data().totalScore ?? 0);
      const recent10 = allScores.slice(0, 10);
      const handicap = recent10.length
        ? Math.round(recent10.reduce((a, b) => a + b, 0) / recent10.length * 10) / 10
        : null;
      const bestScore = allScores.length ? Math.min(...allScores) : null;
      const roundCount = allScores.length;
      const handicapTrend = allScores.length >= 2
        ? Math.round((allScores[0] - allScores[1]) * 10) / 10
        : null;
      await updateDoc(doc(db, 'users', currentUser.uid), {
        handicap, bestScore, roundCount, handicapTrend, statsUpdatedAt: serverTimestamp()
      });
    } catch(_) {}

    // 3. 전원 포인트 + 동반자 scoreHistory 일괄 처리 (최초 제출자 1회만)
    if (!pointsAlreadyAwarded) {
      const now = new Date().toISOString();

      await Promise.all(players.map(async (p) => {
        if (!p.uid || p.isGuest) return;
        const isMe     = p.uid === currentUser.uid;
        const pHoles   = (scores[p.uid] || {}).holes || Array(18).fill(null);
        const pTotal   = pHoles.reduce((a, v) => a + (v ?? 0), 0);
        const hasScore = pHoles.some(v => v !== null);

        // 동반자 scoreHistory 저장 (스코어 있고 미제출 시)
        let pAlreadySubmitted = isMe ? alreadySubmitted : false;
        if (!isMe && hasScore) {
          const pHistSnap = await getDoc(doc(db, 'users', p.uid, 'scoreHistory', joinId));
          pAlreadySubmitted = pHistSnap.exists();
          if (!pAlreadySubmitted) {
            await setDoc(doc(db, 'users', p.uid, 'scoreHistory', joinId), {
              course:      joinData.course      || '',
              frontCourse: joinData.frontCourse || '',
              backCourse:  joinData.backCourse  || '',
              date:        joinData.date        || '',
              companions:  players.filter(x => x.uid !== p.uid).map(x => ({ name: x.name, uid: x.uid })),
              totalScore:  pTotal,
              holes:       pHoles,
              parHoles,
              joinId,
              submittedAt: serverTimestamp(),
            });
            // 동반자 핸디캡 통계 업데이트
            try {
              const pHistAllSnap = await getDocs(
                query(collection(db, 'users', p.uid, 'scoreHistory'), orderBy('submittedAt', 'desc'))
              );
              const pAllScores = pHistAllSnap.docs.map(d => d.data().totalScore ?? 0);
              const pRecent10 = pAllScores.slice(0, 10);
              const pHandicap = pRecent10.length
                ? Math.round(pRecent10.reduce((a, b) => a + b, 0) / pRecent10.length * 10) / 10
                : null;
              const pHandicapTrend = pAllScores.length >= 2
                ? Math.round((pAllScores[0] - pAllScores[1]) * 10) / 10
                : null;
              await updateDoc(doc(db, 'users', p.uid), {
                handicap: pHandicap,
                bestScore: pAllScores.length ? Math.min(...pAllScores) : null,
                roundCount: pAllScores.length,
                handicapTrend: pHandicapTrend,
                statsUpdatedAt: serverTimestamp(),
              });
            } catch(_) {}
          }
        }

        // 조인참여 포인트 +10 (전원)
        await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(10) });
        await addDoc(collection(db, 'pointHistory'), {
          uid: p.uid, name: p.name || '골퍼',
          type: '조인참여', amount: 10,
          ref: joinData.course || '라운드', date: now,
        });

        // 스코어 포인트 (최초 제출 + 스코어 있는 경우만)
        if (hasScore && !pAlreadySubmitted) {
          const pts   = pTotal < 0 ? 40 : pTotal <= 5 ? 30 : pTotal <= 9 ? 20 : pTotal <= 15 ? 15 : 10;
          const label = pTotal < 0 ? '언더파' : pTotal <= 5 ? 'E~+5' : pTotal <= 9 ? '+6~+9' : pTotal <= 15 ? '+10~+15' : '+16이상';
          await updateDoc(doc(db, 'users', p.uid), { totalPoints: increment(pts) });
          await addDoc(collection(db, 'pointHistory'), {
            uid: p.uid, name: p.name || '골퍼',
            type: '스코어', amount: pts,
            ref: `${joinData.course || '라운드'} (${label})`, date: now,
          });
        }
      }));

      // 포인트 지급 완료 플래그
      await updateDoc(doc(db, 'joins', joinId), { pointsAwarded: true });
    }

    closeSubmitSheet();
    showToast('스코어 기록이 저장되었습니다!');
  } catch (e) {
    showToast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '제출하기';
  }
}

// ── 시청자 수 presence ───────────────────────────────
async function registerViewer() {
  if (!joinId) return;
  viewerDocRef = doc(db, 'joins', joinId, 'viewers', sessionId);
  try { await setDoc(viewerDocRef, { uid: currentUser?.uid || 'anon', at: serverTimestamp() }); } catch(_) {}
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(async () => {
    try { await setDoc(viewerDocRef, { uid: currentUser?.uid || 'anon', at: serverTimestamp() }); } catch(_) {}
  }, 30000);
}

async function unregisterViewer() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  if (viewerDocRef) { try { await deleteDoc(viewerDocRef); } catch(_) {} viewerDocRef = null; }
}

function startViewerCount() {
  onSnapshot(collection(db, 'joins', joinId, 'viewers'), snap => {
    const now = Date.now();
    const count = snap.docs.filter(d => {
      const at = d.data().at;
      return !at || (now - at.toMillis()) < 90000;
    }).length;
    const el = document.getElementById('viewer-count');
    const numEl = document.getElementById('viewer-num');
    if (el && numEl) {
      numEl.textContent = count;
      el.style.display = count > 0 ? 'flex' : 'none';
    }
  });
}

window.addEventListener('beforeunload', unregisterViewer);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') unregisterViewer();
  else registerViewer();
});

// 스코어 화면 이미지 공유
window.shareScore = async function() {
  const btn = document.getElementById('btn-share');
  const label = btn?.querySelector('.share-btn-label');
  if (label) label.textContent = '생성중...';
  if (btn) btn.disabled = true;

  // 50ms 대기 후 캡처 (버튼 UI 반영)
  await new Promise(r => setTimeout(r, 50));

  try {
    const phone = document.querySelector('.phone');
    const canvas = await html2canvas(phone, {
      backgroundColor: '#0A2406',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    const courseName = document.getElementById('course-name')?.textContent?.trim() || 'GGZON';
    const fileName = `ggzon-${courseName}.png`;

    canvas.toBlob(async (blob) => {
      if (!blob) { showToast('이미지 생성 실패'); return; }
      const file = new File([blob], fileName, { type: 'image/png' });
      try {
        if (navigator.share && navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: `${courseName} 라이브 스코어` });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = fileName;
          document.body.appendChild(a); a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('이미지 저장 완료');
        }
      } catch(e) {
        if (e.name !== 'AbortError') showToast('공유 실패');
      } finally {
        if (label) label.textContent = '공유';
        if (btn) btn.disabled = false;
      }
    }, 'image/png');

  } catch(e) {
    console.error(e);
    showToast('이미지 생성 실패');
    if (label) label.textContent = '공유';
    if (btn) btn.disabled = false;
  }
};

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
