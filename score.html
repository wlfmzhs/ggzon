<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스코어 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
    }
    html, body { width: 100%; height: 100%; background: #1a1a1a; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone { width: 390px; height: 844px; background: var(--green-dark); border-radius: 40px; box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .phone::before { content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100; }

    #loading-overlay { position: absolute; inset: 0; background: var(--green-dark); display: flex; align-items: center; justify-content: center; z-index: 999; border-radius: 40px; }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(62,160,102,0.3); border-top-color: var(--green-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .appbar { flex-shrink: 0; padding: 32px 18px 12px; display: flex; align-items: center; gap: 10px; }
    .back-btn { background: none; border: none; cursor: pointer; padding: 0 8px 0 0; color: var(--green-light); font-size: 24px; line-height: 1; flex-shrink: 0; }
    .appbar-info { flex: 1; min-width: 0; }
    .appbar-title { font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appbar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 6px; height: 6px; background: #e74c3c; border-radius: 50%; display: inline-block; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 범례 */
    .legend { display: flex; gap: 10px; padding: 8px 14px 10px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: rgba(255,255,255,0.4); }
    .legend-samp { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; color: #fff; flex-shrink: 0; }

    /* 스코어카드 */
    table.scorecard { border-collapse: collapse; width: calc(100% - 24px); margin: 10px 12px 0; table-layout: fixed; }

    /* 헤더 */
    .th-name { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 700; text-align: left; padding: 4px 4px 4px 0; width: 52px; }
    .th-hole { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 800; text-align: center; padding: 4px 0; }
    .th-sub  { font-size: 9px; color: var(--green-light); font-weight: 800; text-align: center; padding: 4px 0; background: rgba(62,160,102,0.1); }
    .th-tot  { font-size: 9px; color: var(--gold); font-weight: 800; text-align: center; padding: 4px 0; background: rgba(240,192,64,0.08); }
    .th-blank { }

    /* 플레이어 행 */
    .td-name { font-size: 12px; font-weight: 800; padding: 2px 4px 2px 0; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .me-tag  { font-size: 9px; color: var(--green-light); font-weight: 700; margin-left: 3px; }
    .td-score { text-align: center; vertical-align: middle; padding: 3px 1px; }
    .score-btn {
      width: 26px; height: 26px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      font-size: 10px; font-weight: 900;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; color: rgba(255,255,255,0.18);
    }
    .score-btn.mine { border-color: rgba(62,160,102,0.3); background: rgba(62,160,102,0.06); cursor: pointer; }
    .score-btn.mine:active { opacity: 0.6; }

    /* 점수 스타일 */
    /* 언더파: 빨간 원 + 흰 숫자 */
    .s-under { background: #e74c3c !important; border: none !important; border-radius: 50% !important; color: #fff !important; }
    /* 파(0): 스타일 없음 */
    .s-zero  { background: transparent !important; border: none !important; color: #fff !important; }
    /* +1: 사각 테두리 1줄 */
    .s-p1    { background: transparent !important; border: 1.5px solid #fff !important; border-radius: 0 !important; color: #fff !important; }
    /* +2 이상: 사각 테두리 2줄 */
    .s-p2up  { background: transparent !important; border: 1.5px solid #fff !important; border-radius: 0 !important; color: #fff !important;
               box-shadow: 0 0 0 3px var(--green-dark), 0 0 0 4.5px #fff; }

    .td-sub { font-size: 11px; font-weight: 900; text-align: center; padding: 2px 0; vertical-align: middle; }
    .td-tot { font-size: 13px; font-weight: 900; text-align: center; padding: 2px 0; vertical-align: middle; color: var(--gold); }
    .td-blank { }
    .player-divider td { padding: 5px 0; }
    .player-divider-line { height: 1px; background: rgba(255,255,255,0.07); }

    /* 픽커 */
    .picker-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.65); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; }
    .picker-overlay.open { opacity: 1; pointer-events: all; }
    .picker-sheet { width: 100%; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 22px 18px 36px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
    .picker-overlay.open .picker-sheet { transform: translateY(0); }
    .picker-title { font-size: 14px; font-weight: 900; text-align: center; margin-bottom: 18px; color: rgba(255,255,255,0.85); }
    .picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
    .picker-opt {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 10px 4px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
      cursor: pointer; font-family: inherit; transition: transform 0.1s;
    }
    .picker-opt:active { transform: scale(0.92); }
    .picker-opt .pv { font-size: 15px; font-weight: 900; }
    .picker-opt .pl { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 700; }
    .po-n3 { background: rgba(123,47,255,0.2) !important; border-color: rgba(123,47,255,0.5) !important; } .po-n3 .pv { color: #c9a8ff; }
    .po-n2 { background: rgba(231,76,60,0.25) !important; border-color: rgba(231,76,60,0.6) !important; } .po-n2 .pv { color: #ff6b5b; }
    .po-n1 { background: rgba(231,76,60,0.15) !important; border-color: rgba(231,76,60,0.4) !important; } .po-n1 .pv { color: #ff9080; }
    .po-0  { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,255,255,0.25) !important; } .po-0 .pv { color: #fff; }
    .po-p1 { background: rgba(255,255,255,0.06) !important; border-color: rgba(255,255,255,0.15) !important; } .po-p1 .pv { color: rgba(255,255,255,0.7); }
    .po-p2 { background: rgba(255,255,255,0.08) !important; border-color: rgba(255,255,255,0.2) !important;  } .po-p2 .pv { color: rgba(255,255,255,0.8); }
    .po-p3 { background: rgba(255,200,60,0.12) !important; border-color: rgba(255,200,60,0.35) !important; } .po-p3 .pv { color: #f0c040; }
    .po-p4 { background: rgba(255,130,50,0.12) !important; border-color: rgba(255,130,50,0.35) !important; } .po-p4 .pv { color: #ff8c32; }
    .po-p5 { background: rgba(255,60,60,0.12) !important; border-color: rgba(255,60,60,0.35) !important;   } .po-p5 .pv { color: #ff5555; }
    .picker-cancel { width: 100%; padding: 13px; background: rgba(255,255,255,0.07); border: none; border-radius: 12px; color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    .row-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }

    .toast { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(20,20,20,0.95); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="phone">

  <div id="loading-overlay"><div class="spinner"></div></div>

  <div class="appbar">
    <button class="back-btn" id="btn-back">‹</button>
    <div class="appbar-info">
      <div class="appbar-title" id="course-name">로딩중...</div>
      <div class="appbar-sub"><span class="live-dot"></span>실시간 스코어</div>
    </div>
  </div>

  <div class="scroll-area">
    <div id="non-participant-notice" style="display:none;align-items:center;gap:8px;margin:10px 16px 0;padding:10px 14px;background:rgba(255,200,60,0.08);border:1px solid rgba(255,200,60,0.25);border-radius:12px;font-size:12px;color:rgba(255,200,60,0.85);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      참석자만 스코어를 입력할 수 있습니다. 조회만 가능합니다.
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-samp" style="background:#e74c3c;border-radius:50%;width:18px;height:18px;">-1</div>버디↑</div>
      <div class="legend-item"><div class="legend-samp" style="color:rgba(255,255,255,0.4);">0</div>파</div>
      <div class="legend-item"><div class="legend-samp" style="border:1.5px solid #fff;border-radius:0;">+1</div>보기</div>
      <div class="legend-item"><div class="legend-samp" style="border:1.5px solid #fff;border-radius:0;box-shadow:0 0 0 3px #0A2406,0 0 0 4.5px #fff;">+2</div>더블↑</div>
    </div>

    <table class="scorecard" id="scorecard"></table>
  </div>

  <!-- 픽커 -->
  <div class="picker-overlay" id="picker-overlay">
    <div class="picker-sheet">
      <div class="picker-title" id="picker-title">1번 홀</div>
      <div class="picker-grid" id="picker-grid"></div>
      <button class="picker-cancel" id="picker-cancel">취소</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);

const joinId = new URLSearchParams(location.search).get('id');
if (!joinId) location.href = 'join.html';

let currentUser = null;
let joinData    = null;
let pickerHole  = null;
let pickerUid   = null;

const OPTS = [
  { v: -3, label: '알바', cls: 'po-n3' },
  { v: -2, label: '이글', cls: 'po-n2' },
  { v: -1, label: '버디', cls: 'po-n1' },
  { v:  0, label: '파',   cls: 'po-0'  },
  { v:  1, label: '보기', cls: 'po-p1' },
  { v:  2, label: '더블', cls: 'po-p2' },
  { v:  3, label: '트리플', cls: 'po-p3' },
  { v:  4, label: '+4',   cls: 'po-p4' },
  { v:  5, label: '+5',   cls: 'po-p5' },
];

function scoreClass(v) {
  if (v === null) return '';
  if (v < 0)  return 's-under';
  if (v === 0) return 's-zero';
  if (v === 1) return 's-p1';
  return 's-p2up';
}
function scoreLabel(v) {
  if (v === null) return '';
  if (v === 0) return '0';
  return v > 0 ? `+${v}` : String(v);
}
function totLabel(n) {
  if (n === 0) return 'E';
  return n > 0 ? `+${n}` : String(n);
}
function totColor(n) {
  if (n < 0) return '#e74c3c';
  if (n === 0) return 'rgba(255,255,255,0.8)';
  return 'rgba(255,255,255,0.55)';
}

document.getElementById('btn-back').onclick = () => history.back();
document.getElementById('picker-cancel').onclick = closePicker;
document.getElementById('picker-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('picker-overlay')) closePicker();
});

onAuthStateChanged(auth, user => {
  if (!user) { location.href = 'login.html'; return; }
  currentUser = user;
  document.getElementById('loading-overlay').classList.add('hidden');
  onSnapshot(doc(db, 'joins', joinId), snap => {
    if (!snap.exists()) return;
    joinData = { id: snap.id, ...snap.data() };
    document.getElementById('course-name').textContent = joinData.course || '스코어';

    // 스크린 조인은 스코어 페이지 비공개
    if (joinData.joinType === 'screen') {
      showToast('스크린 조인은 스코어 입력 기능이 없습니다');
      setTimeout(() => history.back(), 1500);
      return;
    }

    render();
  });
});

function render() {
  const players = joinData.participants || [];
  const scores  = joinData.scores || {};
  const isParticipant = players.some(p => p.uid === currentUser.uid);

  if (!isParticipant) {
    const notice = document.getElementById('non-participant-notice');
    if (notice) notice.style.display = 'flex';
  }

  // 헤더: 전반(1-9)+OUT+빈칸 / 후반(10-18)+IN+TOT
  let html = `<thead>
    <tr>
      <th class="th-name" rowspan="2">선수</th>
      ${Array.from({length:9},(_,i)=>`<th class="th-hole">${i+1}</th>`).join('')}
      <th class="th-sub">OUT</th>
      <th class="th-blank"></th>
    </tr>
    <tr>
      ${Array.from({length:9},(_,i)=>`<th class="th-hole">${i+10}</th>`).join('')}
      <th class="th-sub">IN</th>
      <th class="th-tot">TOT</th>
    </tr>
  </thead><tbody>`;

  players.forEach((p, pi) => {
    const canEdit = isParticipant;
    const isMyRow = currentUser && p.uid === currentUser.uid;
    const holes   = (scores[p.uid] || {}).holes || Array(18).fill(null);
    const out     = holes.slice(0,9).reduce((a,v) => a + (v ?? 0), 0);
    const inVal   = holes.slice(9).reduce((a,v)  => a + (v ?? 0), 0);
    const tot     = out + inVal;
    const hasAny  = holes.some(v => v !== null);

    const cell = (v, idx) => {
      const sc  = scoreClass(v);
      const lbl = scoreLabel(v);
      const btn = canEdit
        ? `<button class="score-btn mine${v!==null?' '+sc:''}" onclick="window._openPicker('${p.uid}',${idx})">${lbl}</button>`
        : `<div class="score-btn${v!==null?' '+sc:''}">${lbl}</div>`;
      return `<td class="td-score">${btn}</td>`;
    };

    // 전반행
    html += `<tr>
      <td class="td-name" rowspan="2">${p.name}${isMyRow?'<br><span class="me-tag">나</span>':''}</td>
      ${holes.slice(0,9).map((v,i) => cell(v, i)).join('')}
      <td class="td-sub" style="color:${totColor(out)}">${hasAny ? totLabel(out) : '-'}</td>
      <td class="td-blank"></td>
    </tr>`;
    // 후반행
    html += `<tr>
      ${holes.slice(9).map((v,i) => cell(v, i+9)).join('')}
      <td class="td-sub" style="color:${totColor(inVal)}">${hasAny ? totLabel(inVal) : '-'}</td>
      <td class="td-tot" style="color:${totColor(tot)}">${hasAny ? totLabel(tot) : '-'}</td>
    </tr>`;

    if (pi < players.length - 1) {
      html += `<tr class="player-divider"><td colspan="12"><div class="player-divider-line"></div></td></tr>`;
    }
  });

  html += '</tbody>';
  document.getElementById('scorecard').innerHTML = html;
}

window._openPicker = function(uid, holeIdx) {
  pickerHole = holeIdx;
  pickerUid  = uid;
  document.getElementById('picker-title').textContent = `${holeIdx + 1}번 홀`;
  document.getElementById('picker-grid').innerHTML = OPTS.map(o =>
    `<button class="picker-opt ${o.cls}" onclick="window._selectScore(${o.v})">
      <span class="pv">${o.v === 0 ? 'E' : o.v > 0 ? '+'+o.v : o.v}</span>
      <span class="pl">${o.label}</span>
    </button>`
  ).join('');
  document.getElementById('picker-overlay').classList.add('open');
};

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  pickerHole = null;
  pickerUid  = null;
}

window._selectScore = async function(val) {
  if (pickerHole === null || !pickerUid || !joinData) return;
  const targetUid = pickerUid;
  const holeIdx   = pickerHole;
  closePicker();
  const scores = joinData.scores || {};
  const holes  = [...((scores[targetUid] || {}).holes || Array(18).fill(null))];
  holes[holeIdx] = val;
  try {
    await updateDoc(doc(db, 'joins', joinId), {
      [`scores.${targetUid}.holes`]: holes
    });
  } catch (e) { showToast('저장 오류: ' + e.message); }
};

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
