  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .phone-frame {
      width: 390px; min-height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 28px 48px;
    }
    .phone-frame::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px;
    }
    .logo { margin-bottom: 32px; text-align: center; }
    .logo img { height: 64px; width: auto; object-fit: contain; }

    .step { display: none; width: 100%; flex-direction: column; gap: 14px; }
    .step.active { display: flex; }
    .step-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 2px; }
    .step-desc { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); padding-left: 2px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(62,160,102,0.3);
      border-radius: 12px; color: #fff; font-size: 15px;
      font-family: inherit; outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--green-light); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    select.form-input option { background: #0f2d18; color: #fff; }
    .form-hint { font-size: 11px; color: rgba(255,255,255,0.3); padding-left: 2px; margin-top: 3px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .submit-btn {
      width: 100%; padding: 16px; margin-top: 4px;
      background: var(--green); color: #fff;
      font-size: 16px; font-weight: 900; letter-spacing: -0.3px;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit; transition: background 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:active { background: var(--green-light); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; text-align: center; display: none;
    }
    .msg.error { background: rgba(220,50,50,0.15); color: #ff6b6b; border: 1px solid rgba(220,50,50,0.3); display: block; }
    .msg.success { background: rgba(46,160,80,0.15); color: #3ea066; border: 1px solid rgba(46,160,80,0.3); display: block; }

    .kakao-btn {
      width: 100%; padding: 15px; border-radius: 14px;
      background: #FEE500; color: #000; font-size: 15px; font-weight: 900;
      border: none; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }
    .kakao-btn:active { background: #e6cf00; }

    .agree-box { display: flex; flex-direction: column; gap: 10px; }
    .agree-item { display: flex; align-items: flex-start; gap: 10px; }
    .agree-item input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; accent-color: var(--green-light); margin-top: 2px; cursor: pointer; }
    .agree-item label { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; cursor: pointer; }
    .agree-item label span { color: var(--green-light); text-decoration: underline; cursor: pointer; }

    .term-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: flex-end; justify-content: center; }
    .term-overlay.show { display: flex; }
    .term-box { width: 100%; max-width: 390px; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; max-height: 70vh; overflow-y: auto; }
    .term-box h3 { font-size: 15px; font-weight: 900; margin-bottom: 16px; }
    .term-box p, .term-box li { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 8px; }
    .term-box ul { padding-left: 16px; margin-bottom: 8px; }
    .term-close { float: right; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 22px; cursor: pointer; line-height: 1; margin-top: -4px; }

    .back-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none; }
    .back-link span { color: var(--green-light); }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); padding: 0; overflow-y: auto; min-height: 100vh; }
      body { align-items: flex-start; justify-content: flex-start; }

      .phone-frame::before { display: none; }
    }

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword,
  setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ★ 카카오 JavaScript 앱 키를 여기에 입력하세요 ★
const KAKAO_JS_KEY = 'a14a8368381df22cac7c0fd0841fd28e';

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const ADMIN_EMAIL = 'wlfmzhs@naver.com';

const KAKAO_REST_API_KEY = '86f3640335dd65316507c504ffa5e9d4';
const KAKAO_REDIRECT_URI = 'https://www.ggzon.co.kr/login.html';
const KAKAO_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="#000000"><path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.74 1.6 5.14 4.05 6.7l-.78 2.87a.4.4 0 0 0 .59.46l3.52-2.34c.85.13 1.71.2 2.62.2 5.523 0 10-3.477 10-7.9S17.523 3 12 3z"/></svg>`;

// Kakao SDK 초기화
if (!Kakao.isInitialized()) {
  Kakao.init(KAKAO_JS_KEY);
}

function getReturnUrl() {
  return localStorage.getItem('ggzon_return') || 'dashboard.html';
}

// ?logout=1 파라미터로 강제 로그아웃
if (new URLSearchParams(window.location.search).get('logout') === '1') {
  localStorage.removeItem('ggzon_user');
  localStorage.removeItem('ggzon_return');
  history.replaceState({}, '', window.location.pathname);
}

// URL의 return 파라미터를 localStorage에 먼저 저장 (이미 로그인 상태에서도 적용)
const _urlReturn = new URLSearchParams(window.location.search).get('return');
if (_urlReturn) localStorage.setItem('ggzon_return', _urlReturn);

// 이미 카카오 로그인된 경우
const savedUser = JSON.parse(localStorage.getItem('ggzon_user') || 'null');
if (savedUser && savedUser.loginType === 'kakao') {
  window.location.href = getReturnUrl();
}

// 관리자(이메일) 로그인 상태 확인
onAuthStateChanged(auth, (user) => {
  if (user && user.email === ADMIN_EMAIL) {
    window.location.href = getReturnUrl();
  }
});

let pendingKakaoUser = null;
let pendingUpdateUser = null;

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = ''; el.className = 'msg'; }
}

// ── 카카오 로그인 버튼 클릭 → 카카오로 리다이렉트 ──────
window.doKakaoLogin = function() {
  const returnParam = new URLSearchParams(window.location.search).get('return');
  if (returnParam) localStorage.setItem('ggzon_return', returnParam);
  Kakao.Auth.authorize({ redirectUri: KAKAO_REDIRECT_URI });
};

// ── 카카오 리다이렉트 후 code 처리 ──────────────────────
async function handleKakaoReturn() {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');

  // URL 정리
  if (code || error) history.replaceState({}, '', window.location.pathname);
  if (!code) return;

  const btn = document.getElementById('kakao-btn');
  btn.disabled = true;
  btn.textContent = '로그인 처리 중...';

  const restoreBtn = () => {
    btn.disabled = false;
    btn.innerHTML = KAKAO_SVG + ' 카카오로 시작하기';
  };

  try {
    // 1. code → access_token 교환
    const tokenRes = await fetch('https://kauth.kakao.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: KAKAO_REST_API_KEY,
        redirect_uri: KAKAO_REDIRECT_URI,
        code: code,
        client_secret: 'urkOdswm5pxmM1GT3QrTA32hQpzbXcJg'
      })
    });
    const tokenData = await tokenRes.json();
    if (!tokenData.access_token) throw new Error(tokenData.error_description || 'token 발급 실패');

    // 2. 사용자 정보 조회
    const userRes = await fetch('https://kapi.kakao.com/v2/user/me', {
      headers: { 'Authorization': 'Bearer ' + tokenData.access_token }
    });
    const userData = await userRes.json();

    const kakaoId  = String(userData.id);
    const kakaoNick = userData.kakao_account?.profile?.nickname || '';
    const uid = 'kakao_' + kakaoId;

    // 3. Firestore에서 기존 회원 확인
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      const data = snap.data();
      localStorage.setItem('ggzon_user', JSON.stringify({
        uid,
        nickname: data.nickname || kakaoNick,
        loginType: 'kakao'
      }));
      const needPhone = !data.phone;
      const needHandi = !data.handicap;
      if (needPhone || needHandi) {
        pendingUpdateUser = { uid };
        if (!needPhone) document.getElementById('update-phone-group').style.display = 'none';
        if (!needHandi) document.getElementById('update-handi-group').style.display = 'none';
        showStep('step-update');
      } else {
        showPwaPrompt(getReturnUrl());
      }
    } else {
      pendingKakaoUser = { uid, kakaoNick, kakaoId };
      document.getElementById('prof-nick').value = kakaoNick;
      showStep('step-profile');
      document.getElementById('prof-nick').focus();
    }
  } catch(e) {
    restoreBtn();
    showMsg('login-msg', '로그인 처리 실패: ' + e.message, 'error');
  }
}

// ── 프로필 저장 (신규) ──────────────────────────────────
window.saveProfile = async function() {
  if (!pendingKakaoUser) return;

  const inviteCode = document.getElementById('prof-invite').value.trim().toUpperCase();
  const VALID_CODE = 'GGZON0513';
  const EXPIRY = new Date('2026-05-14T00:00:00+09:00');
  if (!inviteCode) { showMsg('prof-msg', '초대 코드를 입력해주세요', 'error'); return; }
  if (inviteCode !== VALID_CODE) { showMsg('prof-msg', '유효하지 않은 초대 코드입니다', 'error'); return; }
  if (new Date() > EXPIRY) { showMsg('prof-msg', '만료된 초대 코드입니다', 'error'); return; }

  const nick = document.getElementById('prof-nick').value.trim();
  if (!nick) { showMsg('prof-msg', '닉네임을 입력해주세요', 'error'); return; }
  const phone = document.getElementById('prof-phone').value.trim();
  if (!phone) { showMsg('prof-msg', '전화번호를 입력해주세요', 'error'); return; }
  if (!/^010-\d{4}-\d{4}$/.test(phone)) { showMsg('prof-msg', '전화번호를 올바르게 입력해주세요 (010-0000-0000)', 'error'); return; }
  const handi = document.getElementById('prof-handi').value;
  if (!handi) { showMsg('prof-msg', '골프 핸디를 선택해주세요', 'error'); return; }
  if (!document.getElementById('prof-terms').checked) { showMsg('prof-msg', '이용약관에 동의해 주세요', 'error'); return; }
  if (!document.getElementById('prof-privacy').checked) { showMsg('prof-msg', '개인정보처리방침에 동의해 주세요', 'error'); return; }

  const btn = document.getElementById('prof-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  const birthRaw = document.getElementById('prof-birth').value.trim();

  try {
    await setDoc(doc(db, 'users', pendingKakaoUser.uid), {
      nickname: nick,
      phone: phone,
      name: document.getElementById('prof-name').value.trim(),
      birthYear2: birthRaw ? String(birthRaw).padStart(2, '0') : '',
      handicap: document.getElementById('prof-handi').value,
      region: document.getElementById('prof-region').value,
      loginType: 'kakao',
      kakaoId: pendingKakaoUser.kakaoId,
      createdAt: new Date().toISOString(),
      isPaid: false
    });
    localStorage.setItem('ggzon_user', JSON.stringify({
      uid: pendingKakaoUser.uid,
      nickname: nick,
      loginType: 'kakao'
    }));
    pendingKakaoUser = null;
    showPwaPrompt(getReturnUrl());
  } catch (e) {
    showMsg('prof-msg', '저장 실패: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '가입 완료 →';
  }
};

// ── 기존 회원 정보 보완 ─────────────────────────────────
window.saveUpdate = async function() {
  if (!pendingUpdateUser) return;
  const phoneGroup = document.getElementById('update-phone-group');
  const handiGroup = document.getElementById('update-handi-group');
  const updates = {};

  if (phoneGroup.style.display !== 'none') {
    const phone = document.getElementById('update-phone').value.trim();
    if (!phone) { showMsg('update-msg', '전화번호를 입력해주세요', 'error'); return; }
    if (!/^010-\d{4}-\d{4}$/.test(phone)) { showMsg('update-msg', '전화번호를 올바르게 입력해주세요 (010-0000-0000)', 'error'); return; }
    updates.phone = phone;
  }
  if (handiGroup.style.display !== 'none') {
    const handi = document.getElementById('update-handi').value;
    if (!handi) { showMsg('update-msg', '골프 핸디를 선택해주세요', 'error'); return; }
    updates.handicap = handi;
  }

  const btn = document.getElementById('update-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await updateDoc(doc(db, 'users', pendingUpdateUser.uid), updates);
    pendingUpdateUser = null;
    showPwaPrompt(getReturnUrl());
  } catch(e) {
    showMsg('update-msg', '저장 실패: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '저장하고 시작하기 →';
  }
};

// ── 관리자 이메일 로그인 ────────────────────────────────
window.toggleAdminLogin = function() {
  const box = document.getElementById('admin-login-box');
  const isHidden = box.style.display === 'none' || box.style.display === '';
  box.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) {
    box.style.flexDirection = 'column';
    setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }
};

window.doAdminLogin = async function() {
  const email = document.getElementById('admin-email').value.trim();
  const pw    = document.getElementById('admin-pw').value;
  if (!email || !pw) { showMsg('admin-msg', '이메일과 비밀번호를 입력해주세요', 'error'); return; }
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth, email, pw);
    showPwaPrompt(getReturnUrl());
  } catch (e) {
    const map = {
      'auth/invalid-credential': '이메일 또는 비밀번호가 틀렸어요',
      'auth/too-many-requests': '잠시 후 다시 시도해주세요',
    };
    showMsg('admin-msg', map[e.code] || '로그인 실패: ' + e.code, 'error');
  }
};
