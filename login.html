<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOLGAB ZONE — 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --white: #ffffff;
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .phone-frame {
      width: 390px; min-height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 28px 48px;
    }
    .phone-frame::before {
      content: '';
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px;
    }

    .logo { margin-bottom: 28px; text-align: center; }
    .logo img { height: 64px; width: auto; object-fit: contain; }

    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .form-hint { font-size: 11px; color: rgba(255,255,255,0.3); padding-left: 2px; margin-top: 3px; }

    .tabs { display: flex; width: 100%; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.4);
      border-radius: 9px; cursor: pointer; border: none; background: none;
      -webkit-tap-highlight-color: transparent; transition: all 0.2s;
    }
    .tab.active { background: var(--green); color: #fff; }

    .form { width: 100%; display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); padding-left: 2px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(62,160,102,0.3);
      border-radius: 12px; color: #fff; font-size: 15px;
      font-family: inherit; outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--green-light); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    select.form-input option { background: #0f2d18; color: #fff; }
    input[type="date"].form-input { height: 51px; box-sizing: border-box; }

    .submit-btn {
      width: 100%; padding: 16px; margin-top: 6px;
      background: var(--green); color: #fff;
      font-size: 16px; font-weight: 900; letter-spacing: -0.3px;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, opacity 0.2s;
    }
    .submit-btn:active { background: var(--green-light); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider-text {
      text-align: center; font-size: 12px; color: rgba(255,255,255,0.2);
      margin: 4px 0; position: relative;
    }
    .divider-text::before, .divider-text::after {
      content: ''; position: absolute; top: 50%; width: 38%; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }

    .google-btn {
      width: 100%; padding: 14px;
      background: #fff; color: #3c4043;
      font-size: 15px; font-weight: 700;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s;
    }
    .google-btn:active { background: #f1f3f4; }

    .kakao-btn {
      width: 100%; padding: 14px;
      background: #FEE500; color: #191919;
      font-size: 15px; font-weight: 800;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      opacity: 0.5;
    }

    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 48px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: rgba(255,255,255,0.3); line-height: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.6); }

    /* 에러/성공 메시지 */
    .msg {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; text-align: center;
      display: none;
    }
    .msg.error { background: rgba(220,50,50,0.15); color: #ff6b6b; border: 1px solid rgba(220,50,50,0.3); display: block; }
    .msg.success { background: rgba(46,160,80,0.15); color: #3ea066; border: 1px solid rgba(46,160,80,0.3); display: block; }

    .panel { display: none; width: 100%; }
    .panel.active { display: flex; flex-direction: column; gap: 14px; }

    .back-link {
      display: block; text-align: center; margin-top: 24px;
      font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none;
    }
    .back-link span { color: var(--green-light); }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); padding: 0; }
      body { align-items: flex-start; justify-content: flex-start; }
      .phone-frame {
        width: 100%; min-height: 100vh; border-radius: 0;
        box-shadow: none; justify-content: flex-start;
        padding-top: 80px;
      }
      .phone-frame::before { display: none; }
    }
  </style>
</head>

    <!-- 회원가입 패널 -->
    <div class="panel active" id="panel-signup">
      <div class="form-group">
        <label class="form-label">닉네임 <span style="color:var(--green-light)">*</span></label>
        <input class="form-input" id="signup-nick" type="text" placeholder="골갑킹" maxlength="12" />
        <div class="form-hint">나중에 변경 가능 · 최대 12자</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" id="signup-name" type="text" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label class="form-label">생년월일</label>
          <input class="form-input" id="signup-birth" type="date" />
          <div class="form-hint">연도 뒤 2자리만 공개</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">골프 핸디</label>
          <select class="form-input" id="signup-handi">
            <option value="" disabled selected>선택</option>
            <option value="scratch">스크래치 이하</option>
            <option value="1-9">1~9</option>
            <option value="10-18">10~18</option>
            <option value="19-27">19~27</option>
            <option value="28-36">28~36</option>
            <option value="37+">37 이상</option>
            <option value="beginner">입문자</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">거주지</label>
          <select class="form-input" id="signup-region">
            <option value="" disabled selected>선택</option>
            <option>서울</option><option>경기</option><option>인천</option>
            <option>부산</option><option>대구</option><option>광주</option>
            <option>대전</option><option>울산</option><option>세종</option>
            <option>강원</option><option>충북</option><option>충남</option>
            <option>전북</option><option>전남</option><option>경북</option>
            <option>경남</option><option>제주</option><option>해외</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">연락처</label>
        <input class="form-input" id="signup-phone" type="tel" placeholder="010-0000-0000" />
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="signup-email" type="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="pw-wrap">
          <input class="form-input" id="signup-pw" type="password" placeholder="8자 이상" />
          <button type="button" class="pw-toggle" onclick="togglePw('signup-pw', this)" tabindex="-1">
            <svg id="icon-signup-pw" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <div class="pw-wrap">
          <input class="form-input" id="signup-pw2" type="password" placeholder="비밀번호 재입력" />
          <button type="button" class="pw-toggle" onclick="togglePw('signup-pw2', this)" tabindex="-1">
            <svg id="icon-signup-pw2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="msg" id="signup-msg"></div>
      <button class="submit-btn" id="signup-btn" onclick="doSignup()">가입하기 →</button>
      <div class="divider-text">또는</div>
      <button class="google-btn" onclick="doGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        구글로 시작하기
      </button>
      <button class="kakao-btn" disabled title="준비중">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5C4.86 1.5 1.5 4.19 1.5 7.5c0 2.09 1.24 3.93 3.11 5.04L3.75 15l3.27-1.64C7.3 13.45 8.14 13.5 9 13.5c4.14 0 7.5-2.69 7.5-6S13.14 1.5 9 1.5z" fill="#191919"/></svg>
        카카오 로그인 (준비중)
      </button>
    </div>

    <!-- 로그인 패널 -->
    <div class="panel" id="panel-login">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="form-input" id="login-email" type="email" placeholder="example@email.com" onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="pw-wrap">
          <input class="form-input" id="login-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') doLogin()" />
          <button type="button" class="pw-toggle" onclick="togglePw('login-pw', this)" tabindex="-1">
            <svg id="icon-login-pw" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="msg" id="login-msg"></div>
      <button class="submit-btn" id="login-btn" onclick="doLogin()">로그인 →</button>
      <button id="resend-btn" style="display:none;margin-top:10px;width:100%;padding:12px;border-radius:12px;background:rgba(62,160,102,0.15);border:1px solid rgba(62,160,102,0.3);color:#3ea066;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;" onclick="resendVerification()">인증 메일 재발송</button>
      <div class="divider-text">또는</div>
      <button class="google-btn" onclick="doGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        구글로 시작하기
      </button>
      <button class="kakao-btn" disabled title="준비중">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1.5C4.86 1.5 1.5 4.19 1.5 7.5c0 2.09 1.24 3.93 3.11 5.04L3.75 15l3.27-1.64C7.3 13.45 8.14 13.5 9 13.5c4.14 0 7.5-2.69 7.5-6S13.14 1.5 9 1.5z" fill="#191919"/></svg>
        카카오 로그인 (준비중)
      </button>
    </div>

    <a href="index.html" class="back-link">← <span>골갑존 소개</span>로 돌아가기</a>

  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendEmailVerification,
      updateProfile,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, doc, setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
      authDomain: "ggzon-b33cb.firebaseapp.com",
      projectId: "ggzon-b33cb",
      storageBucket: "ggzon-b33cb.firebasestorage.app",
      messagingSenderId: "774722580869",
      appId: "1:774722580869:web:5beecd26c0b76f753914ec"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 로그인 후 돌아갈 페이지 (없으면 dashboard)
    function getReturnUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('return') || 'dashboard.html';
    }

    // 이미 로그인된 상태면 이동 (이메일 인증 완료된 경우만)
    const ADMIN_EMAIL = 'wlfmzhs@naver.com';
    onAuthStateChanged(auth, (user) => {
      if (user && (user.emailVerified || user.email === ADMIN_EMAIL)) window.location.href = getReturnUrl();
    });

    // 에러 메시지 한글 변환
    function getErrorMsg(code) {
      const map = {
        'auth/email-already-in-use': '이미 사용 중인 이메일이에요.',
        'auth/invalid-email': '이메일 형식이 올바르지 않아요.',
        'auth/weak-password': '비밀번호는 6자 이상이어야 해요.',
        'auth/user-not-found': '등록되지 않은 이메일이에요.',
        'auth/wrong-password': '비밀번호가 틀렸어요.',
        'auth/invalid-credential': '이메일 또는 비밀번호가 틀렸어요.',
        'auth/too-many-requests': '잠시 후 다시 시도해 주세요.',
      };
      return map[code] || '오류가 발생했어요. 다시 시도해 주세요.';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? '처리 중...' : (btnId === 'signup-btn' ? '가입하기 →' : '로그인 →');
    }

    // 전역 함수로 노출
    window.doSignup = async function() {
      const nick   = document.getElementById('signup-nick').value.trim();
      const name   = document.getElementById('signup-name').value.trim();
      const birth  = document.getElementById('signup-birth').value;
      const handi  = document.getElementById('signup-handi').value;
      const region = document.getElementById('signup-region').value;
      const phone  = document.getElementById('signup-phone').value.trim();
      const email  = document.getElementById('signup-email').value.trim();
      const pw     = document.getElementById('signup-pw').value;
      const pw2    = document.getElementById('signup-pw2').value;

      if (!nick)  return showMsg('signup-msg', '닉네임을 입력해 주세요.', 'error');
      if (!email) return showMsg('signup-msg', '이메일을 입력해 주세요.', 'error');
      if (pw.length < 8) return showMsg('signup-msg', '비밀번호는 8자 이상이어야 해요.', 'error');
      if (pw !== pw2) return showMsg('signup-msg', '비밀번호가 일치하지 않아요.', 'error');

      // 생년월일 뒤 2자리 (공개용 표시값)
      const birthYear2 = birth ? birth.slice(2, 4) : '';

      setLoading('signup-btn', true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: nick });

        // Firestore에 추가 정보 저장
        await setDoc(doc(db, 'users', cred.user.uid), {
          nickname: nick,
          name: name || '',
          birthYear2: birthYear2,
          handicap: handi || '',
          region: region || '',
          phone: phone || '',
          email: email,
          createdAt: new Date().toISOString(),
          isPaid: false
        });

        await sendEmailVerification(cred.user);
        showMsg('signup-msg', '가입 완료! 📧 ' + email + ' 로 인증 메일을 보냈어요. 메일함을 확인해 주세요.', 'success');
        setLoading('signup-btn', false);
      } catch (e) {
        showMsg('signup-msg', getErrorMsg(e.code), 'error');
        setLoading('signup-btn', false);
      }
    };

    window.doGoogleLogin = async function() {
      const provider = new GoogleAuthProvider();
      try {
        const cred = await signInWithPopup(auth, provider);
        const user = cred.user;
        const isNew = cred._tokenResponse?.isNewUser;
        if (isNew) {
          await setDoc(doc(db, 'users', user.uid), {
            nickname: user.displayName || '골퍼',
            name: user.displayName || '',
            birthYear2: '',
            handicap: '',
            region: '',
            phone: '',
            email: user.email,
            createdAt: new Date().toISOString(),
            isPaid: false
          });
        }
        window.location.href = getReturnUrl();
      } catch (e) {
        const id = document.getElementById('panel-login').classList.contains('active') ? 'login-msg' : 'signup-msg';
        if (e.code !== 'auth/popup-closed-by-user') {
          showMsg(id, '구글 로그인 중 오류가 발생했어요.', 'error');
        }
      }
    };

    window.resendVerification = async function() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, pw);
        await sendEmailVerification(cred.user);
        showMsg('login-msg', '인증 메일을 재발송했어요. 메일함을 확인해 주세요.', 'success');
      } catch (e) { showMsg('login-msg', getErrorMsg(e.code), 'error'); }
    };

    window.doLogin = async function() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;

      if (!email) return showMsg('login-msg', '이메일을 입력해 주세요.', 'error');
      if (!pw)    return showMsg('login-msg', '비밀번호를 입력해 주세요.', 'error');

      setLoading('login-btn', true);
      try {
        await setPersistence(auth, browserLocalPersistence);
        const cred = await signInWithEmailAndPassword(auth, email, pw);
        if (!cred.user.emailVerified && cred.user.email !== ADMIN_EMAIL) {
          showMsg('login-msg', '이메일 인증이 필요해요. 받은 메일함을 확인해 주세요.', 'error');
          document.getElementById('resend-btn').style.display = 'block';
          setLoading('login-btn', false);
          return;
        }
        showMsg('login-msg', '로그인 성공! 잠시 후 이동합니다.', 'success');
        setTimeout(() => { window.location.href = getReturnUrl(); }, 1000);
      } catch (e) {
        showMsg('login-msg', getErrorMsg(e.code), 'error');
        setLoading('login-btn', false);
      }
    };
  </script>

  <script>
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      const svg = btn.querySelector('svg');
      svg.innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      btn.style.color = isHidden ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.3)';
    }

    function switchTab(tab) {
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'login') switchTab('login');
  </script>
</body>
</html>
