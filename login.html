  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .phone-frame {
      width: 390px; min-height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 28px 48px;
    }
    .phone-frame::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px;
    }
    .logo { margin-bottom: 32px; text-align: center; }
    .logo img { height: 64px; width: auto; object-fit: contain; }

    /* Steps */
    .step { display: none; width: 100%; flex-direction: column; gap: 14px; }
    .step.active { display: flex; }
    .step-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 2px; }
    .step-desc { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .step-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; color: var(--green-light); cursor: pointer;
      margin-bottom: 4px; background: none; border: none; font-family: inherit; padding: 0;
    }
    .otp-sent-info {
      font-size: 13px; color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 14px; line-height: 1.5;
    }
    .otp-sent-info strong { color: #fff; }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); padding-left: 2px; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(62,160,102,0.3);
      border-radius: 12px; color: #fff; font-size: 15px;
      font-family: inherit; outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--green-light); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    select.form-input option { background: #0f2d18; color: #fff; }
    .form-hint { font-size: 11px; color: rgba(255,255,255,0.3); padding-left: 2px; margin-top: 3px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* OTP input */
    #otp-input {
      letter-spacing: 8px; font-size: 22px; font-weight: 900;
      text-align: center;
    }

    /* Buttons */
    .submit-btn {
      width: 100%; padding: 16px; margin-top: 4px;
      background: var(--green); color: #fff;
      font-size: 16px; font-weight: 900; letter-spacing: -0.3px;
      border-radius: 14px; border: none; cursor: pointer;
      font-family: inherit; transition: background 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:active { background: var(--green-light); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .resend-btn {
      width: 100%; padding: 13px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: rgba(255,255,255,0.5);
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .resend-btn:not(:disabled):active { background: rgba(255,255,255,0.1); }
    .resend-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Messages */
    .msg {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 600; text-align: center; display: none;
    }
    .msg.error { background: rgba(220,50,50,0.15); color: #ff6b6b; border: 1px solid rgba(220,50,50,0.3); display: block; }
    .msg.success { background: rgba(46,160,80,0.15); color: #3ea066; border: 1px solid rgba(46,160,80,0.3); display: block; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider-text { font-size: 11px; color: rgba(255,255,255,0.3); }

    /* Google */
    .google-btn {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #fff; color: #333; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    /* Agree */
    .agree-box { display: flex; flex-direction: column; gap: 10px; }
    .agree-item { display: flex; align-items: flex-start; gap: 10px; }
    .agree-item input[type="checkbox"] { width: 18px; height: 18px; min-width: 18px; accent-color: var(--green-light); margin-top: 2px; cursor: pointer; }
    .agree-item label { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; cursor: pointer; }
    .agree-item label span { color: var(--green-light); text-decoration: underline; cursor: pointer; }

    /* Term overlay */
    .term-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: flex-end; justify-content: center; }
    .term-overlay.show { display: flex; }
    .term-box { width: 100%; max-width: 390px; background: #0f2e1a; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; max-height: 70vh; overflow-y: auto; }
    .term-box h3 { font-size: 15px; font-weight: 900; margin-bottom: 16px; }
    .term-box p, .term-box li { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 8px; }
    .term-box ul { padding-left: 16px; margin-bottom: 8px; }
    .term-close { float: right; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 22px; cursor: pointer; line-height: 1; margin-top: -4px; }

    .back-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.3); text-decoration: none; }
    .back-link span { color: var(--green-light); }

    /* reCAPTCHA */
    #recaptcha-container { margin-top: 4px; min-height: 0; }
    #recaptcha-container iframe { border-radius: 8px; }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); padding: 0; overflow-y: auto; min-height: 100vh; }
      body { align-items: flex-start; justify-content: flex-start; }
      .phone-frame { width: 100%; min-height: 100vh; height: auto; border-radius: 0; box-shadow: none; justify-content: flex-start; padding-top: 80px; padding-bottom: 60px; overflow-y: visible; }
      .phone-frame::before { display: none; }
    }
  </style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithPhoneNumber, RecaptchaVerifier,
  GoogleAuthProvider, signInWithPopup,
  signInWithEmailAndPassword,
  setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const ADMIN_EMAIL = 'wlfmzhs@naver.com';

function getReturnUrl() {
  return new URLSearchParams(window.location.search).get('return') || 'dashboard.html';
}

// 이미 로그인된 경우 바로 이동
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  const isVerified = user.emailVerified || user.email === ADMIN_EMAIL || !!user.phoneNumber;
  if (!isVerified) return;
  try {
    const bannedSnap = await getDoc(doc(db, 'banned', user.uid));
    if (bannedSnap.exists()) { await auth.signOut(); return; }
  } catch (_) {}
  window.location.href = getReturnUrl();
});

// ── reCAPTCHA ──────────────────────────────────────────
let appVerifier = null;
function initRecaptcha() {
  if (appVerifier) { try { appVerifier.clear(); } catch(_) {} appVerifier = null; }
  appVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    size: 'normal',
    callback: () => {},
    'expired-callback': () => { initRecaptcha(); }
  });
  appVerifier.render();
}
// 페이지 로드 시 바로 렌더링
window.addEventListener('DOMContentLoaded', () => initRecaptcha());

// ── 전화번호 포맷 ───────────────────────────────────────
function formatPhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (!digits) return null;
  return digits.startsWith('0') ? '+82' + digits.slice(1) : '+82' + digits;
}

// ── Step 전환 ───────────────────────────────────────────
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.goToPhone = function() { showStep('step-phone'); };

// ── 재발송 타이머 ───────────────────────────────────────
let resendTimer = null;
function startResendTimer() {
  let sec = 60;
  const btn = document.getElementById('resend-btn');
  btn.disabled = true;
  btn.textContent = `재발송 (${sec}s)`;
  clearInterval(resendTimer);
  resendTimer = setInterval(() => {
    sec--;
    btn.textContent = `재발송 (${sec}s)`;
    if (sec <= 0) {
      clearInterval(resendTimer);
      btn.disabled = false;
      btn.textContent = '재발송';
    }
  }, 1000);
}

// ── confirmationResult 보관 ────────────────────────────
let confirmationResult = null;
let currentPhone = null;

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = ''; el.className = 'msg'; }
}

// ── 인증번호 발송 ───────────────────────────────────────
window.sendOTP = async function() {
  const raw = document.getElementById('phone-input').value.trim();
  const phone = formatPhone(raw);
  if (!phone || phone.length < 11) {
    showMsg('phone-msg', '올바른 휴대폰 번호를 입력해주세요', 'error'); return;
  }
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '발송 중...';
  clearMsg('phone-msg');
  try {
    await setPersistence(auth, browserLocalPersistence);
    confirmationResult = await signInWithPhoneNumber(auth, phone, appVerifier);
    currentPhone = raw;
    document.getElementById('otp-sent-info').innerHTML =
      `<strong>${raw}</strong> 으로 6자리 인증번호를 보냈어요.<br>문자가 오지 않으면 재발송을 눌러주세요.`;
    showStep('step-otp');
    startResendTimer();
    document.getElementById('otp-input').focus();
  } catch (e) {
    console.error('sendOTP error:', e.code, e.message);
    showMsg('phone-msg', getPhoneError(e.code) + ' (' + (e.code || '') + ')', 'error');
    initRecaptcha();
  } finally {
    btn.disabled = false; btn.textContent = '인증번호 받기 →';
  }
};

// ── 재발송 ─────────────────────────────────────────────
window.resendOTP = async function() {
  if (!currentPhone) return;
  const btn = document.getElementById('resend-btn');
  btn.disabled = true; btn.textContent = '발송 중...';
  clearMsg('otp-msg');
  try {
    confirmationResult = await signInWithPhoneNumber(auth, formatPhone(currentPhone), appVerifier);
    startResendTimer();
    showMsg('otp-msg', '재발송했습니다', 'success');
    initRecaptcha();
  } catch (e) {
    showMsg('otp-msg', getPhoneError(e.code), 'error');
    initRecaptcha();
    btn.disabled = false; btn.textContent = '재발송';
  }
};

// ── OTP 검증 ────────────────────────────────────────────
window.verifyOTP = async function() {
  const code = document.getElementById('otp-input').value.trim();
  if (code.length !== 6) { showMsg('otp-msg', '인증번호 6자리를 입력해주세요', 'error'); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true; btn.textContent = '확인 중...';
  clearMsg('otp-msg');
  try {
    const result = await confirmationResult.confirm(code);
    const user = result.user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      // 기존 회원 → 바로 이동
      showPwaPrompt(getReturnUrl());
    } else {
      // 신규 → 프로필 설정
      showStep('step-profile');
      document.getElementById('prof-nick').focus();
    }
  } catch (e) {
    showMsg('otp-msg', e.code === 'auth/invalid-verification-code'
      ? '인증번호가 올바르지 않아요'
      : e.code === 'auth/code-expired'
      ? '인증번호가 만료됐어요. 재발송해주세요'
      : '오류가 발생했어요. 다시 시도해주세요', 'error');
    btn.disabled = false; btn.textContent = '확인 →';
  }
};

// ── 프로필 저장 (신규) ──────────────────────────────────
window.saveProfile = async function() {
  const nick = document.getElementById('prof-nick').value.trim();
  if (!nick) { showMsg('prof-msg', '닉네임을 입력해주세요', 'error'); return; }
  if (!document.getElementById('prof-terms').checked) { showMsg('prof-msg', '이용약관에 동의해 주세요', 'error'); return; }
  if (!document.getElementById('prof-privacy').checked) { showMsg('prof-msg', '개인정보처리방침에 동의해 주세요', 'error'); return; }
  const btn = document.getElementById('prof-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  const user = auth.currentUser;
  const birthRaw = document.getElementById('prof-birth').value.trim();
  try {
    await setDoc(doc(db, 'users', user.uid), {
      nickname: nick,
      name: document.getElementById('prof-name').value.trim(),
      birthYear2: birthRaw ? String(birthRaw).padStart(2, '0') : '',
      handicap: document.getElementById('prof-handi').value,
      region: document.getElementById('prof-region').value,
      phone: currentPhone || user.phoneNumber || '',
      createdAt: new Date().toISOString(),
      isPaid: false
    });
    showPwaPrompt(getReturnUrl());
  } catch (e) {
    showMsg('prof-msg', '저장 실패: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '가입 완료 →';
  }
};

// ── Google 로그인 ───────────────────────────────────────
window.doGoogleLogin = async function() {
  try {
    await setPersistence(auth, browserLocalPersistence);
    const cred = await signInWithPopup(auth, new GoogleAuthProvider());
    const user = cred.user;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      showPwaPrompt(getReturnUrl());
    } else {
      // Google 신규: 프로필 설정으로
      currentPhone = '';
      showStep('step-profile');
      document.getElementById('prof-nick').focus();
    }
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showMsg('phone-msg', '구글 로그인 실패: ' + e.message, 'error');
    }
  }
};

// ── 관리자 이메일 로그인 ────────────────────────────────
window.toggleAdminLogin = function() {
  const box = document.getElementById('admin-login-box');
  const isHidden = box.style.display === 'none' || box.style.display === '';
  box.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) {
    box.style.flexDirection = 'column';
    setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }
};

window.doAdminLogin = async function() {
  const email = document.getElementById('admin-email').value.trim();
  const pw    = document.getElementById('admin-pw').value;
  if (!email || !pw) { showMsg('admin-msg', '이메일과 비밀번호를 입력해주세요', 'error'); return; }
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithEmailAndPassword(auth, email, pw);
    showPwaPrompt(getReturnUrl());
  } catch (e) {
    const map = {
      'auth/invalid-credential': '이메일 또는 비밀번호가 틀렸어요',
      'auth/too-many-requests': '잠시 후 다시 시도해주세요',
    };
    showMsg('admin-msg', map[e.code] || '로그인 실패: ' + e.code, 'error');
  }
};

function getPhoneError(code) {
  const map = {
    'auth/invalid-phone-number': '올바른 휴대폰 번호를 입력해주세요',
    'auth/too-many-requests': '요청이 너무 많아요. 잠시 후 다시 시도해주세요',
    'auth/captcha-check-failed': 'reCAPTCHA 확인 실패. 다시 시도해주세요',
  };
  return map[code] || '오류가 발생했어요. 다시 시도해주세요';
}
