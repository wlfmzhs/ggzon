  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --border: rgba(62,160,102,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }

    /* ── 앱바 ── */
    .appbar {
      flex-shrink: 0; padding: 28px 18px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .back-btn {
      background: none; border: none; color: var(--green-light);
      font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px 2px 0;
    }
    .appbar-title { font-size: 17px; font-weight: 900; letter-spacing: -0.3px; }
    .appbar-sub { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500; }

    /* ── 국내/해외 탭 ── */
    .main-tabs {
      flex-shrink: 0; display: flex;
      margin: 0 18px 0; border-radius: 12px;
      background: rgba(255,255,255,0.06); padding: 3px; gap: 3px;
    }
    .main-tab {
      flex: 1; padding: 8px 0; border: none; background: none; cursor: pointer;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4);
      border-radius: 10px; font-family: inherit; transition: all 0.2s;
    }
    .main-tab.active {
      background: var(--green); color: #fff;
    }

    /* ── 지역 필터 칩 ── */
    .filter-wrap {
      flex-shrink: 0; display: flex; flex-wrap: wrap; gap: 7px;
      padding: 12px 18px 10px;
    }
    .chip {
      flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
      border: 1px solid rgba(62,160,102,0.3); background: transparent;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.45);
      cursor: pointer; font-family: inherit; transition: all 0.18s;
      white-space: nowrap;
    }
    .chip.active {
      background: var(--green); border-color: var(--green); color: #fff;
    }

    /* ── 검색바 ── */
    .search-wrap {
      flex-shrink: 0; padding: 0 18px 10px;
      position: relative;
    }
    .search-input {
      width: 100%; padding: 9px 14px 9px 36px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 12px; color: #fff; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.28); }
    .search-input:focus { border-color: rgba(62,160,102,0.5); }
    .search-icon {
      position: absolute; left: 30px; top: calc(50% - 5px); transform: translateY(-50%);
      width: 14px; height: 14px; pointer-events: none; opacity: 0.4; color: #fff;
    }

    /* ── 카운트 바 ── */
    .count-bar {
      flex-shrink: 0; padding: 0 18px 10px;
      font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500;
    }
    .count-bar span { color: var(--green-light); font-weight: 700; }

    /* ── 3열 그리드 ── */
    .card-list {
      flex: 1; overflow-y: auto; padding: 0 18px 24px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px;
      align-content: start;
      scrollbar-width: none;
    }
    .card-list::-webkit-scrollbar { display: none; }

    .course-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 8px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: background 0.15s; position: relative;
    }
    .course-card:active { background: rgba(255,255,255,0.08); }
    .course-card.upcoming {
      background: rgba(255,183,0,0.04);
      border: 1px dashed rgba(255,183,0,0.35);
      opacity: 0.7;
    }
    .upcoming-badge {
      position: absolute; top: 7px; right: 7px;
      font-size: 8px; font-weight: 800; color: #ffb700;
      background: rgba(255,183,0,0.15); border: 1px solid rgba(255,183,0,0.3);
      padding: 1px 5px; border-radius: 20px; letter-spacing: 0.03em;
    }
    .upcoming-btn {
      width: 100%; height: 22px; border-radius: 6px; margin-top: 2px;
      background: rgba(255,183,0,0.12); border: 1px dashed rgba(255,183,0,0.3);
      font-size: 9px; font-weight: 700; color: rgba(255,183,0,0.6);
      display: flex; align-items: center; justify-content: center;
    }

    .card-name {
      font-size: 13px; font-weight: 900; letter-spacing: -0.5px;
      text-align: center; line-height: 1.3;
      word-break: keep-all;
    }
    .card-region {
      font-size: 9px; font-weight: 700; color: var(--green-light);
      background: rgba(62,160,102,0.12); padding: 2px 7px; border-radius: 20px;
    }

    .yt-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 22px; border-radius: 6px; margin-top: 2px;
      background: rgba(255,255,255,0.7); border: none;
      text-decoration: none; transition: opacity 0.18s; gap: 3px;
      font-size: 9px; font-weight: 700; color: #cc0000;
    }
    .yt-btn:active { opacity: 0.75; }
    .yt-btn svg { width: 10px; height: 10px; fill: #cc0000; flex-shrink: 0; }

    /* ── 빈 상태 ── */
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: rgba(255,255,255,0.3); font-size: 13px; }
    .empty .icon { font-size: 36px; margin-bottom: 4px; }

    /* ── 모바일 ── */
    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
    }
  </style>
</head>

        ${c.status === 'upcoming'
          ? '<div class="upcoming-btn">영상 준비중</div>'
          : `<a class="yt-btn" href="${YT(c.name)}" target="_blank">${ytSVG} 영상</a>`
        }
      </div>
    `).join('');
  }

  function render() {
    const data = currentTab === 'domestic' ? domestic : overseas;
    renderFilters(data);
    renderCards(data);
  }

  function switchTab(tab) {
    currentTab = tab;
    currentFilter = '전체';
    document.querySelectorAll('.main-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    render();
  }

  render();
</script>
</body>
</html>
