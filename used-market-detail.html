  } else {
    navigator.clipboard?.writeText(pageUrl).then(() => {
      showToast('링크가 복사되었습니다');
    }).catch(() => showToast('공유 링크: ' + pageUrl));
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmtPrice(n) { return Number(n).toLocaleString('ko-KR') + '원'; }

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  return Math.floor(diff/86400) + '일 전';
}

function statusLabel(s) {
  const map = { sale: '판매중', pending: '입금대기', confirmed: '발송준비', shipped: '발송완료', done: '거래완료' };
  return map[s] || s;
}
function statusClass(s) {
  const map = { sale: 'status-sale', pending: 'status-pending', confirmed: 'status-confirmed', shipped: 'status-shipped', done: 'status-done' };
  return map[s] || 'status-sale';
}

function stepIndex(s) {
  return ['sale','pending','confirmed','shipped','done'].indexOf(s);
}

function renderGallery(photos) {
  if (!photos || photos.length === 0) {
    return `<div class="gallery"><div class="gallery-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 19H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2z"/><circle cx="12" cy="12" r="3"/></svg></div></div>`;
  }
  const imgs = photos.map(url => `<img class="gallery-img" src="${url}" alt="" loading="eager" />`).join('');
  const dots = photos.length > 1 ? `<div class="gallery-dots">${photos.map((_, i) => `<div class="dot${i===0?' active':''}"></div>`).join('')}</div>` : '';
  const nav = photos.length > 1 ? `
    <button class="gallery-prev" onclick="prevPhoto()" aria-label="이전">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="gallery-next" onclick="nextPhoto()" aria-label="다음">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>
    </button>` : '';
  return `<div class="gallery" id="gallery"><div class="gallery-slide" id="gallery-slide" style="transform:translateX(0);transition:transform 0.3s ease;">${imgs}</div>${dots}${nav}</div>`;
}

window.prevPhoto = function() {
  const photos = itemData?.photos || [];
  if (photos.length < 2) return;
  photoIndex = (photoIndex - 1 + photos.length) % photos.length;
  updateGalleryPos(photos.length);
};
window.nextPhoto = function() {
  const photos = itemData?.photos || [];
  if (photos.length < 2) return;
  photoIndex = (photoIndex + 1) % photos.length;
  updateGalleryPos(photos.length);
};
function updateGalleryPos(total) {
  const slide = document.getElementById('gallery-slide');
  if (slide) slide.style.transform = `translateX(-${photoIndex * 100}%)`;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === photoIndex));
}

function renderTradeSteps(status) {
  const steps = ['등록', '입금대기', '발송준비', '발송완료', '거래완료'];
  const cur = stepIndex(status);
  const stepsHtml = steps.map((s, i) => {
    const cls = i < cur ? 'done-step' : i === cur ? 'current-step' : '';
    return `<div class="trade-step ${cls}">${s}</div>${i < steps.length - 1 ? '<div class="trade-arrow">›</div>' : ''}`;
  }).join('');
  return `<div class="trade-section">
    <div class="trade-title">거래 진행 단계</div>
    <div class="trade-steps">${stepsHtml}</div>
  </div>`;
}

// ── 경매 ──────────────────────────────────────────────────
function fmtCountdown(ms) {
  if (ms <= 0) return '종료됨';
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (d > 0) return `${d}일 ${h}시간 ${m}분`;
  if (h > 0) return `${h}시간 ${m}분 ${sec}초`;
  return `${m}분 ${sec}초`;
}

function renderAuction(data, isSeller, isAdmin) {
  const area = document.getElementById('action-area');
  const bar = document.getElementById('bottom-bar');
  if (!area || !bar) return;

  const now = new Date();
  const endAt = data.auctionEndAt?.toDate?.() || null;
  const isExpired = !endAt || now >= endAt;
  const aStatus = data.auctionStatus || 'active';
  const isEnded = aStatus !== 'active' || isExpired;
  const uid = getUid(currentUser);
  const currentBid = data.auctionCurrentBid;
  const hasBids = data.auctionBidCount > 0;

  // 경매 박스 렌더
  const bidHistoryEl = `<div id="bid-history-list"><div style="font-size:12px;color:rgba(255,255,255,0.3);text-align:center;padding:8px 0;">불러오는 중...</div></div>`;
  let endedBox = '';
  if (isEnded) {
    if (hasBids) {
      endedBox = `<div class="auction-ended-box">
        <div class="auction-ended-label">낙찰</div>
        <div class="auction-winner">${data.auctionHighestBidderNick || '낙찰자'} · ${fmtPrice(currentBid)}</div>
      </div>`;
    } else {
      endedBox = `<div class="auction-ended-box"><div class="auction-ended-label" style="font-size:14px;color:rgba(255,255,255,0.4);">유찰 — 입찰자 없이 종료됨</div></div>`;
    }
  }

  area.innerHTML = `
    <div class="auction-box">
      <div class="auction-header">
        <span class="auction-badge">AUCTION</span>
        <span class="auction-timer" id="auction-timer">${isEnded ? '경매 종료' : fmtCountdown(endAt - now)}</span>
      </div>
      <div class="auction-current">
        <div class="auction-label">${isEnded ? '최종 입찰가' : '현재 입찰가'}</div>
        <span class="auction-price">${currentBid ? fmtPrice(currentBid) : '입찰 없음'}</span>
        <span class="auction-count">${hasBids ? `${data.auctionBidCount}회 입찰` : '아직 입찰 없음'}</span>
      </div>
      <div class="auction-info-row">
        <span>시작가 <b>${fmtPrice(data.auctionStartPrice)}</b></span>
        <span>단위 <b>${fmtPrice(data.auctionMinStep)}</b></span>
        ${data.auctionBuyNowPrice ? `<span>즉시구매 <b>${fmtPrice(data.auctionBuyNowPrice)}</b></span>` : ''}
      </div>
      <div class="bid-history-title">입찰 내역</div>
      ${bidHistoryEl}
    </div>
    ${endedBox}
    ${isAdmin && isEnded && hasBids ? `<button class="action-btn btn-confirm" onclick="adminFinalize()">낙찰 확정 처리</button>` : ''}
  `;

  // 하단 바: 입찰 UI or 상태 안내
  if (!isEnded && !isSeller) {
    const minNext = (currentBid ?? data.auctionStartPrice) + (currentBid !== null ? data.auctionMinStep : 0);
    const hasLogin = isLoggedIn(currentUser);
    bar.innerHTML = `
      <div class="auction-bid-row">
        <input class="bid-input" id="bid-input" type="text" inputmode="numeric" placeholder="${fmtPrice(minNext)} 이상" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,',')"
          ${!hasLogin ? 'disabled' : ''} />
        <button class="bid-submit-btn" id="bid-submit-btn" onclick="submitBid()"
          ${!hasLogin ? 'disabled' : ''}>${hasLogin ? '입찰하기' : '로그인 필요'}</button>
      </div>
      ${data.auctionBuyNowPrice
        ? `<button class="buynow-btn" onclick="executeBuyNow()">${!hasLogin ? '즉시구매 ' : ''}${fmtPrice(data.auctionBuyNowPrice)}에 즉시구매</button>`
        : ''}
    `;
  } else if (isSeller && !isEnded) {
    bar.innerHTML = `<div style="text-align:center;font-size:13px;color:rgba(255,255,255,0.35);padding:10px 0;">내가 등록한 경매 상품입니다</div>`;
  } else {
    bar.innerHTML = '';
  }

  // 카운트다운 타이머
  if (auctionTimerInterval) clearInterval(auctionTimerInterval);
  if (!isEnded && endAt) {
    auctionTimerInterval = setInterval(() => {
      const remain = endAt - new Date();
      const el = document.getElementById('auction-timer');
      if (!el) { clearInterval(auctionTimerInterval); return; }
      if (remain <= 0) {
        el.textContent = '경매 종료';
        clearInterval(auctionTimerInterval);
        loadItem();
        return;
      }
      el.textContent = fmtCountdown(remain);
      el.classList.toggle('urgent', remain < 300000);
    }, 1000);
  }

  // 실시간 입찰 내역
  if (auctionBidUnsubscribe) auctionBidUnsubscribe();
  auctionBidUnsubscribe = onSnapshot(
    query(collection(db, 'usedItems', itemId, 'bids'), orderBy('amount', 'desc')),
    snap => {
      const el = document.getElementById('bid-history-list');
      if (!el) return;
      if (snap.empty) {
        el.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.3);text-align:center;padding:8px 0;">아직 입찰이 없습니다</div>`;
        return;
      }
      el.innerHTML = snap.docs.slice(0, 5).map(d => {
        const b = d.data();
        return `<div class="bid-item">
          <span class="bid-item-amount">${fmtPrice(b.amount)}</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.3);">${timeAgo(b.createdAt)}</span>
        </div>`;
      }).join('');
    }
  );
}

window.submitBid = async function() {
  const uid = getUid(currentUser);
  if (!uid) { showToast('로그인이 필요합니다'); return; }
  const bidVal = parseInt((document.getElementById('bid-input')?.value || '').replace(/,/g, ''), 10);
  if (!bidVal || isNaN(bidVal) || bidVal <= 0) { showToast('입찰 금액을 입력해주세요'); return; }

  const btn = document.getElementById('bid-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

  try {
    await runTransaction(db, async (tx) => {
      const ref = doc(db, 'usedItems', itemId);
      const snap = await tx.get(ref);
      const d = snap.data();
      if (d.auctionStatus !== 'active') throw new Error('경매가 종료되었습니다');
      if (new Date() >= d.auctionEndAt.toDate()) throw new Error('경매가 종료되었습니다');
      if (uid === d.sellerId) throw new Error('내 상품에는 입찰할 수 없습니다');
      const minBid = d.auctionCurrentBid !== null
        ? d.auctionCurrentBid + d.auctionMinStep
        : d.auctionStartPrice;
      if (bidVal < minBid) throw new Error(`최소 ${fmtPrice(minBid)} 이상 입찰해야 합니다`);

      const nick = getNick(currentUser, currentUserDoc);
      const bidRef = doc(collection(db, 'usedItems', itemId, 'bids'));
      tx.set(bidRef, { bidderUid: uid, amount: bidVal, createdAt: serverTimestamp() });

      const updates = {
        auctionCurrentBid: bidVal,
        auctionHighestBidderUid: uid,
        auctionHighestBidderNick: nick,
        auctionBidCount: increment(1),
      };
      // 즉시구매가 도달 시 경매 종료
      if (d.auctionBuyNowPrice && bidVal >= d.auctionBuyNowPrice) {
        updates.auctionStatus = 'sold';
        updates.status = 'pending';
        updates.buyerId = uid;
        updates.buyerNick = nick;
        updates.auctionCurrentBid = d.auctionBuyNowPrice;
      }
      tx.update(ref, updates);
    });
    showToast('입찰 완료!');
    await loadItem();
  } catch(e) {
    showToast(e.message || '입찰 실패');
    if (btn) { btn.disabled = false; btn.textContent = '입찰하기'; }
  }
};

window.executeBuyNow = async function() {
  const uid = getUid(currentUser);
  if (!uid) { showToast('로그인이 필요합니다'); return; }
  if (!itemData?.auctionBuyNowPrice) return;
  if (!confirm(`${fmtPrice(itemData.auctionBuyNowPrice)}에 즉시구매 하시겠습니까?`)) return;
  document.querySelector('.buynow-btn').disabled = true;
  try {
    await runTransaction(db, async (tx) => {
      const ref = doc(db, 'usedItems', itemId);
      const snap = await tx.get(ref);
      const d = snap.data();
      if (d.auctionStatus !== 'active') throw new Error('경매가 이미 종료되었습니다');
      if (new Date() >= d.auctionEndAt.toDate()) throw new Error('경매가 종료되었습니다');
      if (uid === d.sellerId) throw new Error('내 상품에는 입찰할 수 없습니다');
      const nick = getNick(currentUser, currentUserDoc);
      const bidRef = doc(collection(db, 'usedItems', itemId, 'bids'));
      tx.set(bidRef, { bidderUid: uid, amount: d.auctionBuyNowPrice, createdAt: serverTimestamp() });
      tx.update(ref, {
        auctionStatus: 'sold', status: 'pending',
        auctionCurrentBid: d.auctionBuyNowPrice,
        auctionHighestBidderUid: uid, auctionHighestBidderNick: nick,
        auctionBidCount: increment(1),
        buyerId: uid, buyerNick: nick,
      });
    });
    showToast('즉시구매 완료! 입금 안내를 확인해주세요.');
    await loadItem();
  } catch(e) {
    showToast(e.message || '즉시구매 실패');
    const btn = document.querySelector('.buynow-btn');
    if (btn) btn.disabled = false;
  }
};

window.adminFinalize = async function() {
  if (!itemData) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { auctionStatus: 'ended', status: 'pending' });
    showToast('낙찰 확정 처리 완료');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

    ].filter(s => s.v !== status)
    .map(s => `<button class="action-btn btn-secondary" style="font-size:12px;padding:10px;" onclick="adminSetStatus('${s.v}')">${s.l} 변경</button>`).join('');
    html += `<div style="margin-top:10px;"><div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:6px;font-weight:700;">관리자 메뉴</div>${statusOptions}</div>`;
    if (data.buyerNick) {
      html += `<button class="action-btn btn-danger" style="font-size:12px;padding:10px;margin-top:4px;" onclick="adminCancelDeal()">거래 취소 (판매중으로 초기화)</button>`;
    }
  }

  area.innerHTML = html;
  bar.innerHTML = barHtml;
}

window.openBuyModal = function() {
  document.getElementById('modal-account-num').textContent = SHARED_ACCOUNT;
  document.getElementById('modal-price').textContent = fmtPrice(itemData.price);
  const modal = document.getElementById('buy-modal');
  modal.style.display = 'flex';
  requestAnimationFrame(() => modal.classList.add('open'));
};
window.closeBuyModal = function() {
  const modal = document.getElementById('buy-modal');
  modal.classList.remove('open');
  setTimeout(() => { modal.style.display = 'none'; }, 300);
};
window.handleModalClick = function(e) {
  if (e.target === document.getElementById('buy-modal')) closeBuyModal();
};

window.confirmPurchase = async function() {
  const uid = getUid(currentUser);
  if (!uid || !itemId) return;
  const btn = document.querySelector('.modal-confirm-btn');
  btn.disabled = true; btn.textContent = '처리 중...';
  try {
    const nick = getNick(currentUser, currentUserDoc) || '구매자';
    await updateDoc(doc(db, 'usedItems', itemId), {
      status: 'pending',
      buyerId: uid,
      buyerNick: nick
    });
    closeBuyModal();
    showToast('구매 신청 완료! 입금 확인 후 연락드립니다.');
    await loadItem();
  } catch(e) {
    showToast('오류: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '입금 완료 후 구매 신청';
  }
};

window.adminConfirm = async function() {
  if (!itemId) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { status: 'confirmed' });
    showToast('입금 확인 완료');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

window.sellerShip = async function() {
  if (!itemId) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { status: 'shipped' });
    showToast('발송 완료 처리되었습니다');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

window.buyerReceive = async function() {
  if (!itemId) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { status: 'done' });
    showToast('수령 확인 완료! 판매자에게 정산이 진행됩니다.');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

window.adminSetStatus = async function(status) {
  if (!itemId) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { status });
    showToast('상태 변경 완료');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

window.adminCancelDeal = async function() {
  if (!itemId) return;
  try {
    await updateDoc(doc(db, 'usedItems', itemId), { status: 'sale', buyerId: null, buyerNick: null });
    showToast('거래 취소 완료');
    await loadItem();
  } catch(e) { showToast('오류: ' + e.message); }
};

window.deleteItem = async function() {
  if (!itemId) return;
  if (!confirm('상품을 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'usedItems', itemId));
    showToast('삭제되었습니다');
    setTimeout(() => history.back(), 800);
  } catch(e) { showToast('오류: ' + e.message); }
};

// 댓글
window.submitComment = async function() {
  const uid = getUid(currentUser);
  if (!isLoggedIn(currentUser)) { showToast('로그인이 필요합니다'); return; }
  const input = document.getElementById('comment-input');
  const text = input?.value?.trim();
  if (!text) return;
  input.value = '';
  try {
    const nick = getNick(currentUser, currentUserDoc);
    await addDoc(collection(db, 'usedItems', itemId, 'comments'), {
      authorId: uid,
      authorNick: nick,
      text,
      createdAt: serverTimestamp()
    });
    await loadComments(true);
  } catch(e) { showToast('오류: ' + e.message); }
};

window.deleteComment = async function(commentId) {
  try {
    await deleteDoc(doc(db, 'usedItems', itemId, 'comments', commentId));
    await loadComments(true);
  } catch(e) { showToast('오류: ' + e.message); }
};

async function loadComments(reRender) {
  const q = query(collection(db, 'usedItems', itemId, 'comments'), orderBy('createdAt', 'asc'));
  const snap = await getDocs(q);
  const comments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  if (reRender && itemData) renderPage(itemData, comments);
  return comments;
}

async function loadItem() {
  if (!itemId) {
    document.getElementById('content').innerHTML = '<div style="padding:40px 20px;text-align:center;color:rgba(255,255,255,0.4);">상품을 찾을 수 없습니다</div>';
    document.getElementById('loading-overlay').classList.add('hidden');
    return;
  }
  try {
    const [snap, comments] = await Promise.all([
      getDoc(doc(db, 'usedItems', itemId)),
      loadComments(false)
    ]);
    if (!snap.exists()) {
      document.getElementById('content').innerHTML = '<div style="padding:40px 20px;text-align:center;color:rgba(255,255,255,0.4);">삭제된 상품입니다</div>';
      return;
    }
    itemData = snap.data();

    // 뷰 카운트 증가 (비동기)
    updateDoc(doc(db, 'usedItems', itemId), { viewCount: increment(1) }).catch(() => {});

    // 경매 만료 자동 처리
    if (itemData.isAuction && itemData.auctionStatus === 'active') {
      const endAt = itemData.auctionEndAt?.toDate?.();
      if (endAt && new Date() >= endAt) {
        const newStatus = itemData.auctionBidCount > 0 ? 'ended' : 'cancelled';
        updateDoc(doc(db, 'usedItems', itemId), { auctionStatus: newStatus }).catch(() => {});
        itemData.auctionStatus = newStatus;
      }
    }

    // 삭제 버튼 표시 (관리자 또는 판매자)
    const isAdmin = currentUser?.email === ADMIN_EMAIL || currentUserDoc?.email === ADMIN_EMAIL;
    const isSeller = getUid(currentUser) === itemData.sellerId;
    if (isAdmin || isSeller) document.getElementById('del-btn').style.display = 'block';

    renderPage(itemData, comments);
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML = '<div style="padding:40px 20px;text-align:center;color:rgba(255,255,255,0.4);">불러오기 실패</div>';
  }
}

onAuthStateChanged(auth, async user => {
  currentUser = user;
  const uid = getUid(user);
  if (uid) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) currentUserDoc = snap.data();
    } catch(e) {}
  }
  await loadItem();
  document.getElementById('loading-overlay').classList.add('hidden');
});
</script>
