<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --border: rgba(62,160,102,0.18);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 768px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(62,160,102,0.3);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar {
      flex-shrink: 0; padding: 32px 18px 10px;
      display: flex; align-items: center; gap: 8px;
    }
    #btn-back {
      background: none; border: none; cursor: pointer; padding: 4px 8px 4px 0;
      color: var(--green-light); font-size: 20px; line-height: 1;
    }
    .appbar-title { font-size: 16px; font-weight: 900; }

    /* 스크롤 */
    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 8px 0 32px; }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 프로필 카드 */
    .profile-card {
      margin: 0 16px 24px;
      background: rgba(62,160,102,0.1);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .profile-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(62,160,102,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-nick { font-size: 17px; font-weight: 900; margin-bottom: 4px; }
    .profile-sub { font-size: 12px; color: rgba(255,255,255,0.5); }

    /* 섹션 */
    .section { margin-bottom: 8px; }
    .section-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em; padding: 0 16px; margin-bottom: 4px;
    }

    /* 메뉴 아이템 */
    .menu-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .menu-item:active { background: rgba(62,160,102,0.08); }
    .menu-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(62,160,102,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-icon svg { color: var(--green-light); }
    .menu-text { flex: 1; font-size: 14px; font-weight: 600; }
    .menu-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .menu-arrow { color: rgba(255,255,255,0.25); font-size: 16px; }
    .menu-badge {
      font-size: 11px; font-weight: 700; color: var(--green-light);
      background: rgba(62,160,102,0.15); border-radius: 10px; padding: 2px 8px;
    }

    /* 구분선 */
    .divider { height: 1px; background: var(--border); margin: 0 16px; }

    /* 로그아웃 */
    .logout-item { color: #ff6b6b; }
    .logout-item .menu-icon { background: rgba(255,107,107,0.12); }
    .logout-item .menu-icon svg { color: #ff6b6b; }

    /* 모달 */
    .modal-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      width: 100%; background: #0f2e1a;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      max-height: 80%;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 16px; font-weight: 900; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-close {
      background: none; border: none; color: rgba(255,255,255,0.4);
      font-size: 20px; cursor: pointer; line-height: 1; padding: 0;
    }
    .field-group { margin-bottom: 16px; }
    .field-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .field-input {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; color: #fff; font-size: 14px; font-family: inherit;
      outline: none;
    }
    .field-input:focus { border-color: var(--green-light); }
    .btn-primary {
      width: 100%; padding: 14px; border-radius: 12px;
      background: var(--green-light); color: #fff;
      font-size: 15px; font-weight: 700; border: none;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    .btn-primary:active { opacity: 0.85; }

    /* 조인 내역 */
    .join-item {
      background: rgba(62,160,102,0.07);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    }
    .join-item-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .join-item-meta { font-size: 12px; color: rgba(255,255,255,0.5); }
    .join-item-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 8px; margin-bottom: 6px;
    }
    .badge-host { background: rgba(240,192,64,0.2); color: #f0c040; }
    .badge-join { background: rgba(62,160,102,0.2); color: var(--green-light); }

    /* 공지사항 */
    .notice-item {
      background: rgba(62,160,102,0.07);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    }
    .notice-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .notice-date { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
    .notice-body { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.6; }
    .notice-delete {
      background: none; border: none; color: rgba(255,100,100,0.6);
      font-size: 11px; cursor: pointer; font-family: inherit; margin-top: 8px; padding: 0;
    }

    /* 토스트 */
    #toast {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.95); color: #fff;
      padding: 10px 20px; border-radius: 20px; font-size: 13px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 300;
    }
    #toast.show { opacity: 1; }

    .empty-msg { text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; padding: 32px 0; }
    .hidden { display: none !important; }
  </style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, query, serverTimestamp, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = {};
let allJoins = [];
let notices = [];
const ADMIN_EMAIL = 'wlfmzhs@naver.com';

// ── Auth ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  const [userSnap, joinsSnap, noticesSnap] = await Promise.all([
    getDoc(doc(db, 'users', user.uid)),
    getDocs(collection(db, 'joins')),
    getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc'))),
  ]);

  if (userSnap.exists()) {
    userData = userSnap.data();
    document.getElementById('prof-nick').textContent = userData.nickname || '';
    const sub = [userData.name, userData.handicap != null ? `핸디 ${userData.handicap}` : '', userData.region].filter(Boolean).join(' · ');
    document.getElementById('prof-sub').textContent = sub;
  }

  allJoins = joinsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  notices = noticesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  const unread = notices.length;
  if (unread > 0) document.getElementById('notice-count-label').textContent = `${unread}개의 공지`;

  if (user.email === ADMIN_EMAIL) {
    document.getElementById('admin-section').classList.remove('hidden');
  }

  document.getElementById('loading-overlay').classList.add('hidden');
});

// ── 뒤로가기 ──────────────────────────────────────────
document.getElementById('btn-back').addEventListener('click', () => history.back());

// ── 로그아웃 ──────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'index.html';
});

// ── 모달 ─────────────────────────────────────────────
window.closeModal = (id) => document.getElementById(id).classList.remove('show');

window.openEditModal = () => {
  document.getElementById('edit-nick').value = userData.nickname || '';
  document.getElementById('edit-handicap').value = userData.handicap ?? '';
  document.getElementById('edit-region').value = userData.region || '';
  document.getElementById('edit-phone').value = userData.phone || '';
  document.getElementById('modal-edit').classList.add('show');
};

window.saveEdit = async () => {
  const nick = document.getElementById('edit-nick').value.trim();
  const handicap = document.getElementById('edit-handicap').value;
  const region = document.getElementById('edit-region').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  if (!nick) { showToast('닉네임을 입력해주세요'); return; }
  try {
    const updates = { nickname: nick, region, phone };
    if (handicap !== '') updates.handicap = Number(handicap);
    await updateDoc(doc(db, 'users', currentUser.uid), updates);
    userData = { ...userData, ...updates };
    document.getElementById('prof-nick').textContent = nick;
    const sub = [userData.name, updates.handicap != null ? `핸디 ${updates.handicap}` : '', region].filter(Boolean).join(' · ');
    document.getElementById('prof-sub').textContent = sub;
    closeModal('modal-edit');
    showToast('저장되었습니다');
  } catch (e) { showToast('저장 실패: ' + e.message); }
};

window.openPwModal = () => {
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  document.getElementById('modal-pw').classList.add('show');
};

window.savePw = async () => {
  const pw = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (pw.length < 6) { showToast('비밀번호는 6자 이상이어야 해요'); return; }
  if (pw !== confirm) { showToast('비밀번호가 일치하지 않아요'); return; }
  try {
    await updatePassword(currentUser, pw);
    closeModal('modal-pw');
    showToast('비밀번호가 변경되었습니다');
  } catch (e) {
    if (e.code === 'auth/requires-recent-login') {
      showToast('보안을 위해 재로그인 후 시도해주세요');
    } else {
      showToast('변경 실패: ' + e.message);
    }
  }
};

window.openJoinModal = () => {
  const myJoins = allJoins.filter(j => (j.participants || []).some(p => p.uid === currentUser.uid));
  const el = document.getElementById('join-list-content');
  if (myJoins.length === 0) {
    el.innerHTML = '<div class="empty-msg">조인 내역이 없습니다</div>';
  } else {
    el.innerHTML = myJoins.sort((a, b) => (b.date || '').localeCompare(a.date || '')).map(j => {
      const isHost = (j.participants || [])[0]?.uid === currentUser.uid;
      const type = j.joinType === 'screen' ? '스크린' : '필드';
      return `<div class="join-item">
        <div class="join-item-badge ${isHost ? 'badge-host' : 'badge-join'}">${isHost ? '주최' : '참여'}</div>
        <div class="join-item-title">${j.course} ${type}</div>
        <div class="join-item-meta">${j.date} · ${j.time} · ${(j.participants||[]).length}/${j.capacity}명</div>
      </div>`;
    }).join('');
  }
  document.getElementById('modal-join').classList.add('show');
};

window.openNoticeModal = () => {
  renderNotices(false);
  document.getElementById('modal-notice').classList.add('show');
};

window.openNoticeWriteModal = () => {
  document.getElementById('notice-title-input').value = '';
  document.getElementById('notice-body-input').value = '';
  document.getElementById('modal-notice-write').classList.add('show');
};

window.saveNotice = async () => {
  const title = document.getElementById('notice-title-input').value.trim();
  const body = document.getElementById('notice-body-input').value.trim();
  if (!title || !body) { showToast('제목과 내용을 입력해주세요'); return; }
  try {
    const ref = await addDoc(collection(db, 'notices'), { title, body, createdAt: serverTimestamp() });
    const newNotice = { id: ref.id, title, body, createdAt: new Date() };
    notices.unshift(newNotice);
    closeModal('modal-notice-write');
    showToast('공지가 등록되었습니다');
  } catch (e) { showToast('등록 실패: ' + e.message); }
};

function renderNotices(isAdmin) {
  const el = document.getElementById('notice-list-content');
  if (notices.length === 0) {
    el.innerHTML = '<div class="empty-msg">공지사항이 없습니다</div>';
    return;
  }
  el.innerHTML = notices.map(n => {
    const date = n.createdAt?.toDate ? n.createdAt.toDate().toLocaleDateString('ko-KR') : '';
    const deleteBtn = (currentUser?.email === ADMIN_EMAIL)
      ? `<button class="notice-delete" onclick="deleteNotice('${n.id}')">삭제</button>` : '';
    return `<div class="notice-item">
      <div class="notice-title">${n.title}</div>
      <div class="notice-date">${date}</div>
      <div class="notice-body">${n.body.replace(/\n/g, '<br>')}</div>
      ${deleteBtn}
    </div>`;
  }).join('');
}

window.deleteNotice = async (id) => {
  try {
    await deleteDoc(doc(db, 'notices', id));
    notices = notices.filter(n => n.id !== id);
    renderNotices(true);
    showToast('삭제되었습니다');
  } catch (e) { showToast('삭제 실패'); }
};

// ── 토스트 ────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
