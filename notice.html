<head>

  <meta charset="UTF-8" />

  <meta name="theme-color" content="#2d7a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>공지사항 - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --border: rgba(62,160,102,0.15);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 768px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(62,160,102,0.3);
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .appbar {
      flex-shrink: 0; padding: 28px 18px 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .appbar-back {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.7); padding: 4px; line-height: 0;
    }
    .appbar-title { flex: 1; font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
    .appbar-write {
      background: none; border: none; cursor: pointer;
      color: var(--green-light); font-size: 13px; font-weight: 700;
      font-family: inherit; padding: 4px 6px; display: none;
    }
    .appbar-write.visible { display: block; }

    .divider { flex-shrink: 0; height: 1px; background: var(--border); }

    .content {
      flex: 1; overflow-y: auto; scrollbar-width: none;
      padding: 8px 0 32px;
    }
    .content::-webkit-scrollbar { display: none; }

    /* 공지 아이템 */
    .notice-item { border-bottom: 1px solid var(--border); }
    .notice-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px; cursor: pointer;
    }
    .notice-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green-light); flex-shrink: 0;
    }
    .notice-text { flex: 1; min-width: 0; }
    .notice-title {
      font-size: 14px; font-weight: 700; color: #f0ebe0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .notice-date { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; }
    .notice-chevron {
      font-size: 16px; color: rgba(255,255,255,0.3);
      transition: transform 0.2s; flex-shrink: 0;
    }
    .notice-item.open .notice-chevron { transform: rotate(90deg); }
    .notice-item.open .notice-dot { background: #fff; }

    .notice-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 18px;
    }
    .notice-item.open .notice-body { max-height: 800px; padding: 0 18px 14px; }
    .notice-body-inner {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px; line-height: 1.7;
      color: rgba(255,255,255,0.75);
      white-space: pre-wrap; word-break: break-word;
    }
    /* 관리자 버튼 */
    .admin-btns {
      display: none; gap: 8px;
      padding: 0 18px 14px;
    }
    .notice-item.open .admin-btns.visible { display: flex; }
    .admin-btn {
      flex: 1; padding: 9px 0; border-radius: 10px;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none;
    }
    .btn-edit { background: rgba(62,160,102,0.18); color: var(--green-light); }
    .btn-delete { background: rgba(220,60,60,0.15); color: #e06060; }

    .empty {
      padding: 60px 0; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.3);
    }

    /* 모달 */
    .modal-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 500;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; background: #0f2e1a;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
    }
    .modal-title {
      font-size: 16px; font-weight: 900;
      margin-bottom: 16px;
    }
    .modal input, .modal textarea {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(62,160,102,0.3);
      border-radius: 12px;
      color: #fff; font-size: 14px; font-family: inherit;
      padding: 12px 14px; outline: none;
      margin-bottom: 10px;
    }
    .modal textarea { resize: none; height: 140px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns button {
      flex: 1; padding: 14px 0; border-radius: 14px;
      font-size: 15px; font-weight: 900; font-family: inherit;
      cursor: pointer; border: none;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .btn-save { background: var(--green); color: #fff; }

    /* 토스트 */
    #toast {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,30,0.95); color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap; z-index: 600;
    }
  </style>
</head>
<body>
<div class="phone">
  <div id="loading-overlay"><div class="spinner"></div></div>

  <div class="appbar">
    <button class="appbar-back" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="appbar-title">공지사항</span>
    <button class="appbar-write" id="btn-write" onclick="openWrite()">+ 작성</button>
  </div>
  <div class="divider"></div>

  <div class="content">
    <div id="notice-list"><div class="empty">불러오는 중...</div></div>
  </div>

  <!-- 수정/작성 모달 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">공지 작성</div>
      <input type="text" id="modal-input-title" placeholder="제목" maxlength="100" />
      <textarea id="modal-input-content" placeholder="내용"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" onclick="saveNotice()">저장</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, query, orderBy, getDocs,
    addDoc, doc, updateDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const ADMIN_EMAIL = 'wlfmzhs@naver.com';

  const app = initializeApp({
    apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
    authDomain: "ggzon-b33cb.firebaseapp.com",
    projectId: "ggzon-b33cb",
    storageBucket: "ggzon-b33cb.firebasestorage.app",
    messagingSenderId: "774722580869",
    appId: "1:774722580869:web:5beecd26c0b76f753914ec"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  let isAdmin = false;
  let editingId = null;
  let notices = [];

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2500);
  }

  // 관리자 여부 체크
  onAuthStateChanged(auth, user => {
    isAdmin = !!(user && user.email === ADMIN_EMAIL);
    if (isAdmin) {
      document.getElementById('btn-write').classList.add('visible');
      document.querySelectorAll('.admin-btns').forEach(el => el.classList.add('visible'));
    }
  });

  async function load() {
    const el = document.getElementById('notice-list');
    try {
      const snap = await getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc')));
      document.getElementById('loading-overlay').classList.add('hidden');
      notices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (notices.length === 0) {
        el.innerHTML = '<div class="empty">등록된 공지사항이 없습니다</div>';
        return;
      }
      el.innerHTML = notices.map((n, i) => {
        const date = n.createdAt?.toDate
          ? n.createdAt.toDate().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
          : '';
        const content = n.content || n.body || '';
        return `<div class="notice-item" id="ni-${i}">
          <div class="notice-header" onclick="toggle(${i})">
            <div class="notice-dot"></div>
            <div class="notice-text">
              <div class="notice-title">${n.title || '(제목 없음)'}</div>
              <div class="notice-date">${date}</div>
            </div>
            <div class="notice-chevron">›</div>
          </div>
          <div class="notice-body">
            <div class="notice-body-inner">${content || '내용이 없습니다.'}</div>
          </div>
          <div class="admin-btns${isAdmin ? ' visible' : ''}">
            <button class="admin-btn btn-edit" onclick="openEdit(${i})">수정</button>
            <button class="admin-btn btn-delete" onclick="deleteNotice(${i})">삭제</button>
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      document.getElementById('loading-overlay').classList.add('hidden');
      el.innerHTML = '<div class="empty">불러오기 실패</div>';
    }
  }

  window.toggle = function(i) {
    document.getElementById('ni-' + i).classList.toggle('open');
  };

  window.openWrite = function() {
    editingId = null;
    document.getElementById('modal-title').textContent = '공지 작성';
    document.getElementById('modal-input-title').value = '';
    document.getElementById('modal-input-content').value = '';
    document.getElementById('modal').classList.add('open');
  };

  window.openEdit = function(i) {
    const n = notices[i];
    editingId = n.id;
    document.getElementById('modal-title').textContent = '공지 수정';
    document.getElementById('modal-input-title').value = n.title || '';
    document.getElementById('modal-input-content').value = n.content || n.body || '';
    document.getElementById('modal').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modal').classList.remove('open');
  };

  window.saveNotice = async function() {
    const title = document.getElementById('modal-input-title').value.trim();
    const content = document.getElementById('modal-input-content').value.trim();
    if (!title) { toast('제목을 입력해주세요'); return; }

    try {
      if (editingId) {
        await updateDoc(doc(db, 'notices', editingId), { title, content });
        toast('수정했습니다');
      } else {
        await addDoc(collection(db, 'notices'), { title, content, createdAt: serverTimestamp() });
        toast('등록했습니다');
      }
      closeModal();
      load();
    } catch (e) {
      toast('저장 실패');
    }
  };

  window.deleteNotice = async function(i) {
    const n = notices[i];
    if (!confirm(`"${n.title || '공지'}"을 삭제할까요?`)) return;
    try {
      await deleteDoc(doc(db, 'notices', n.id));
      toast('삭제했습니다');
      load();
    } catch (e) {
      toast('삭제 실패');
    }
  };

  load();
</script>
</body>
</html>
