<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3차 흑백대전 전원 stats 재집계</title>
  <style>
    * { box-sizing: border-box; }
    body { background: #0a2406; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
    h2 { font-size: 18px; margin-bottom: 4px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .log { background: #000; border-radius: 10px; padding: 14px; font-size: 11px; font-family: monospace; min-height: 200px; white-space: pre-wrap; color: #3ea066; margin-bottom: 14px; max-height: 500px; overflow-y: auto; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 800; border: none; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
    .btn-run { background: #3ea066; color: #fff; }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
    .success { color: #3ea066; }
    .error   { color: #e74c3c; }
    .info    { color: #f0c040; }
    .dim     { color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <h2>3차 흑백대전 전원 stats 재집계</h2>
  <p class="sub">39명 전원 roundCount / handicap 일괄 처리</p>
  <div id="log" class="log">대기 중...</div>
  <button class="btn btn-run" id="btn-run" onclick="runFix()">전원 재집계 실행</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);

let logEl;
function log(msg, cls = '') {
  if (!logEl) logEl = document.getElementById('log');
  logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

onAuthStateChanged(auth, user => {
  if (!user || user.email !== 'wlfmzhs@naver.com') {
    log('관리자 계정으로 로그인 후 실행하세요.', 'error');
    document.getElementById('btn-run').disabled = true;
  } else {
    log(`로그인 확인: ${user.email}`, 'success');
  }
});

window.runFix = async function() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '처리 중...';
  logEl = document.getElementById('log');
  logEl.innerHTML = '';

  try {
    // ── 3차 흑백대전 탐색 ─────────────────────────────
    log('3차 흑백대전 탐색 중...', 'info');
    const tournsSnap = await getDocs(collection(db, 'tournaments'));
    const bwList = tournsSnap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(t => (t.name || '').includes('흑백대전'))
      .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));

    if (!bwList.length) { log('흑백대전 대회를 찾을 수 없습니다.', 'error'); btn.disabled = false; btn.textContent = '다시 시도'; return; }
    const tourn = bwList[0];
    log(`대회: ${tourn.name} / ${tourn.date} / ID: ${tourn.id}`, 'success');

    // ── 39명 스코어 제출 목록 ─────────────────────────
    const scoresSnap = await getDocs(collection(db, 'tournaments', tourn.id, 'scores'));
    log(`제출자 수: ${scoresSnap.docs.length}명\n`, 'info');

    const par = tourn.coursePar || 72;
    let ok = 0, skipped = 0, failed = 0;

    for (const scoreDoc of scoresSnap.docs) {
      const uid  = scoreDoc.id;
      const data = scoreDoc.data();
      const name = data.name || uid.slice(0, 10);
      const totalStrokes = data.totalStrokes || 0;
      const totalScore   = totalStrokes - par;

      try {
        // 1. scoreHistory 확인 — 없으면 생성
        const histRef  = doc(db, 'users', uid, 'scoreHistory', tourn.id);
        const histSnap = await getDoc(histRef);
        if (!histSnap.exists()) {
          await setDoc(histRef, {
            course: tourn.golfCourseName || tourn.name || '',
            date: tourn.date || '',
            totalScore,
            totalStrokes,
            holes: [], parHoles: [], companions: [],
            type: 'tournament',
            tournamentName: tourn.name || '',
            submittedAt: serverTimestamp(),
          });
          log(`  [추가] ${name}: scoreHistory 생성 (${totalScore > 0 ? '+' : ''}${totalScore})`, 'info');
        }

        // 2. 전체 scoreHistory 기반 stats 재집계
        const allHistSnap = await getDocs(
          query(collection(db, 'users', uid, 'scoreHistory'), orderBy('submittedAt', 'desc'))
        );
        const allScores = allHistSnap.docs.map(d => d.data().totalScore ?? 0);
        const recent10  = allScores.slice(0, 10);
        const recent3   = allScores.slice(0, 3);
        const prev3     = allScores.slice(3, 6);
        const handicap  = recent10.length
          ? Math.round(recent10.reduce((a, b) => a + b, 0) / recent10.length * 10) / 10 : null;
        const handicapTrend = (recent3.length === 3 && prev3.length === 3)
          ? Math.round((recent3.reduce((a, b) => a + b, 0) / 3 - prev3.reduce((a, b) => a + b, 0) / 3) * 10) / 10 : null;
        const roundCount = allScores.length;
        const bestScore  = allScores.length ? Math.min(...allScores) : null;
        const hLabel     = handicap === null ? 'null' : (handicap > 0 ? '+' + handicap : String(handicap));

        // setDoc merge:true — users 문서 없어도 생성
        await setDoc(doc(db, 'users', uid), {
          handicap, bestScore, roundCount, handicapTrend,
          statsUpdatedAt: serverTimestamp(),
          ...(data.name ? { name: data.name } : {}),
        }, { merge: true });

        log(`  [OK] ${name}: ${roundCount}R / 핸디 ${hLabel}`, 'success');
        ok++;
      } catch(e) {
        log(`  [실패] ${name}: ${e.message}`, 'error');
        failed++;
      }
    }

    log(`\n완료: 성공 ${ok}명 / 실패 ${failed}명`, ok === scoresSnap.docs.length ? 'success' : 'info');
    log('이 파일을 삭제해 주세요: fix-bw3-once.html', 'dim');
    btn.textContent = '처리 완료';

  } catch(e) {
    log('오류: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '다시 시도';
  }
};
</script>
</body>
</html>
