<html lang="ko">
<head>

  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2d7a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GGZON" />
  <link rel="apple-touch-icon" href="/image/icon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>라운드 결과 — GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a1f0a; --bg2: #0f2a0f;
      --orange: #e84c1e; --gold: #f0c040;
      --green: #2d7a4f; --green-light: #3ea066;
      --white: #ffffff;
    }
    html, body {
      width: 100%; min-height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #fff;
    }
    body { display: flex; align-items: flex-start; justify-content: center; padding: 24px; }
    .phone-frame {
      width: 390px; background: var(--bg);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      overflow: hidden; position: relative; min-height: 600px;
    }
    .phone-frame::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 10;
    }

    /* 로딩 */
    .loading-wrap { display: flex; align-items: center; justify-content: center; padding: 120px 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 헤더 */
    .hero {
      background: var(--bg); padding: 52px 28px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top right, rgba(46,160,102,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600;
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .back-btn:active { color: rgba(255,255,255,0.7); }
    .date-badge {
      font-size: 12px; font-weight: 800; color: var(--green-light);
      background: rgba(62,160,102,0.15); border: 1px solid rgba(62,160,102,0.3);
      border-radius: 20px; padding: 4px 12px;
    }
    .hero-title { font-size: 26px; font-weight: 900; line-height: 1.1; color: var(--white); margin-bottom: 18px; }
    .hero-stats { display: flex; gap: 16px; }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .stat-value { font-size: 20px; font-weight: 900; color: var(--white); }
    .stat-value.green { color: var(--green-light); }
    .stat-divider { width: 1px; background: rgba(255,255,255,0.1); }

    /* 스코어보드 */
    .scoreboard { padding: 22px 20px 48px; }
    .section-label {
      font-size: 11px; font-weight: 800; color: var(--green-light);
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 12px; padding-left: 4px;
    }
    .score-header {
      display: grid; grid-template-columns: 36px 1fr 56px;
      gap: 0 8px; padding: 8px 12px;
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px; text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 4px;
    }
    .score-row {
      display: grid; grid-template-columns: 36px 1fr 56px;
      gap: 0 8px; padding: 11px 12px;
      border-radius: 10px; align-items: center;
    }
    .score-row.top3 { background: rgba(62,160,102,0.08); }
    .score-row.top3:first-child { background: rgba(62,160,102,0.14); }
    .rank { font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.3); text-align: center; }
    .rank.gold { color: var(--gold); font-size: 15px; }
    .rank.silver { color: #c0c0c0; font-size: 14px; }
    .rank.bronze { color: #cd7f32; font-size: 14px; }
    .player-name { font-size: 15px; font-weight: 700; color: var(--white); }
    .score { font-size: 15px; font-weight: 800; text-align: right; }
    .score.under { color: #e84c1e; }
    .score.even { color: #7dd87d; }
    .score.over { color: rgba(255,255,255,0.7); }

    .avg-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 20px; padding: 16px;
      background: rgba(62,160,102,0.1); border: 1px solid rgba(62,160,102,0.25);
      border-radius: 14px;
    }
    .avg-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); }
    .avg-value { font-size: 22px; font-weight: 900; color: var(--green-light); }

    .no-score {
      text-align: center; padding: 40px 20px;
      color: rgba(255,255,255,0.3); font-size: 13px; line-height: 1.8;
    }

    @media (max-width: 480px) {
      html, body { background: var(--bg); padding: 0; }
      body { align-items: flex-start; }
      .phone-frame { width: 100%; border-radius: 0; box-shadow: none; min-height: 100vh; }
      .phone-frame::before { display: none; }
    }
  </style>
</head>
<body>
<div class="phone-frame">
  <div id="app">
    <div class="loading-wrap">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="animation:spin 1s linear infinite">
        <circle cx="20" cy="20" r="16" stroke="rgba(62,160,102,0.2)" stroke-width="4"/>
        <path d="M20 4a16 16 0 0 1 16 16" stroke="#3ea066" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const db = getFirestore(app);

const joinId = new URLSearchParams(location.search).get('id');
if (!joinId) { document.getElementById('app').innerHTML = '<div class="loading-wrap" style="color:rgba(255,255,255,0.4);font-size:13px;">잘못된 접근입니다</div>'; }

const rankClass = r => r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : '';
const scoreClass = s => s < 0 ? 'under' : s === 0 ? 'even' : 'over';
const scoreText = s => s < 0 ? String(s) : s === 0 ? 'E' : '+' + s;

async function load() {
  try {
    // 조인 데이터 조회
    const joinSnap = await getDoc(doc(db, 'joins', joinId));
    if (!joinSnap.exists()) throw new Error('라운드를 찾을 수 없습니다');
    const j = joinSnap.data();

    const participants = j.participants || [];
    const scores = j.scores || {};

    // 코스 파 데이터 조회
    let totalPar = null;
    if (j.course && j.frontCourse && j.backCourse) {
      try {
        const courseSnap = await getDoc(doc(db, 'courses', j.course));
        if (courseSnap.exists()) {
          const nineHoles = courseSnap.data().nineHoles || {};
          const frontPar = nineHoles[j.frontCourse] || [];
          const backPar  = nineHoles[j.backCourse]  || [];
          const front = frontPar.reduce((s, v) => s + (Number(v) || 0), 0);
          const back  = backPar.reduce((s, v)  => s + (Number(v) || 0), 0);
          if (front > 0 && back > 0) totalPar = front + back;
        }
      } catch (_) {}
    }

    // 참가자별 스코어 계산
    const results = participants.map(p => {
      const uid = p.uid;
      const holes = scores[uid]?.holes || [];
      const totalStrokes = holes.reduce((s, v) => s + (Number(v) || 0), 0);
      const hasScore = holes.some(v => Number(v) > 0);
      return { uid, name: p.name, totalStrokes, hasScore };
    }).filter(r => r.hasScore);

    // 파 대비 또는 총타수로 정렬
    results.sort((a, b) => a.totalStrokes - b.totalStrokes);

    // 순위 부여 (동타 동순위)
    let rank = 1;
    results.forEach((r, i) => {
      if (i > 0 && r.totalStrokes === results[i - 1].totalStrokes) {
        r.rank = results[i - 1].rank;
      } else {
        r.rank = rank;
      }
      rank++;
      r.relScore = totalPar !== null ? r.totalStrokes - totalPar : null;
    });

    // 통계
    const winner = results.length > 0 ? results[0].name : '-';
    const avgStrokes = results.length > 0
      ? Math.round(results.reduce((s, r) => s + r.totalStrokes, 0) / results.length)
      : null;
    const avgDisplay = avgStrokes !== null
      ? (totalPar !== null ? scoreText(avgStrokes - totalPar) : String(avgStrokes))
      : '-';

    // 렌더
    document.getElementById('app').innerHTML = `
      <div class="hero">
        <div class="hero-top">
          <button class="back-btn" onclick="history.back()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            지난 라운드
          </button>
          <span class="date-badge">${j.date || ''}</span>
        </div>
        <div class="hero-title">${j.course}</div>
        <div class="hero-stats">
          <div class="stat-item">
            <div class="stat-label">참가자</div>
            <div class="stat-value">${participants.length}명</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">평균 타수</div>
            <div class="stat-value green">${avgDisplay}</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">우승</div>
            <div class="stat-value">${winner}</div>
          </div>
        </div>
      </div>
      <div class="scoreboard">
        <div class="section-label">스코어보드</div>
        <div class="score-header">
          <div>순위</div>
          <div>선수</div>
          <div style="text-align:right">${totalPar !== null ? '타수' : '총타'}</div>
        </div>
        <div id="scoreList"></div>
        ${results.length === 0 ? '<div class="no-score">아직 스코어를 입력한 참가자가 없습니다.<br>스코어 입력 후 결과가 표시됩니다.</div>' : ''}
        ${avgStrokes !== null ? `
        <div class="avg-row">
          <div class="avg-label">전체 평균 타수</div>
          <div class="avg-value">${avgDisplay}</div>
        </div>` : ''}
      </div>
    `;

    const list = document.getElementById('scoreList');
    let prevRank = null;
    results.forEach(r => {
      const display = r.relScore !== null ? scoreText(r.relScore) : String(r.totalStrokes);
      const cls = r.relScore !== null ? scoreClass(r.relScore) : 'over';
      const rankDisplay = r.rank === prevRank ? '' : r.rank;
      const row = document.createElement('div');
      row.className = 'score-row' + (r.rank <= 3 ? ' top3' : '');
      row.innerHTML = `
        <div class="rank ${rankClass(r.rank)}">${rankDisplay}</div>
        <div class="player-name">${r.name}</div>
        <div class="score ${cls}">${display}</div>
      `;
      list.appendChild(row);
      prevRank = r.rank;
    });

  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="loading-wrap" style="flex-direction:column;gap:10px;color:rgba(255,255,255,0.4);font-size:13px;text-align:center;">불러오기 실패<br><span style="font-size:11px;color:rgba(255,100,100,0.7)">${e.message}</span></div>`;
  }
}

load();
</script>
</body>
</html>
