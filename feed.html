  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --green: #2d7a4f; --green-light: #3ea066; --green-dark: #0A2406; --border: rgba(62,160,102,0.15); }
    html, body { width: 100%; height: 100%; background: #1a1a1a; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: #fff; }
    body { display: flex; align-items: center; justify-content: center; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    .appbar {
      flex-shrink: 0; padding: 36px 18px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative;
    }
    .appbar-title { font-size: 17px; font-weight: 900; color: #fff; position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .appbar-back {
      background: none; border: none; color: var(--green-light);
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; padding: 4px;
    }
    .appbar-cam {
      background: none; border: none; color: rgba(255,255,255,0.6);
      cursor: pointer; padding: 5px; line-height: 0;
    }
    .content { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 14px 0 28px; }
    .content::-webkit-scrollbar { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-card {
      margin: 0 16px 18px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      background: var(--green-dark);
      border: 3px solid var(--green-dark);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }
    .feed-card:active { transform: translateZ(0) scale(0.98); box-shadow: 0 3px 12px rgba(0,0,0,0.3); }

    .feed-img-wrap { position: relative; width: 100%; }
    .feed-photo { width: 100%; display: block; aspect-ratio: 4/5; object-fit: cover; vertical-align: bottom; }

    .feed-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.52) 0%, transparent 45%);
      display: flex; align-items: flex-start;
      padding: 14px 14px 0;
    }
    .feed-nick { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: -0.2px; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .feed-date { font-size: 11px; color: rgba(255,255,255,0.72); margin-top: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

    .feed-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px 16px;
      display: flex; align-items: center;
      font-size: 13px; color: #fff; line-height: 1.6; font-weight: 600;
      background: rgba(0, 168, 107, 0.60);
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }
    .feed-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); font-size: 14px; }

    .card-bottom { padding: 4px 0 0; }
    .comment-btn { width: 100%; background: none; border: none; color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; padding: 10px 14px 8px; }
    .comment-btn svg, .comment-btn span { pointer-events: none; }
    .comment-section { padding: 0 14px 0; display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
    .comment-section.open { grid-template-rows: 1fr; }
    .comment-section-inner { min-height: 0; padding-bottom: 14px; }
    .comment-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.06); }

    @keyframes balloonFloat {
      0%   { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.8); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(-14px) scale(1); }
      70%  { opacity: 1; transform: translateX(-50%) translateY(-70px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-130px) scale(0.9); }
    }
    .comment-balloon {
      position: fixed;
      background: rgba(45,122,79,0.95); color: #fff; border-radius: 20px;
      padding: 9px 18px 11px; font-size: 13px; font-weight: 700;
      max-width: 72%; text-align: center; pointer-events: none; z-index: 9999;
      word-break: break-all; line-height: 1.4; box-shadow: 0 6px 24px rgba(0,0,0,0.45);
      animation: balloonFloat 2.2s ease forwards;
      white-space: pre-wrap;
    }
    .comment-balloon::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-width: 9px 7px 0; border-style: solid;
      border-color: rgba(45,122,79,0.95) transparent transparent;
    }
    .comment-nick { font-size: 12px; font-weight: 800; color: var(--green-light); white-space: nowrap; min-width: 48px; }
    .comment-text { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.5; flex: 1; word-break: break-all; }
    .comment-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .comment-time { font-size: 10px; color: rgba(255,255,255,0.28); white-space: nowrap; }
    .comment-del { background: none; border: none; color: rgba(255,80,80,0.45); font-size: 10px; cursor: pointer; font-family: inherit; padding: 0; line-height: 1; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(62,160,102,0.25); border-radius: 10px; color: #fff; font-size: 13px; font-family: inherit; padding: 9px 12px; outline: none; }
    .comment-input::placeholder { color: rgba(255,255,255,0.22); }
    .comment-input:focus { border-color: rgba(62,160,102,0.55); }
    .comment-submit { background: var(--green); border: none; border-radius: 10px; color: #fff; font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit; padding: 0 14px; white-space: nowrap; }

    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center; z-index: 50; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
  </style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { initializeFirestore, persistentLocalCache, persistentSingleTabManager, collection, query, orderBy, limit, getDocs, addDoc, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const CLOUDINARY_CLOUD = 'da9tzfmg0';
const CLOUDINARY_PRESET = 'GG ZON';

const app = initializeApp({
  apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
  authDomain: "ggzon-b33cb.firebaseapp.com",
  projectId: "ggzon-b33cb",
  storageBucket: "ggzon-b33cb.firebasestorage.app",
  messagingSenderId: "774722580869",
  appId: "1:774722580869:web:5beecd26c0b76f753914ec"
});
const auth = getAuth(app);
const db = initializeFirestore(app, {
  localCache: persistentLocalCache({ tabManager: persistentSingleTabManager() })
});

// 로그인 확인 (카카오 OR 관리자)
const ggzonUser = JSON.parse(localStorage.getItem('ggzon_user') || 'null');
let currentUid = ggzonUser?.uid || null;
let isAdmin = false;

if (!ggzonUser) {
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUid = user.uid;
    isAdmin = user.email === 'wlfmzhs@naver.com';
  });
} else {
  onAuthStateChanged(auth, (user) => {
    if (user && user.email === 'wlfmzhs@naver.com') isAdmin = true;
  });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function showFeedNow() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

async function loadFeed() {
  const el = document.getElementById('feed-list');
  try {
    const snap = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(20)));
    if (snap.empty) {
      showFeedNow();
      el.innerHTML = '<div class="feed-empty">아직 올라온 사진이 없습니다.<br>첫 번째 사진을 올려보세요!</div>';
      return;
    }
    el.innerHTML = snap.docs.map((d) => {
      const p = d.data();
      const canDelete = (currentUid && currentUid === p.uid) || isAdmin;
      const delBtn = canDelete
        ? `<button onclick="deletePost('${d.id}')" style="background:rgba(0,0,0,0.35);border:none;color:#fff;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;padding:0 12px;height:24px;line-height:24px;border-radius:20px;letter-spacing:0.2px;">삭제</button>`
        : '';
      return `<div class="feed-card" id="post-${d.id}">
        <div class="feed-img-wrap">
          <img class="feed-photo" src="${p.photoURL}" loading="eager" />
          <div class="feed-overlay">
            <div style="flex:1;">
              <div class="feed-nick">${p.nickname || '멤버'}</div>
              <div class="feed-date">${formatDate(p.createdAt)}</div>
            </div>
            ${delBtn}
          </div>
          ${p.caption ? `<div class="feed-caption">${p.caption}</div>` : ''}
        </div>
        <div class="card-bottom">
          <button class="comment-btn" data-postid="${d.id}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span id="ccount-${d.id}">댓글</span>
          </button>
        </div>
        <div class="comment-section open" id="comments-${d.id}">
          <div class="comment-section-inner">
            <div class="comment-list" id="clist-${d.id}"></div>
            <div class="comment-input-row">
              <input class="comment-input" id="cinput-${d.id}" type="text" placeholder="댓글을 입력하세요" maxlength="80" data-postid="${d.id}" />
              <button class="comment-submit" data-postid="${d.id}">등록</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    // 모든 포스트 댓글 자동 로드
    snap.docs.forEach(d => loadComments(d.id));

    // 댓글 버튼 직접 리스너 등록 (card-bottom 전체 영역)
    el.querySelectorAll('.card-bottom').forEach(bar => {
      bar.addEventListener('click', () => {
        const btn = bar.querySelector('.comment-btn');
        if (btn) toggleComments(btn.dataset.postid);
      });
    });
    el.querySelectorAll('.comment-submit').forEach(btn => {
      btn.addEventListener('click', () => submitComment(btn.dataset.postid));
    });
    el.querySelectorAll('.comment-input').forEach(input => {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submitComment(input.dataset.postid); });
    });

    // 모든 이미지가 로드될 때까지 오버레이 유지 후 한번에 표시
    const imgs = Array.from(el.querySelectorAll('.feed-photo'));
    let loaded = 0;
    let shown = false;
    const reveal = () => { if (!shown) { shown = true; showFeedNow(); } };
    // 최대 3초 타임아웃 (네트워크 느린 경우 대비)
    const timeout = setTimeout(reveal, 3000);
    imgs.forEach(img => {
      if (img.complete && img.naturalWidth > 0) {
        loaded++;
        if (loaded === imgs.length) { clearTimeout(timeout); reveal(); }
      } else {
        img.onload = img.onerror = () => {
          loaded++;
          if (loaded === imgs.length) { clearTimeout(timeout); reveal(); }
        };
      }
    });
    // 대시보드 그리드에서 특정 포스트로 진입 시 스크롤
    const targetId = new URLSearchParams(location.search).get('post');
    if (targetId) {
      const target = document.getElementById('post-' + targetId);
      if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
  } catch(e) {
    console.error('[GGLOG 로드 에러]', e);
    showFeedNow();
    el.innerHTML = `<div class="feed-empty" style="font-size:12px;word-break:break-all;">불러오기 실패<br><span style="color:rgba(255,100,100,0.8);font-size:11px;">${e.code || ''} ${e.message}</span></div>`;
  }
}

loadFeed();

// ── 댓글 ─────────────────────────────────────────────
const _commentLoaded = new Set();

function toggleComments(postId) {
  const section = document.getElementById('comments-' + postId);
  if (!section) return;
  const isOpen = section.classList.contains('open');
  section.classList.toggle('open');
  if (!isOpen) {
    if (!_commentLoaded.has(postId)) loadComments(postId);
    const input = document.getElementById('cinput-' + postId);
    if (input) setTimeout(() => input.focus(), 320);
  }
}

function showBalloon(postId, text) {
  const card = document.getElementById('post-' + postId);
  if (!card) return;
  const imgWrap = card.querySelector('.feed-img-wrap');
  if (!imgWrap) return;
  const imgRect = imgWrap.getBoundingClientRect();

  const balloon = document.createElement('div');
  balloon.className = 'comment-balloon';
  balloon.textContent = text.length > 24 ? text.slice(0, 24) + '...' : text;
  // position:fixed 로 뷰포트 기준 좌표 (부모 overflow:hidden 영향 없음)
  balloon.style.left = (imgRect.left + imgRect.width / 2) + 'px';
  balloon.style.bottom = (window.innerHeight - imgRect.bottom + 24) + 'px';
  document.body.appendChild(balloon);
  balloon.addEventListener('animationend', () => balloon.remove());
}

window.doRefresh = async function() {
  const icon = document.getElementById('refresh-icon');
  if (icon) icon.style.animation = 'spin 0.7s linear infinite';
  _commentLoaded.clear();
  await loadFeed();
  if (icon) icon.style.animation = '';
};

async function loadComments(postId) {
  _commentLoaded.add(postId);
  const listEl = document.getElementById('clist-' + postId);
  const countEl = document.getElementById('ccount-' + postId);
  if (!listEl) return;
  listEl.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:8px 0;">불러오는 중...</div>';
  try {
    const snap = await getDocs(collection(db, 'posts', postId, 'comments'));
    const sorted = snap.docs.sort((a, b) => {
      const at = a.data().createdAt?.seconds || 0;
      const bt = b.data().createdAt?.seconds || 0;
      return at - bt;
    });
    if (countEl) countEl.textContent = sorted.length > 0 ? `댓글 ${sorted.length}` : '댓글';
    if (sorted.length === 0) {
      listEl.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.25);padding:8px 0;">첫 댓글을 남겨보세요</div>';
      return;
    }
    listEl.innerHTML = sorted.map(c => {
      const d = c.data();
      const canDel = (currentUid && currentUid === d.uid) || isAdmin;
      return `<div class="comment-item" id="comment-${c.id}">
        <span class="comment-nick">${d.nickname || '멤버'}</span>
        <span class="comment-text">${d.text}</span>
        <div class="comment-meta">
          <span class="comment-time">${formatDate(d.createdAt)}</span>
          ${canDel ? `<button class="comment-del" data-postid="${postId}" data-commentid="${c.id}">삭제</button>` : ''}
        </div>
      </div>`;
    }).join('');
    listEl.querySelectorAll('.comment-del').forEach(btn => {
      btn.addEventListener('click', () => deleteComment(btn.dataset.postid, btn.dataset.commentid));
    });
  } catch(e) {
    _commentLoaded.delete(postId);
    listEl.innerHTML = `<div style="font-size:11px;color:rgba(255,100,100,0.7);padding:8px 0;">${e.code === 'permission-denied' ? 'Firebase 규칙을 업데이트해주세요' : '불러오기 실패: ' + e.message}</div>`;
  }
}

async function submitComment(postId) {
  const input = document.getElementById('cinput-' + postId);
  const text = input.value.trim();
  if (!text) return;
  if (!currentUid) { alert('로그인이 필요합니다'); return; }
  const nickname = ggzonUser?.nickname || '골갑';
  input.value = '';
  input.disabled = true;
  try {
    await addDoc(collection(db, 'posts', postId, 'comments'), {
      uid: currentUid, nickname, text, createdAt: serverTimestamp()
    });
    showBalloon(postId, text);
    _commentLoaded.delete(postId);
    await loadComments(postId);
    const section = document.getElementById('comments-' + postId);
    if (section && !section.classList.contains('open')) section.classList.add('open');
  } catch(e) {
    alert('댓글 등록 실패: ' + e.message);
  } finally {
    input.disabled = false;
  }
};

async function deleteComment(postId, commentId) {
  if (!confirm('댓글을 삭제하시겠어요?')) return;
  try {
    await deleteDoc(doc(db, 'posts', postId, 'comments', commentId));
    _commentLoaded.delete(postId);
    await loadComments(postId);
  } catch(e) {
    alert('삭제 실패: ' + e.message);
  }
};

window.deletePost = async function(postId) {
  if (!confirm('이 사진을 삭제하시겠어요?')) return;
  try {
    await deleteDoc(doc(db, 'posts', postId));
    const card = document.getElementById('post-' + postId);
    if (card) card.remove();
  } catch(e) {
    alert('삭제 실패: ' + e.message);
  }
};

// ── 업로드 ───────────────────────────────────────────
let _selectedFile = null;
let _compressedBlob = null;
let _previewDataURL = null;

window.openCameraFromFeed = function() {
  document.getElementById('camera-input').click();
};

window.openGalleryFromFeed = function() {
  document.getElementById('gallery-input').click();
};

function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1080;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/jpeg', 0.82);
    };
    img.src = url;
  });
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  _selectedFile = file;
  _compressedBlob = null;
  const reader = new FileReader();
  reader.onload = (ev) => {
    _previewDataURL = ev.target.result;
    document.getElementById('preview-img').src = _previewDataURL;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('preview-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
  // 압축 미리 시작
  compressImage(file).then(blob => { _compressedBlob = blob; });
  document.getElementById('upload-overlay').style.display = 'flex';
  e.target.value = '';
}

document.getElementById('camera-input').addEventListener('change', handleFileSelect);
document.getElementById('gallery-input').addEventListener('change', handleFileSelect);

window.closeUpload = function() {
  document.getElementById('upload-overlay').style.display = 'none';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('preview-placeholder').style.display = '';
  document.getElementById('upload-caption').value = '';
  _selectedFile = null;
  _compressedBlob = null;
  _previewDataURL = null;
};

// ── Pull to Refresh ──────────────────────────────────
(function() {
  const content = document.getElementById('feed-list');
  const ptr     = document.getElementById('ptr');
  const icon    = document.getElementById('ptr-icon');
  let startY = 0, pulling = false, triggered = false;

  content.addEventListener('touchstart', e => {
    if (content.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      triggered = false;
      icon.style.animation = '';
    }
  }, { passive: true });

  content.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { ptr.style.height = '0'; return; }
    const h = Math.min(dy * 0.45, 48);
    ptr.style.height = h + 'px';
    icon.style.transform = `rotate(${Math.min(dy * 2.5, 360)}deg)`;
    triggered = h >= 42;
  }, { passive: true });

  const release = async () => {
    if (!pulling) return;
    pulling = false;
    if (triggered) {
      ptr.style.height = '48px';
      icon.style.transform = '';
      icon.style.animation = 'spin 0.7s linear infinite';
      await loadFeed();
      icon.style.animation = '';
    }
    ptr.style.height = '0';
    triggered = false;
  };

  content.addEventListener('touchend',    release, { passive: true });
  content.addEventListener('touchcancel', release, { passive: true });
})();

window.doUpload = async function() {
  if (!_selectedFile) return;
  const caption = document.getElementById('upload-caption').value.trim();
  const previewSrc = _previewDataURL;
  const uid = ggzonUser?.uid || auth.currentUser?.uid || 'unknown';
  const nickname = ggzonUser?.nickname || auth.currentUser?.displayName || '관리자';
  // closeUpload() 호출 전에 미리 저장
  const savedBlob = _compressedBlob;
  const savedFile = _selectedFile;

  // 모달 즉시 닫고 임시 카드 삽입
  closeUpload();
  const tempId = 'temp-' + Date.now();
  const tempCard = document.createElement('div');
  tempCard.className = 'feed-card';
  tempCard.id = tempId;
  tempCard.innerHTML = `<div class="feed-img-wrap">
    <img class="feed-photo" src="${previewSrc}" />
    <div class="feed-overlay">
      <div style="flex:1;">
        <div class="feed-nick">${nickname}</div>
        <div class="feed-date">방금</div>
      </div>
    </div>
    ${caption ? `<div class="feed-caption">${caption}</div>` : ''}
    <div class="upload-badge" style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);border-radius:12px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.7);">업로드 중...</div>
  </div>`;
  const list = document.getElementById('feed-list');
  list.prepend(tempCard);

  try {
    const blob = savedBlob || await compressImage(savedFile);
    // Cloudinary 업로드
    if (!blob) throw new Error('이미지 압축 실패');
    const fd = new FormData();
    fd.append('file', blob, 'photo.jpg');
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('public_id', 'post_' + Date.now());
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
      method: 'POST',
      body: fd
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
    const photoURL = data.secure_url;
    if (!photoURL) throw new Error('URL 없음');
    await addDoc(collection(db, 'posts'), { uid, nickname, photoURL, caption, createdAt: serverTimestamp() });
    // 임시 카드를 실제 URL로 교체
    const img = tempCard.querySelector('.feed-photo');
    if (img) img.src = photoURL;
    const badge = tempCard.querySelector('.upload-badge');
    if (badge) badge.remove();
  } catch(e) {
    tempCard.remove();
    alert('에러타입: ' + e.constructor.name + '\n내용: ' + e.message);
  }
};
</script>
