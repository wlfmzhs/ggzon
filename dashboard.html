<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --border: rgba(62,160,102,0.15);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .appbar {
      flex-shrink: 0; padding: 28px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .appbar-left { display: flex; align-items: center; gap: 4px; font-size: 16px; font-weight: 900; }
    .appbar-left .arrow { font-size: 13px; color: var(--green-light); }
    .appbar-right { display: flex; gap: 14px; }
    .appbar-right button { background: none; border: none; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.6); line-height: 0; }
    .top-tabs {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 4px; border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .top-tabs::-webkit-scrollbar { display: none; }
    .top-tab {
      flex-shrink: 0; padding: 10px 14px;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4);
      border: none; background: none; cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent; white-space: nowrap;
    }
    .top-tab.active { color: #fff; border-bottom-color: var(--green-light); }
    .content {
      flex: 1; overflow-y: auto; scrollbar-width: none;
      padding: 16px 0 24px;
    }
    .content-inner-pad {
      padding: 0 16px;
    }
    .content::-webkit-scrollbar { display: none; }
    .greeting { margin-bottom: 24px; }
    .greeting .sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .greeting .name { font-size: 20px; font-weight: 900; }
    .greeting .name span { color: var(--green-light); }
    /* ── 배너 슬라이드 ── */
    .banner-section { margin-bottom: 28px; }
    .banner-scroll {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding-left: 16px;
      scrollbar-width: none;
      gap: 10px;
      padding: 0 16px 4px;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
    }
    .banner-scroll:active { cursor: grabbing; }
    .banner-scroll::-webkit-scrollbar { display: none; }
    .banner-card {
      flex: 0 0 calc(100% - 48px);
      height: 360px;
      background: #1A4831;
      border-radius: 20px;
      overflow: hidden;
      scroll-snap-align: start;
      position: relative;
      cursor: pointer;
      transition: transform 0.18s ease;
    }
    @media (min-width: 400px) {
      .banner-card { flex: 0 0 328px; }
    }
    .banner-card:active { transform: scale(0.97); }

    /* 골슐랭스타 빨간 빛 테두리 */
    .glow-card-wrapper {
      position: relative;
      border-radius: 22px;
      padding: 2.5px;
      overflow: hidden;
      flex: 0 0 calc(100% - 48px);
      scroll-snap-align: start;
      cursor: pointer;
    }
    @media (min-width: 400px) {
      .glow-card-wrapper { flex: 0 0 328px; }
    }
    .glow-card-wrapper::before {
      content: '';
      position: absolute;
      inset: -80%;
      background: conic-gradient(from 0deg,
        transparent 0%, transparent 25%,
        #ff1a1a 40%, #ff6666 50%, #ff1a1a 60%,
        transparent 75%, transparent 100%
      );
      animation: glow-spin 2.5s linear infinite;
      z-index: 0;
    }
    .glow-card-wrapper .banner-card {
      position: relative;
      z-index: 1;
      flex: unset;
      width: 100%;
      scroll-snap-align: unset;
    }
    @keyframes glow-spin {
      to { transform: rotate(360deg); }
    }
    .banner-card-img {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      filter: brightness(1.1);
    }
    .banner-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        160deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.15) 55%,
        rgba(0,0,0,0.35) 100%
      );
    }
    .banner-card-body {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      z-index: 2;
    }
    .banner-card-title {
      font-size: 22px; font-weight: 900;
      color: #fff; line-height: 1.2;
      letter-spacing: -0.02em; margin-bottom: 6px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.4);
    }
    .banner-card-sub {
      font-size: 13px; color: rgba(255,255,255,0.8);
      line-height: 1.5;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }
    .banner-card-cta {
      position: absolute;
      bottom: 20px; left: 16px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.32);
      color: #fff; font-size: 13px; font-weight: 700;
      padding: 8px 18px; border-radius: 30px;
      font-family: inherit; cursor: pointer;
      z-index: 2;
    }

    /* 광고 롤링 배너 */
    .ad-banner-section { padding: 0 16px; margin-bottom: 24px; }
    .ad-banner-track {
      position: relative; overflow: hidden;
      border-radius: 16px; height: 108px;
    }
    .ad-banner-slide {
      display: flex; align-items: center;
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .ad-banner-slide.active { opacity: 1; pointer-events: auto; }
    .ad-banner-slide img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .ad-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.15) 100%);
    }
    .ad-banner-text {
      position: relative; z-index: 1; padding: 0 20px;
    }
    .ad-banner-text .ad-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 4px; letter-spacing: 0.5px; }
    .ad-banner-text .ad-main { font-size: 15px; font-weight: 900; color: #fff; line-height: 1.35; }
    .ad-banner-text .ad-main span { color: #4ade80; }
    .ad-banner-dots {
      position: absolute; bottom: 10px; right: 14px;
      display: flex; gap: 5px; z-index: 2;
    }
    .ad-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.3); transition: background 0.3s;
    }
    .ad-dot.active { background: #fff; }
    /* 배경 (이미지 없을 때) */
    .ad-bg-1 { background: linear-gradient(135deg, #0d3320 0%, #1a5c38 100%); }
    .ad-bg-2 { background: linear-gradient(135deg, #1a2a4a 0%, #0d3320 100%); }
    .ad-bg-3 { background: linear-gradient(135deg, #2a1a0d 0%, #4a3010 100%); }

    /* 섹션 공통 */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 15px; font-weight: 900; color: #f0ebe0; letter-spacing: -0.3px;
    }
    .section-more {
      font-size: 12px; color: var(--green-light); cursor: pointer;
    }
    /* 공지사항 */
    .notice-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; margin-bottom: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .notice-item:active { background: rgba(255,255,255,0.08); }
    .notice-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green-light); flex-shrink: 0;
    }
    .notice-text { flex: 1; }
    .notice-title { font-size: 13px; font-weight: 700; color: #f0ebe0; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notice-date { font-size: 11px; color: rgba(240,235,224,0.35); }
    .notice-arrow { font-size: 16px; color: rgba(255,255,255,0.2); }
    .notice-empty { font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; padding: 18px 0; }
    /* 히스토그램 */
    .chart-section {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(62,160,102,0.25); border-radius: 16px;
      padding: 16px 16px 12px; margin-bottom: 16px;
    }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .chart-title { font-size: 13px; font-weight: 800; color: #fff; }
    .chart-link { font-size: 11px; color: var(--green-light); text-decoration: none; font-weight: 700; }
    .chart-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-wrap { width: 100%; display: flex; align-items: flex-end; height: 60px; }
    .bar {
      width: 100%; border-radius: 4px 4px 0 0;
      transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .bar.animated { transform: scaleY(1); }
    .bar-count { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.5); }
    .bar-label { font-size: 9px; color: rgba(255,255,255,0.3); white-space: nowrap; }
    .bar-col.avg-col .bar-label { color: var(--green-light); font-weight: 800; }

    /* 조인/대회 카드 */
    .live-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: #1A4831;
      border: 1px solid rgba(62,160,102,0.2);
      border-radius: 16px; margin-bottom: 10px; cursor: pointer;
      transition: background 0.15s;
    }
    .live-card:active { background: #0f4a26; }
    .live-card-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .live-card-info { flex: 1; min-width: 0; }
    .live-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .live-card-title { font-size: 14px; font-weight: 900; color: #f0ebe0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .live-badge {
      font-size: 10px; font-weight: 800; padding: 2px 7px;
      border-radius: 20px; flex-shrink: 0;
    }
    .live-badge.active { background: rgba(62,160,102,0.2); color: var(--green-light); border: 1px solid rgba(62,160,102,0.4); }
    .live-badge.field  { background: rgba(255,200,80,0.15); color: #f5c842; border: 1px solid rgba(255,200,80,0.3); }
    .live-badge.screen { background: rgba(100,160,255,0.15); color: #7ab4ff; border: 1px solid rgba(100,160,255,0.3); }
    .live-card-meta { font-size: 11px; color: rgba(240,235,224,0.45); }
    .live-card-arrow { font-size: 18px; color: rgba(240,235,224,0.2); flex-shrink: 0; }
    .live-empty { font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; padding: 18px 0; }
    .section-gap { margin-top: 24px; }
    .my-btn {
      font-size: 12px; font-weight: 700; color: var(--green-light);
      background: none; border: none; cursor: pointer; font-family: inherit;
      padding: 0; letter-spacing: 0.03em;
    }
    .bottom-bar-REMOVED {
      position: absolute; bottom: 0; left: 0; right: 0; height: 64px;
      background: #071a05; border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 8px 8px; z-index: 10;
    }
    .bottom-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 4px; cursor: pointer; background: none; border: none; font-family: inherit;
    }
    .bottom-tab svg { color: rgba(255,255,255,0.3); }
    .bottom-tab.active svg { color: var(--green-light); }
    .bottom-tab-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); }
    .bottom-tab.active .bottom-tab-label { color: var(--green-light); }

<script>
  // 광고 배너 롤링 + 드래그/스와이프
  (function() {
    const track  = document.getElementById('adTrack');
    const slides = document.querySelectorAll('.ad-banner-slide');
    const dots   = document.querySelectorAll('.ad-dot');
    let cur = 0, timer;

    function goTo(n) {
      slides[cur].classList.remove('active');
      dots[cur].classList.remove('active');
      cur = (n + slides.length) % slides.length;
      slides[cur].classList.add('active');
      dots[cur].classList.add('active');
    }
    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(cur + 1), 4000);
    }
    resetTimer();
    dots.forEach((d, i) => d.addEventListener('click', () => { goTo(i); resetTimer(); }));

    // 드래그/스와이프
    let startX = 0, moved = false;
    function onStart(x) { startX = x; moved = false; }
    function onEnd(x) {
      const diff = startX - x;
      if (Math.abs(diff) > 40) { goTo(diff > 0 ? cur + 1 : cur - 1); resetTimer(); }
    }
    track.addEventListener('mousedown',  e => onStart(e.clientX));
    track.addEventListener('mouseup',    e => onEnd(e.clientX));
    track.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
    track.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX), { passive: true });
  })();

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2500);
  }
</script>

    authDomain: "ggzon-b33cb.firebaseapp.com",
    projectId: "ggzon-b33cb",
    storageBucket: "ggzon-b33cb.firebasestorage.app",
    messagingSenderId: "774722580869",
    appId: "1:774722580869:web:5beecd26c0b76f753914ec"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    document.getElementById('loading-overlay').classList.add('hidden');
    if (!user) { window.location.href = 'login.html'; return; }
    loadNotices();
    loadLiveList();
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      const d = snap.data();
      document.getElementById('user-nick').textContent = d.nickname;
      const parts = [d.name, d.birthYear2 ? d.birthYear2 + '년생' : '', d.region].filter(Boolean);
      document.getElementById('header-name').textContent = parts.length ? parts.join(' / ') : d.nickname;
    } else {
      document.getElementById('user-nick').textContent = user.displayName || '멤버';
    }
  });

  // 공지사항 로드
  async function loadNotices() {
    const el = document.getElementById('notice-list');
    try {
      const snap = await getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc'), limit(3)));
      if (snap.empty) { el.innerHTML = '<div class="notice-empty">등록된 공지사항이 없습니다</div>'; return; }
      el.innerHTML = snap.docs.map(d => {
        const n = d.data();
        const date = n.createdAt?.toDate ? n.createdAt.toDate().toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'}) : '';
        return `<div class="notice-item" onclick="location.href='my.html'">
          <div class="notice-dot"></div>
          <div class="notice-text">
            <div class="notice-title">${n.title || '(제목 없음)'}</div>
            <div class="notice-date">${date}</div>
          </div>
          <div class="notice-arrow">›</div>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML = '<div class="notice-empty">불러오기 실패</div>'; }
  }

  // 조인/대회 모집 로드
  async function loadLiveList() {
    const el = document.getElementById('live-list');
    try {
      const snap = await getDocs(query(collection(db, 'joins'), orderBy('createdAt', 'desc'), limit(5)));
      if (snap.empty) { el.innerHTML = '<div class="live-empty">현재 모집 중인 조인이 없습니다</div>'; return; }
      const joinIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(j => j.status !== 'closed');
      if (items.length === 0) { el.innerHTML = '<div class="live-empty">현재 모집 중인 조인이 없습니다</div>'; return; }
      el.innerHTML = items.map(j => {
        const date = j.date || '';
        const time = j.time || '';
        const cur = (j.participants || []).length;
        const max = j.capacity || '-';
        const isScreen = j.type === 'screen';
        const typeBadge = `<span class="live-badge ${isScreen ? 'screen' : 'field'}">${isScreen ? '스크린' : '필드'}</span>`;
        const meta = [date, time, `${cur}/${max}명`].filter(Boolean).join(' · ');
        return `<div class="live-card" onclick="location.href='join.html'">
          <div class="live-card-icon">${joinIcon}</div>
          <div class="live-card-info">
            <div class="live-card-top">
              <div class="live-card-title">${j.course || '조인 모집'}</div>
              <span class="live-badge active">진행중</span>
              ${typeBadge}
            </div>
            <div class="live-card-meta">${meta}</div>
          </div>
          <div class="live-card-arrow">›</div>
        </div>`;
      }).join('');
    } catch(e) { el.innerHTML = '<div class="live-empty">불러오기 실패</div>'; }
  }

  document.getElementById('tab-logout').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'index.html';
  });

  document.querySelectorAll('.top-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.top-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  /* 배너 드래그 스크롤 */
  (function () {
    const scroll = document.querySelector('.banner-scroll');
    if (!scroll) return;
    let startX = 0, scrollLeft = 0, isDragging = false;
    scroll.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.pageX - scroll.offsetLeft;
      scrollLeft = scroll.scrollLeft;
    });
    scroll.addEventListener('mouseleave', () => { isDragging = false; });
    scroll.addEventListener('mouseup', () => { isDragging = false; });
    scroll.addEventListener('mousemove', e => {
      if (!isDragging) return;
      e.preventDefault();
      scroll.scrollLeft = scrollLeft - (e.pageX - scroll.offsetLeft - startX);
    });
  })();

</script>
<script src="data-gpga-2025.js"></script>
<script>
  const maxCount = Math.max(...GPGA2025.histogram.map(b => b.count));
  const bars = document.getElementById('chartBars');
  GPGA2025.histogram.forEach((bin, i) => {
    const heightPct = (bin.count / maxCount) * 100;
    const col = document.createElement('div');
    col.className = 'bar-col' + (bin.avg ? ' avg-col' : '');
    col.innerHTML = `
      <div class="bar-count">${bin.count}</div>
      <div class="bar-wrap">
        <div class="bar" style="height:${heightPct}%;background:${bin.avg ? 'var(--green-light)' : (i===0 ? '#e84c1e' : 'rgba(62,160,102,0.45)')};transition-delay:${i*0.08}s"></div>
      </div>
      <div class="bar-label">${bin.label}</div>
    `;
    bars.appendChild(col);
  });
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('#chartBars .bar').forEach(b => b.classList.add('animated'));
        observer.disconnect();
      }
    });
  }, { threshold: 0.3 });
  observer.observe(document.getElementById('chartSection'));
</script>
