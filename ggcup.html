  <title>GG POINT — 랭킹 포인트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --gold: #f0c040;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 앱바 */
    .appbar {
      flex-shrink: 0; padding: 28px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600;
      font-family: inherit;
    }
    .back-btn:active { color: #fff; }

    /* 로고 */
    .logo-area {
      flex-shrink: 0;
      background: var(--green-dark);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 18px 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo-area img { height: 48px; width: auto; object-fit: contain; margin-bottom: 8px; }
    .logo-sub { font-size: 12px; color: rgba(255,255,255,0.35); }

    /* 내 포인트 카드 */
    .my-point-card {
      margin: 14px 16px 0;
      background: rgba(240,192,64,0.08);
      border: 1px solid rgba(240,192,64,0.25);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .my-point-left { display: flex; flex-direction: column; gap: 3px; }
    .my-point-label { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; }
    .my-point-name { font-size: 15px; font-weight: 900; color: #fff; }
    .my-point-right { text-align: right; }
    .my-point-num { font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1; }
    .my-point-unit { font-size: 11px; color: rgba(240,192,64,0.6); font-weight: 700; }
    .my-rank-badge {
      margin-top: 4px; display: inline-block;
      font-size: 11px; font-weight: 800; color: var(--green-light);
      background: rgba(62,160,102,0.15);
      border: 1px solid rgba(62,160,102,0.3);
      border-radius: 10px; padding: 2px 8px;
    }

    /* 탭 */
    .tabs {
      display: flex; flex-shrink: 0;
      margin: 14px 16px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 12px; padding: 4px; gap: 4px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.4);
      background: none; border: none; cursor: pointer;
      border-radius: 9px; font-family: inherit;
      transition: all 0.2s;
    }
    .tab-btn.active { background: var(--green); color: #fff; }

    /* 스크롤 영역 */
    .scroll-area {
      flex: 1; overflow-y: auto; padding: 14px 16px 24px;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* 포인트 시스템 안내 */
    .point-guide {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 14px;
    }
    .guide-title { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.5); margin-bottom: 10px; letter-spacing: 0.5px; }
    .guide-rows { display: flex; flex-direction: column; gap: 7px; }
    .guide-row { display: flex; justify-content: space-between; align-items: center; }
    .guide-label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .guide-pts { font-size: 13px; font-weight: 900; color: var(--gold); }

    /* 랭킹 */
    .rank-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: 14px; margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .rank-row.me { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); }
    .rank-row.rank-1 { background: rgba(240,192,64,0.1); }
    .rank-row.rank-2 { background: rgba(192,192,192,0.07); }
    .rank-row.rank-3 { background: rgba(205,127,50,0.07); }
    .rank-num {
      font-size: 15px; font-weight: 900; min-width: 24px; text-align: center;
      color: rgba(255,255,255,0.3);
    }
    .rank-num.g { color: var(--gold); font-size: 18px; }
    .rank-num.s { color: var(--silver); font-size: 17px; }
    .rank-num.b { color: var(--bronze); font-size: 16px; }
    .rank-info { flex: 1; }
    .rank-name { font-size: 14px; font-weight: 800; color: #fff; }
    .rank-detail { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .rank-pts { font-size: 18px; font-weight: 900; color: var(--gold); }
    .rank-pts span { font-size: 10px; color: rgba(240,192,64,0.6); }

    /* 내역 */
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: 14px; margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
    }
    .history-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(62,160,102,0.12);
      border: 1px solid rgba(62,160,102,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .history-info { flex: 1; }
    .history-name { font-size: 13px; font-weight: 800; color: #fff; }
    .history-meta { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .history-pts { font-size: 16px; font-weight: 900; color: var(--gold); white-space: nowrap; }
    .history-pts span { font-size: 10px; color: rgba(240,192,64,0.6); }

    .empty-state {
      text-align: center; padding: 40px 0;
      font-size: 13px; color: rgba(255,255,255,0.25);
    }

    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
      #loading-overlay { border-radius: 0; }
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
    authDomain: "ggzon-b33cb.firebaseapp.com",
    projectId: "ggzon-b33cb",
    storageBucket: "ggzon-b33cb.firebasestorage.app",
    messagingSenderId: "774722580869",
    appId: "1:774722580869:web:5beecd26c0b76f753914ec"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html?return=ggcup.html'; return; }
    currentUser = user;
    if (false) {
    }
    document.getElementById('loading-overlay').classList.add('hidden');
    await loadRanking();
    await loadHistory();
  });

  // 랭킹 로드
  async function loadRanking() {
    const snap = await getDocs(query(collection(db, 'users'), orderBy('totalPoints', 'desc'), limit(50)));
    const users = snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => (u.totalPoints || 0) > 0);

    // 내 정보
    const myIdx = users.findIndex(u => u.uid === currentUser.uid);
    if (myIdx >= 0) {
      const me = users[myIdx];
      document.getElementById('myPointCard').style.display = 'flex';
      document.getElementById('myNick').textContent = me.nickname || me.name || '—';
      document.getElementById('myPoints').textContent = me.totalPoints || 0;
      document.getElementById('myRankBadge').textContent = `${myIdx + 1}위`;
    } else {
      // 포인트 없는 경우 내 정보 표시
      const myDoc = await getDoc(doc(db, 'users', currentUser.uid));
      if (myDoc.exists()) {
        const me = myDoc.data();
        document.getElementById('myPointCard').style.display = 'flex';
        document.getElementById('myNick').textContent = me.nickname || me.name || '—';
        document.getElementById('myPoints').textContent = 0;
        document.getElementById('myRankBadge').textContent = '순위 없음';
      }
    }

    const el = document.getElementById('rank-list');
    if (users.length === 0) {
      el.innerHTML = '<div class="empty-state">아직 포인트 내역이 없어요<br>조인이나 대회에 참여해 보세요!</div>';
      return;
    }

    const rankIcon = (i) => `<span class="rank-num ${i===0?'g':i===1?'s':i===2?'b':''}">${i+1}</span>`;
    const rankCls = (i) => i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';

    el.innerHTML = users.map((u, i) => {
      const isMe = u.uid === currentUser.uid;
      return `
        <div class="rank-row ${rankCls(i)}${isMe ? ' me' : ''}">
          ${rankIcon(i)}
          <div class="rank-info">
            <div class="rank-name">${u.nickname || u.name || '골퍼'}${isMe ? ' <span style="font-size:10px;color:var(--gold);">나</span>' : ''}</div>
            <div class="rank-detail">${u.region || ''} ${u.handicap ? '· ' + u.handicap : ''}</div>
          </div>
          <div class="rank-pts">${u.totalPoints || 0}<span> pts</span></div>
        </div>
      `;
    }).join('');
  }

  // 포인트 내역 로드
  async function loadHistory() {
    const el = document.getElementById('history-list');
    let snap;
    try {
      snap = await getDocs(query(collection(db, 'pointHistory'), orderBy('date', 'desc'), limit(50)));
    } catch (e) {
      el.innerHTML = '<div class="empty-state">아직 포인트 내역이 없어요</div>';
      return;
    }

    if (snap.empty) {
      el.innerHTML = '<div class="empty-state">아직 포인트 내역이 없어요</div>';
      return;
    }

    const typeIcon = (t) => t === '조인참여' ? 'J' : t === '대회참여' ? 'T' : t === '스코어' ? 'S' : t === '순위보너스' ? 'R' : 'P';

    el.innerHTML = snap.docs.map(d => {
      const h = d.data();
      const date = h.date ? new Date(h.date).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) : '';
      return `
        <div class="history-row">
          <div class="history-icon">${typeIcon(h.type)}</div>
          <div class="history-info">
            <div class="history-name">${h.name || '골퍼'}</div>
            <div class="history-meta">${h.type} · ${h.ref || ''} · ${date}</div>
          </div>
          <div class="history-pts">+${h.amount}<span> pts</span></div>
        </div>
      `;
    }).join('');
  }

  window.switchTab = function(tab) {
    ['rank','history','guide'].forEach(t => {
      document.getElementById('panel-' + t).style.display = t === tab ? 'block' : 'none';
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  };
</script>
</body>
</html>
