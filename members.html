<!DOCTYPE html>
<html lang="ko">
<head>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wgn7dwi9ex");
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E7NWHXJ0FF"></script>
<script>

  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2d7a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GGZON" />
  <link rel="apple-touch-icon" href="/image/icon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GG PLAYER - GOLGAB ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #2d7a4f;
      --green-light: #3ea066;
      --green-dark: #0A2406;
      --border: rgba(62,160,102,0.15);
    }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a1a;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .phone {
      width: 390px; height: 844px;
      background: var(--green-dark);
      border-radius: 40px;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 11px #3a3a3a, 0 30px 80px rgba(0,0,0,0.7);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .phone::before {
      content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 6px; background: #2a2a2a; border-radius: 10px; z-index: 100;
    }
    @media (max-width: 480px) {
      html, body { background: var(--green-dark); }
      body { align-items: flex-start; }
      .phone { width: 100%; height: 100vh; height: 100dvh; border-radius: 0; box-shadow: none; }
      .phone::before { display: none; }
    }
    #loading-overlay {
      position: absolute; inset: 0; background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; border-radius: 40px;
    }
    #loading-overlay.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .appbar {
      flex-shrink: 0; padding: 32px 18px 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .appbar-back {
      background: none; border: none; cursor: pointer; padding: 4px 8px 4px 0;
      color: var(--green-light); font-size: 20px; line-height: 1;
    }
    .appbar-title { font-size: 17px; font-weight: 900; flex: 1; letter-spacing: -0.3px; }
    .appbar-sub { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; }

    .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 8px 0 40px; }
    .scroll-area::-webkit-scrollbar { display: none; }

    .rank-note {
      text-align: center; font-size: 10px; color: rgba(255,255,255,0.2);
      padding: 0 16px 16px; line-height: 1.6;
    }

    .member-card {
      margin: 0 14px 9px;
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(62,160,102,0.13);
      display: flex; align-items: center; gap: 14px;
      opacity: 0;
      animation: cardIn 0.42s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .member-card.rank-1 { background: rgba(240,192,64,0.08); border-color: rgba(240,192,64,0.32); }
    .member-card.rank-2 { background: rgba(192,192,192,0.06); border-color: rgba(192,192,192,0.22); }
    .member-card.rank-3 { background: rgba(205,127,50,0.07); border-color: rgba(205,127,50,0.26); }

    .rank-num {
      font-size: 22px; font-weight: 900; width: 28px; text-align: center; flex-shrink: 0;
      color: rgba(255,255,255,0.22);
    }
    .rank-1 .rank-num { color: #f0c040; }
    .rank-2 .rank-num { color: #c0c0c0; }
    .rank-3 .rank-num { color: #cd7f32; }

    .member-info { flex: 1; min-width: 0; }
    .member-nick { font-size: 15px; font-weight: 900; color: #f0ebe0; margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .member-meta { font-size: 11px; color: rgba(255,255,255,0.36); line-height: 1.6; }
    .member-badges { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 9px; font-weight: 800; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.04em;
    }
    .badge-eagle    { background: rgba(62,160,102,0.18); color: #3ea066; border: 1px solid rgba(62,160,102,0.38); }
    .badge-holeinone { background: rgba(240,192,64,0.16); color: #f0c040; border: 1px solid rgba(240,192,64,0.32); }

    .member-right { text-align: right; flex-shrink: 0; }
    .handi-big { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .handi-big.cls-under { color: #e74c3c; }
    .handi-big.cls-pink  { color: #ffb3c8; }
    .handi-big.cls-white { color: rgba(255,255,255,0.7); }

    .trend-line { font-size: 10px; font-weight: 700; }
    .trend-down { color: #3ea066; }
    .trend-up   { color: #e74c3c; }
    .trend-flat { color: rgba(255,255,255,0.28); }

    .rank-arrow-up   { font-size: 10px; color: #e74c3c; font-weight: 900; margin-left: 5px; vertical-align: middle; line-height: 1; }
    .rank-arrow-down { font-size: 10px; color: #4a8fd4; font-weight: 900; margin-left: 5px; vertical-align: middle; line-height: 1; }
    .golchelin-stars { font-size: 10px; color: #f0c040; margin-left: 6px; vertical-align: middle; letter-spacing: 1px; line-height: 1; }

    .empty-msg {
      text-align: center; font-size: 13px; color: rgba(255,255,255,0.3);
      padding: 50px 24px; line-height: 1.8;
    }

    .load-more-btn {
      display: block; width: calc(100% - 28px); margin: 4px 14px 24px;
      padding: 13px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; text-align: center;
      transition: background 0.15s;
    }
    .load-more-btn:active { background: rgba(255,255,255,0.1); }

    .member-card { cursor: pointer; }
    .member-card:active { opacity: 0.85; }
    .drop-toggle { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 5px; text-align: right; transition: color 0.2s; }
    .member-card.open .drop-toggle { color: var(--green-light); }

    .history-drop {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.38s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease;
      margin: -5px 14px 9px;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      opacity: 0;
    }
    .history-drop.open { grid-template-rows: 1fr; opacity: 1; }
    .history-drop-body {
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-top: none;
      border-radius: 0 0 14px 14px;
      min-height: 0;
    }
    .hist-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-num  { font-size: 10px; color: rgba(255,255,255,0.25); min-width: 16px; text-align: center; }
    .hist-date { font-size: 10px; color: rgba(255,255,255,0.3); min-width: 58px; }
    .hist-course { flex: 1; color: rgba(255,255,255,0.65); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-type { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
    .hist-score { font-size: 14px; font-weight: 900; min-width: 34px; text-align: right; }
    .hist-score.s-under { color: #e74c3c; }
    .hist-score.s-even  { color: #ffb3c8; }
    .hist-score.s-good  { color: rgba(255,255,255,0.8); }
    .hist-score.s-over  { color: rgba(255,255,255,0.4); }
    .hist-loading { text-align: center; padding: 14px; color: rgba(255,255,255,0.25); font-size: 12px; }
  </style>
</head>
<body>
<div class="phone">
  <div id="loading-overlay">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="animation:spin 1s linear infinite">
      <circle cx="20" cy="20" r="16" stroke="rgba(62,160,102,0.2)" stroke-width="4"/>
      <path d="M20 4a16 16 0 0 1 16 16" stroke="#3ea066" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="appbar">
    <button class="appbar-back" onclick="history.back()">&#8249;</button>
    <span class="appbar-title">GG PLAYER</span>
    <span class="appbar-sub">핸디캡 랭킹</span>
  </div>

  <div class="scroll-area">
    <div class="rank-note" id="rank-note">랭킹 불러오는 중...</div>
    <div id="player-list"></div>
    <button class="load-more-btn" id="load-more-btn" style="display:none;" onclick="showAllPlayers()">더보기</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  // limit을 별칭으로 사용 (내부 변수명 충돌 방지용)

  const app = initializeApp({
    apiKey: "AIzaSyC-31zadgV4hkQm7fFqbDrxtJRAIeo6k18",
    authDomain: "ggzon-b33cb.firebaseapp.com",
    projectId: "ggzon-b33cb",
    storageBucket: "ggzon-b33cb.firebasestorage.app",
    messagingSenderId: "774722580869",
    appId: "1:774722580869:web:5beecd26c0b76f753914ec"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  const _ggzonKakao = JSON.parse(localStorage.getItem('ggzon_user') || 'null');
  const _kakaoFbUser = (_ggzonKakao?.loginType === 'kakao')
    ? { uid: _ggzonKakao.uid } : null;

  onAuthStateChanged(auth, (user) => {
    document.getElementById('loading-overlay').classList.add('hidden');
    if (!user && !_kakaoFbUser) { window.location.href = 'login.html'; return; }
    loadPlayers();
  });

  // 골슐랭스타 데이터 (golchelin-star.html 동기화)
  const GOLCHELIN = {
    "어정우": 3,
    "이상훈": 2, "임지헌": 2, "이원석": 2, "김도영": 2, "김덕규": 2,
    "이용훈": 1, "김철영": 1, "권성민": 1,
  };

  let allPlayers = [];
  const PAGE = 10;

  function buildCard(u, rank) {
    const rc = rank <= 3 ? ['rank-1','rank-2','rank-3'][rank - 1] : '';
    const nick = u.name || u.nickname || '멤버';
    const uid  = u.uid || '';
    const starCount = GOLCHELIN[u.name] || GOLCHELIN[u.nickname] || 0;
    const starHtml = starCount ? `<span class="golchelin-stars">${'★'.repeat(starCount)}</span>` : '';
    const metaParts = [];
    if (u.birthYear2) metaParts.push(u.birthYear2 + '년생');
    if (u.region) metaParts.push(u.region);
    if (u.roundCount) metaParts.push(u.roundCount + '라운드');
    const h = u.handicap ?? 0;
    const hLabel = h === 0 ? 'E' : h > 0 ? `+${h}` : String(h);
    const hCls = h < 0 ? 'cls-under' : h <= 9 ? 'cls-pink' : 'cls-white';
    const best = u.bestScore ?? null;
    const bestStr = best === null ? '' : ` · 베스트 ${best === 0 ? 'E' : best > 0 ? '+' + best : best}`;
    const t = u.handicapTrend;
    let trendHtml = '<span class="trend-flat">- 유지</span>';
    let arrowHtml = '';
    if (t !== null && t !== undefined) {
      if (t < -0.5) {
        trendHtml = `<span class="trend-down">&#9660; ${Math.abs(t).toFixed(1)} 개선</span>`;
        arrowHtml = `<span class="rank-arrow-up">&#9650;</span>`;
      } else if (t > 0.5) {
        trendHtml = `<span class="trend-up">&#9650; ${t.toFixed(1)} 상승</span>`;
        arrowHtml = `<span class="rank-arrow-down">&#9660;</span>`;
      }
    }
    const badges = [];
    if (u.hasEagle) badges.push('<span class="badge badge-eagle">이글</span>');
    if (u.hasHoleinone) badges.push('<span class="badge badge-holeinone">홀인원</span>');
    const dropId = `drop-${uid}`;
    const cardId = `card-${uid}`;
    return `
<div class="member-card ${rc}" id="${cardId}" style="animation-delay:${Math.min(rank-1,9)*0.07}s;" onclick="window.toggleDrop('${uid}','${dropId}','${cardId}')">
  <div class="rank-num">${rank}</div>
  <div class="member-info">
    <div class="member-nick">${nick}${arrowHtml}${starHtml}</div>
    <div class="member-meta">${metaParts.join(' · ')}${bestStr}</div>
    ${badges.length ? `<div class="member-badges">${badges.join('')}</div>` : ''}
  </div>
  <div class="member-right">
    <div class="handi-big ${hCls}">${hLabel}</div>
    <div class="trend-line">${trendHtml}</div>
    <div class="drop-toggle">▼ 기록</div>
  </div>
</div>
<div class="history-drop" id="${dropId}"><div class="history-drop-body"><div class="hist-loading">불러오는 중...</div></div></div>`;
  }

  function renderList(players, el) {
    el.innerHTML = players.map((u, i) => buildCard(u, i + 1)).join('');
  }

  const _dropCache = {};
  window.toggleDrop = async function(uid, dropId, cardId) {
    if (!uid) return;
    const drop = document.getElementById(dropId);
    const card = document.getElementById(cardId);
    if (!drop || !card) return;

    const isOpen = drop.classList.contains('open');
    // 다른 열린 드롭다운 닫기
    document.querySelectorAll('.history-drop.open').forEach(el => {
      el.classList.remove('open');
      const cId = el.id.replace('drop-', 'card-');
      const c = document.getElementById(cId);
      if (c) { c.classList.remove('open'); c.style.borderRadius = '16px'; }
    });
    if (isOpen) { card.style.borderRadius = '16px'; return; }

    drop.classList.add('open');
    card.classList.add('open');
    card.style.borderRadius = '16px 16px 0 0';

    if (_dropCache[uid]) { drop.innerHTML = _dropCache[uid]; return; }

    drop.innerHTML = '<div class="history-drop-body"><div class="hist-loading">불러오는 중...</div></div>';
    try {
      const snap = await getDocs(
        query(collection(db, 'users', uid, 'scoreHistory'), orderBy('submittedAt', 'desc'), limit(10))
      );
      const valid = snap.docs.filter(d => {
        const r = d.data();
        return r.type === 'tournament' || (r.holes || []).some(v => v !== null);
      });
      if (!valid.length) {
        drop.innerHTML = '<div class="history-drop-body"><div class="hist-loading">기록 없음</div></div>';
        _dropCache[uid] = drop.innerHTML;
        return;
      }
      drop.innerHTML = '<div class="history-drop-body">' + valid.map((d, i) => {
        const r  = d.data();
        const sc = r.totalScore ?? 0;
        const scLabel = sc === 0 ? 'E' : sc > 0 ? `+${sc}` : String(sc);
        const scCls   = sc < 0 ? 's-under' : sc === 0 ? 's-even' : sc <= 9 ? 's-good' : 's-over';
        const typeLabel = r.type === 'tournament' ? '대회' : '조인';
        const courseName = r.tournamentName || r.course || '-';
        return `<div class="hist-row">
  <span class="hist-num">${i + 1}</span>
  <span class="hist-date">${r.date || ''}</span>
  <span class="hist-course">${courseName}</span>
  <span class="hist-type">${typeLabel}</span>
  <span class="hist-score ${scCls}">${scLabel}</span>
</div>`;
      }).join('') + '</div>';
      _dropCache[uid] = drop.innerHTML;
    } catch(e) {
      drop.innerHTML = '<div class="history-drop-body"><div class="hist-loading">불러오기 실패</div></div>';
    }
  };

  async function loadPlayers() {
    const el   = document.getElementById('player-list');
    const note = document.getElementById('rank-note');
    try {
      const snap = await getDocs(query(collection(db, 'users'), where('handicap', '>=', -100), orderBy('handicap'), limit(200)));
      allPlayers = snap.docs
        .map(d => ({ uid: d.id, ...d.data() }))
        .filter(u => u.roundCount > 0 && typeof u.handicap === 'number');

      if (!allPlayers.length) {
        el.innerHTML = '<div class="empty-msg">아직 스코어를 제출한 멤버가 없습니다<br>라운드 후 스코어를 제출하면 자동 등록됩니다</div>';
        note.textContent = '';
        return;
      }

      renderList(allPlayers.slice(0, PAGE), el);

      // 1위 자동 드롭다운 힌트 (1~2초 후 펼쳐서 클릭 유도)
      if (allPlayers.length > 0) {
        const first = allPlayers[0];
        setTimeout(() => {
          window.toggleDrop(first.uid, `drop-${first.uid}`, `card-${first.uid}`);
        }, 1500);
      }

      // 더보기 버튼 (11위 이상 있을 때만)
      const moreBtn = document.getElementById('load-more-btn');
      if (allPlayers.length > PAGE) {
        moreBtn.style.display = 'block';
        moreBtn.textContent = `더보기 (${allPlayers.length - PAGE}명)`;
      } else {
        moreBtn.style.display = 'none';
      }

      note.textContent = '스코어 제출 시 자동 업데이트 · 최근 10경기 평균 기준';
    } catch(e) {
      el.innerHTML = '<div class="empty-msg">불러오기 실패<br>잠시 후 다시 시도해주세요</div>';
      note.textContent = '';
    }
  }

  window.showAllPlayers = function() {
    const el = document.getElementById('player-list');
    renderList(allPlayers, el);
    document.getElementById('load-more-btn').style.display = 'none';
  };
</script>
<script src="/ptr.js"></script>
</body>
</html>
